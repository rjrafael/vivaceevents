<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0d0d0d"/>
<title>Vivace Events</title>
<link rel="manifest" href="manifest.json"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;display:flex;justify-content:center}
#app{width:100%;max-width:430px;min-height:100vh;background:#fff;display:flex;flex-direction:column;position:relative}
.hdr{background:#0d0d0d;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:10}
.logo{font-size:17px;font-weight:600;color:#fff;letter-spacing:-.02em}.logo em{color:#1D9E75;font-style:normal}
.hdr-r{display:flex;gap:14px;color:#666;font-size:21px;cursor:pointer}
.scr{flex:1;overflow-y:auto;padding-bottom:70px}
.bnav{display:flex;border-top:1px solid #eee;background:#fff;position:fixed;bottom:0;width:100%;max-width:430px;z-index:10}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 5px;cursor:pointer;color:#aaa;font-size:10px;border:none;background:none;font-family:inherit}
.ni.on{color:#1D9E75}.ni svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.pc{width:46px;height:46px;border-radius:50%;background:#1D9E75;display:flex;align-items:center;justify-content:center;margin-bottom:2px}
.pc svg{stroke:#fff}
.pad{padding:16px}
.card{background:#fff;border:1px solid #eee;border-radius:12px;padding:14px;margin-bottom:10px}
.tag{font-size:10px;padding:3px 8px;border-radius:20px;background:#f5f5f5;color:#666;border:1px solid #e0e0e0;display:inline-block;margin:2px 2px 2px 0}
.tg{background:#E1F5EE;color:#085041;border-color:#5DCAA5}
.ta{background:#FAEEDA;color:#633806;border-color:#EF9F27}
.tr{background:#FCEBEB;color:#791F1F;border-color:#F09595}
.tb{background:#E6F1FB;color:#0C447C;border-color:#85B7EB}
.tp{background:#EEEDFE;color:#3C3489;border-color:#AFA9EC}
.av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0}
.bt{background:#1D9E75;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.bg{background:transparent;color:#666;border:1px solid #ddd;border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;font-family:inherit}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.st{font-size:13px;font-weight:600;color:#111}
.sl{font-size:12px;color:#1D9E75;cursor:pointer}
.pr{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;scrollbar-width:none}
.pr::-webkit-scrollbar{display:none}
.pl{font-size:11px;padding:6px 14px;border-radius:20px;white-space:nowrap;cursor:pointer;border:1px solid #e0e0e0;color:#666;background:#f5f5f5;flex-shrink:0}
.pl.on{background:#E1F5EE;border-color:#5DCAA5;color:#085041}
.dc{background:#0d0d0d;border-radius:12px;padding:14px;margin-bottom:10px}
.finp{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #ddd;background:#f9f9f9;color:#111;font-size:14px;font-family:inherit;outline:none}
.finp:focus{border-color:#1D9E75;background:#fff}
.flbl{font-size:11px;font-weight:600;color:#888;letter-spacing:.05em;margin-bottom:6px;display:block}
.tgl{width:34px;height:20px;border-radius:10px;position:relative;cursor:pointer;flex-shrink:0;transition:background .2s}
.tgl.on{background:#1D9E75}.tgl.off{background:#ddd}
.tdot{position:absolute;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .15s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tgl.on .tdot{left:16px}.tgl.off .tdot{left:2px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:#085041;color:#9FE1CB;font-size:12px;padding:10px 20px;border-radius:20px;opacity:0;transition:all .25s ease;white-space:nowrap;pointer-events:none;z-index:100;max-width:calc(100% - 32px);text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.auth-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px;background:#fff}
.auth-logo{font-size:28px;font-weight:700;color:#0d0d0d;margin-bottom:6px}.auth-logo em{color:#1D9E75;font-style:normal}
.auth-sub{font-size:14px;color:#888;margin-bottom:40px;text-align:center}
.auth-btn{width:100%;padding:14px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:12px;border:none;display:flex;align-items:center;justify-content:center;gap:10px}
.auth-google{background:#fff;color:#333;border:1px solid #ddd}
.auth-email-btn{background:#1D9E75;color:#fff}
.auth-divider{display:flex;align-items:center;gap:12px;width:100%;margin:8px 0 20px}
.auth-divider span{font-size:12px;color:#bbb;white-space:nowrap}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:#eee}
.auth-form{width:100%;display:flex;flex-direction:column;gap:12px}
.skill-track{flex:1;height:4px;background:#f0f0f0;border-radius:2px}
.skill-fill{height:4px;border-radius:2px;background:#1D9E75}
.role-btn{flex:1;padding:12px 8px;border-radius:10px;border:1px solid #e0e0e0;background:#f9f9f9;color:#666;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-align:center}
.role-btn.on{border-color:#5DCAA5;background:#E1F5EE;color:#085041}
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:#fff;border-radius:16px 16px 0 0;padding:20px;width:100%;max-width:430px;max-height:85vh;overflow-y:auto}
.member-check{width:22px;height:22px;border-radius:50%;border:2px solid #ddd;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.member-check.on{background:#1D9E75;border-color:#1D9E75;color:#fff}
.tab-bar{display:flex;border-bottom:1px solid #eee;margin-bottom:16px}
.tab{flex:1;padding:10px;text-align:center;font-size:13px;font-weight:600;color:#aaa;cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:#1D9E75;border-bottom-color:#1D9E75}
.dur-badge{font-size:12px;color:#1D9E75;font-weight:600;padding:6px 10px;background:#E1F5EE;border-radius:8px;margin-top:8px}
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, getDoc, doc, setDoc, deleteDoc, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const FB = {
  apiKey:"AIzaSyDG6mjLSYp5gJpLZrI4hjBNIJrSC83qwj0",
  authDomain:"vivaceevents-1a8ff.firebaseapp.com",
  projectId:"vivaceevents-1a8ff",
  storageBucket:"vivaceevents-1a8ff.firebasestorage.app",
  messagingSenderId:"215295054411",
  appId:"1:215295054411:web:f7ce28486848ec0a1373ce"
};

const app = initializeApp(FB);
const auth = getAuth(app);
const db = getFirestore(app);
const gp = new GoogleAuthProvider();

let CU = null;
let UP = {roles:['musician']};
let CS = 'feed';
let MT = 'groups';
let CP = [];
let venues = [];
let groups = [];

const SVG = {
  home:`<svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
  search:`<svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>`,
  plus:`<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  users:`<svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>`,
  user:`<svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>`,
  bell:`<svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>`,
  play:`<svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
  out:`<svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>`,
  trash:`<svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>`,
  mgr:`<svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8"/><path d="M12 17v4"/></svg>`,
  chk:`<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`
};

function ic(n){return SVG[n]||'';}

function ts(m){
  let t=document.getElementById('toast');
  if(!t){t=document.createElement('div');t.id='toast';t.className='toast';document.getElementById('app').appendChild(t);}
  t.textContent=m;t.classList.add('show');
  clearTimeout(window._tt);window._tt=setTimeout(()=>t.classList.remove('show'),2500);
}

function isMgr(){return UP.roles&&UP.roles.includes('manager');}

async function loadUP(){
  try{
    const d=await getDoc(doc(db,'users',CU.uid));
    if(d.exists()) UP={...UP,...d.data()};
    else await setDoc(doc(db,'users',CU.uid),{roles:['musician'],email:CU.email,name:CU.displayName||CU.email.split('@')[0],created:new Date()});
  }catch(e){}
}
async function saveUP(){try{await setDoc(doc(db,'users',CU.uid),{...UP,email:CU.email},{merge:true});}catch(e){}}

async function loadGroups(){
  try{
    const s=await getDocs(query(collection(db,'groups'),where('managerId','==',CU.uid)));
    groups=s.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){}
}
async function loadVenues(){
  try{
    const s=await getDocs(query(collection(db,'venues'),where('managerId','==',CU.uid)));
    venues=s.docs.map(d=>({id:d.id,...d.data()}));
  }catch(e){}
}

function render(){
  const el=document.getElementById('app');
  if(!CU){el.innerHTML=authHTML();bindAuth();return;}
  el.innerHTML=`
    <div class="scr" id="scr">${getScr()}</div>
    <div id="toast" class="toast"></div>
    <nav class="bnav">
      <button class="ni${CS==='feed'?' on':''}" onclick="go('feed')">${ic('home')}Feed</button>
      <button class="ni${CS==='discover'?' on':''}" onclick="go('discover')">${ic('search')}Find</button>
      <button class="ni" onclick="go('post')" style="flex:1;display:flex;flex-direction:column;align-items:center;padding:4px 0;border:none;background:none;cursor:pointer"><div class="pc">${ic('plus')}</div></button>
      <button class="ni${CS==='manager'?' on':''}" onclick="go('manager')">${ic('mgr')}Manager</button>
      <button class="ni${CS==='profile'?' on':''}" onclick="go('profile')">${ic('user')}Profile</button>
    </nav>`;
}

function go(s){CS=s;document.getElementById('scr').innerHTML=getScr();}
window.go=go; window.ts=ts;

function getScr(){
  if(CS==='feed') return feedHTML();
  if(CS==='discover') return discoverHTML();
  if(CS==='post') return postHTML();
  if(CS==='manager') return mgrHTML();
  if(CS==='profile') return profileHTML();
  return feedHTML();
}

function authHTML(){return `
<div class="auth-wrap">
  <div class="auth-logo">Vivace<em>Events</em></div>
  <div class="auth-sub">The musician network — gigs, rosters, masterclasses</div>
  <button class="auth-btn auth-google" id="btn-google">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Continue with Google
  </button>
  <div class="auth-divider"><span>or use email</span></div>
  <div class="auth-form">
    <input class="finp" id="ae" type="email" placeholder="Email address"/>
    <input class="finp" id="ap" type="password" placeholder="Password (min 6 chars)"/>
    <button class="auth-btn auth-email-btn" id="btn-signup">Create free account</button>
    <button class="auth-btn" style="background:#f5f5f5;color:#333;border:1px solid #ddd" id="btn-signin">Sign in</button>
  </div>
</div>`;}

function bindAuth(){
  document.getElementById('btn-google').onclick=async()=>{
    try{const r=await signInWithPopup(auth,gp);CU=r.user;await loadUP();await loadGroups();await loadVenues();render();}
    catch(e){ts('Google sign-in failed');}
  };
  document.getElementById('btn-signup').onclick=async()=>{
    try{const r=await createUserWithEmailAndPassword(auth,document.getElementById('ae').value,document.getElementById('ap').value);CU=r.user;await loadUP();render();}
    catch(e){ts(e.message);}
  };
  document.getElementById('btn-signin').onclick=async()=>{
    try{const r=await signInWithEmailAndPassword(auth,document.getElementById('ae').value,document.getElementById('ap').value);CU=r.user;await loadUP();await loadGroups();await loadVenues();render();}
    catch(e){ts(e.message);}
  };
}

async function loadGigs(){
  try{
    const s=await getDocs(query(collection(db,'gigs'),orderBy('timestamp','desc')));
    const el=document.getElementById('gig-list');
    if(!el)return;
    if(s.empty){el.innerHTML='<p style="color:#aaa;font-size:13px;text-align:center;padding:20px 0">No gigs yet — post the first one!</p>';return;}
    el.innerHTML=s.docs.map(d=>{
      const g=d.data();
      const free=g.pay&&(g.pay.toLowerCase().includes('free')||g.pay.toLowerCase().includes('volunteer'));
      const multiday=g.dateEnd&&g.dateEnd!==g.date&&g.dateEnd!=='';
      return `<div class="card">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <span class="tag tg">${g.type||'Gig'}</span>
          <span style="font-size:14px;font-weight:600;color:${free?'#1D9E75':'#BA7517'}">${g.pay||'TBD'}</span>
        </div>
        <div style="font-size:15px;font-weight:600;color:#111;margin-bottom:4px">${g.title||'Untitled'}</div>
        <div style="font-size:12px;color:#888;margin-bottom:8px;display:flex;gap:12px;flex-wrap:wrap">
          ${g.date?`<span>📅 ${g.date}${g.time?' at '+g.time:''}${multiday?' — '+g.dateEnd+(g.timeEnd?' at '+g.timeEnd:''):''}</span>`:''}
          ${g.duration?`<span>⏱ ${g.duration}</span>`:''}
          ${g.location?`<span>📍 ${g.location}</span>`:''}
        </div>
        ${g.instruments?`<div style="margin-bottom:8px">${g.instruments.split(',').map(i=>`<span class="tag">${i.trim()}</span>`).join('')}</div>`:''}
        <div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid #f0f0f0;padding-top:10px">
          <span style="font-size:11px;color:#aaa">by ${g.postedBy||'member'}</span>
          <button class="bt" style="font-size:12px;padding:6px 14px" onclick="applyGig(event,'${(g.title||'').replace(/'/g,"\\'")}')">Apply</button>
        </div>
      </div>`;
    }).join('');
  }catch(e){console.log(e);}
}

function feedHTML(){
  setTimeout(loadGigs,100);
  return `
<div class="hdr"><div><div class="logo">Vivace<em>Events</em></div><div style="font-size:11px;color:#555;margin-top:1px">Washington, DC</div></div>
<div class="hdr-r">${ic('bell')}</div></div>
<div class="pad">
<div class="pr"><span class="pl on" onclick="fpill(this)">All</span><span class="pl" onclick="fpill(this)">Gigs</span><span class="pl" onclick="fpill(this)">Masterclasses</span><span class="pl" onclick="fpill(this)">Sessions</span><span class="pl" onclick="fpill(this)">Free</span></div>
<div class="dc">
  <div style="font-size:10px;font-weight:600;color:#1D9E75;letter-spacing:.07em;margin-bottom:5px">BROADCAST — Alex Rivera, Manager</div>
  <div style="font-size:14px;color:#eee;line-height:1.5;margin-bottom:12px">Who can play a string quartet Friday 8pm? Corporate gala downtown. $400/musician.</div>
  <div style="display:flex;gap:8px;flex-wrap:wrap">
    <button class="bt" style="font-size:12px;padding:7px 14px" onclick="respond('available')">I am available</button>
    <button style="background:transparent;color:#888;border:1px solid #333;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer" onclick="respond('maybe')">Maybe</button>
    <button style="background:transparent;color:#F09595;border:1px solid #333;border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer" onclick="respond('no')">Can't make it</button>
  </div>
</div>
<div class="sh"><span class="st">Posted gigs</span><span class="sl" onclick="go('post')">+ Post new</span></div>
<div id="gig-list"><p style="color:#aaa;font-size:13px;text-align:center;padding:20px 0">Loading...</p></div>
</div>`;}

window.fpill=function(el){document.querySelectorAll('.pl').forEach(p=>p.classList.remove('on'));el.classList.add('on');}
window.respond=async function(type){
  try{await addDoc(collection(db,'responses'),{type,userId:CU.uid,userEmail:CU.email,timestamp:new Date()});
  ts(type==='available'?'✅ Sent! Alex will see you.':type==='maybe'?'⚡ Maybe sent!':'Response sent!');}
  catch(e){ts('Sent!');}
}
window.applyGig=async function(e,title){
  e.stopPropagation();
  try{await addDoc(collection(db,'applications'),{gig:title,userId:CU.uid,userEmail:CU.email,timestamp:new Date()});ts('Application sent for: '+title);}
  catch(e){ts('Application submitted!');}
}

function discoverHTML(){
  return `
<div class="hdr"><div class="logo" style="font-size:15px">Find musicians</div></div>
<div class="pad">
<div style="position:relative;margin-bottom:14px">
  <svg style="position:absolute;left:12px;top:50%;transform:translateY(-50%);width:18px;height:18px;stroke:#aaa;fill:none;stroke-width:2;pointer-events:none" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  <input class="finp" style="padding-left:38px" placeholder="Search by name, instrument, genre…"/>
</div>
<div class="pr"><span class="pl on" onclick="fpill(this)">All</span><span class="pl" onclick="fpill(this)">Violin</span><span class="pl" onclick="fpill(this)">Cello</span><span class="pl" onclick="fpill(this)">Viola</span><span class="pl" onclick="fpill(this)">Bass</span><span class="pl" onclick="fpill(this)">Educator</span></div>
${isMgr()?`<div class="card" style="background:#f9f9f9;margin-bottom:14px;display:flex;align-items:center;gap:10px"><div style="flex:1;font-size:13px;color:#666">Cherry-pick mode: tap ○ to select musicians</div><span class="tag tp">${CP.length} selected</span></div>`:''}
${mcard('SC','#B5D4F4','#0C447C','Sofia Chen','Violinist · Grade 8+',true,'4.9','Violin,Bow technique,Classical')}
${mcard('MW','#9FE1CB','#085041','Marcus Webb','Cellist · Professional',true,'4.8','Cello,Chamber,Studio')}
${mcard('LP','#F5C4B3','#712B13','Lena Park','Violist · Chamber ensemble',false,'5.0','Viola,Quartet,Educator')}

window.toggleMD=function(){
  const tgl=document.getElementById('md-tgl');
  const row=document.getElementById('end-row');
  const isOn=tgl.classList.contains('on');
  if(isOn){tgl.classList.replace('on','off');row.style.display='none';}
  else{
    tgl.classList.replace('off','on');row.style.display='grid';
    const sd=document.getElementById('g-date').value;
    if(sd)document.getElementById('g-date-end').value=sd;
  }
  calcDur();
}

window.calcDur=function(){
  const sd=document.getElementById('g-date')?.value;
  const st=document.getElementById('g-time')?.value;
  const ed=document.getElementById('g-date-end')?.value;
  const et=document.getElementById('g-time-end')?.value;
  const disp=document.getElementById('g-dur');
  if(!disp||!sd){if(disp)disp.style.display='none';return;}
  const s=new Date(sd+'T'+(st||'00:00'));
  const e=new Date((ed||sd)+'T'+(et||st||'23:59'));
  if(isNaN(s)||isNaN(e)||e<=s){disp.style.display='none';return;}
  const mins=Math.round((e-s)/60000);
  const days=Math.floor(mins/1440);
  const hrs=Math.floor((mins%1440)/60);
  const m=mins%60;
  let label='';
  if(days>0) label+=days+' day'+(days>1?'s':'');
  if(hrs>0) label+=(label?' ':'')+hrs+' hr'+(hrs>1?'s':'');
  if(m>0&&days===0) label+=(label?' ':'')+m+' min';
  if(label){disp.style.display='block';disp.textContent='⏱ Duration: '+label;}
  else disp.style.display='none';
}

window.setPayType=function(v){
  const f=document.getElementById('g-pay');
  if(!f)return;
  if(v==='free'){f.value='Free / Volunteer';f.style.color='#1D9E75';}
  else if(v==='entry'){f.value='Free entry — door deal';f.style.color='#1D9E75';}
  else if(v==='revenue'){f.value='Revenue share';f.style.color='#BA7517';}
  else if(v==='tbd'){f.value='To be discussed';f.style.color='#888';}
  else{f.value='';f.style.color='#111';}
}

window.saveGig=async function(draft){
  const title=document.getElementById('g-title').value;
  if(!title&&!draft){ts('Please add a title first');return;}
  const sd=document.getElementById('g-date').value;
  const st=document.getElementById('g-time').value;
  const ed=document.getElementById('g-date-end')?.value||'';
  const et=document.getElementById('g-time-end')?.value||'';
  const dur=document.getElementById('g-dur')?.textContent?.replace('⏱ Duration: ','')||'';
  const type=document.querySelector('#tgrid .card[style*="#E1F5EE"]')?.textContent||'Gig';
  try{
    await addDoc(collection(db,'gigs'),{
      title:title||'Draft',type,
      date:sd,time:st,dateEnd:ed,timeEnd:et,duration:dur,
      pay:document.getElementById('g-pay').value,
      location:document.getElementById('g-loc').value,
      instruments:document.getElementById('g-inst').value,
      level:document.getElementById('g-level').value,
      notes:document.getElementById('g-notes').value,

  }catch(e){ts('Posted!');}
}

  el.innerHTML=venues.map(v=>`
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <div style="font-size:15px;font-weight:700;color:#111">${v.name}</div>
        <button onclick="delVenue('${v.id}')" style="background:transparent;border:none;color:#F09595;cursor:pointer">${ic('trash')}</button>
      </div>
      <div style="font-size:12px;color:#888;margin-bottom:4px">📍 ${v.address}</div>
      ${v.capacity?`<div style="font-size:12px;color:#888;margin-bottom:4px">👥 Capacity: ${v.capacity}</div>`:''}
      ${v.notes?`<div style="font-size:12px;color:#aaa;margin-top:4px">${v.notes}</div>`:''}
      <button class="bg" style="width:100%;margin-top:10px;font-size:12px" onclick="useVenue('${v.name.replace(/'/g,"\\'")}','${v.address.replace(/'/g,"\\'")}')">Use for next gig</button>
    </div>`).join('');
}

window.showAddVenue=function(){
  const m=document.createElement('div');m.className='modal-bg';m.id='avmodal';
  m.innerHTML=`<div class="modal">
    <div style="font-size:17px;font-weight:700;color:#111;margin-bottom:16px">Add venue</div>
    <div style="margin-bottom:12px"><span class="flbl">Venue name</span><input class="finp" id="vn" placeholder="e.g. DAR Constitution Hall"/></div>
    <div style="margin-bottom:12px"><span class="flbl">Address</span><input class="finp" id="va" placeholder="Full address"/></div>
    <div style="margin-bottom:12px"><span class="flbl">Capacity (optional)</span><input class="finp" id="vc" placeholder="500" type="number"/></div>
    <div style="margin-bottom:18px"><span class="flbl">Notes (parking, load-in, contact)</span><textarea class="finp" id="vno" rows="3" placeholder="Parking on 2nd St, side entrance for load-in…"></textarea></div>
    <div style="display:flex;gap:8px">
      <button class="bg" style="flex:1;padding:13px" onclick="document.getElementById('avmodal').remove()">Cancel</button>
      <button class="bt" style="flex:2;padding:13px;font-size:14px;font-weight:600" onclick="saveVenue()">Save venue</button>
    </div>
  </div>`;
  document.getElementById('app').appendChild(m);
}
window.saveVenue=async function(){
  const name=document.getElementById('vn').value.trim();
  const addr=document.getElementById('va').value.trim();
  if(!name||!addr){ts('Name and address required');return;}
  try{
    const ref=await addDoc(collection(db,'venues'),{name,address:addr,capacity:document.getElementById('vc').value,notes:document.getElementById('vno').value,managerId:CU.uid,created:new Date()});
    venues.push({id:ref.id,name,address:addr,capacity:document.getElementById('vc').value,notes:document.getElementById('vno').value});
    document.getElementById('avmodal')?.remove();renderVenues();ts('Venue "'+name+'" saved!');
  }catch(e){ts('Venue saved!');}
}
window.delVenue=async function(id){
  try{await deleteDoc(doc(db,'venues',id));venues=venues.filter(v=>v.id!==id);renderVenues();ts('Venue removed');}catch(e){ts('Removed!');}
}
window.useVenue=function(name,addr){go('post');setTimeout(()=>{const f=document.getElementById('g-loc');if(f)f.value=name+' — '+addr;},200);ts('Venue added to gig form!');}

async function loadResponses(){
  try{
    const s=await getDocs(query(collection(db,'responses'),orderBy('timestamp','desc')));
    const el=document.getElementById('resp-list');if(!el)return;
    if(s.empty){el.innerHTML='<p style="color:#aaa;font-size:13px;text-align:center;padding:20px 0">No responses yet</p>';return;}
    el.innerHTML=s.docs.map(d=>{
      const r=d.data();
      const cls=r.type==='available'?'tg':r.type==='no'?'tr':'ta';
      const label=r.type==='available'?'✅ Available':r.type==='no'?'❌ Unavailable':'⚡ Maybe';
      const time=r.timestamp?.toDate?r.timestamp.toDate().toLocaleDateString():'';
      return `<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5">
        <div style="flex:1"><div style="font-size:13px;font-weight:600;color:#111">${r.userEmail||'Member'}</div><div style="font-size:11px;color:#aaa">${time}</div></div>
        <span class="tag ${cls}">${label}</span>
      </div>`;
    }).join('');
  }catch(e){}
}

window.enableMgr=async function(){
  UP.roles=[...new Set([...(UP.roles||['musician']),'manager'])];
  await saveUP();render();ts('Manager role enabled! 🎯');
}

function profileHTML(){
  const name=CU.displayName||CU.email?.split('@')[0]||'Musician';
  const ini=name.substring(0,2).toUpperCase();
  const roles=UP.roles||['musician'];
  return `
<div style="background:#0d0d0d;padding:20px 16px 22px">
  <div style="display:flex;gap:14px;align-items:flex-start;margin-bottom:18px">
    <div class="av" style="width:58px;height:58px;font-size:18px;background:#B5D4F4;color:#0C447C">${ini}</div>
    <div style="flex:1">
      <div style="font-size:18px;font-weight:700;color:#fff;margin-bottom:3px">${name}</div>
      <div style="font-size:12px;color:#555;margin-bottom:6px">${CU.email}</div>
      <div style="display:flex;gap:6px;flex-wrap:wrap">
        ${roles.includes('musician')?'<span class="tag tg">Musician</span>':''}
        ${roles.includes('manager')?'<span class="tag tp">Manager</span>':''}
      </div>
    </div>
    <button style="padding:7px 12px;border-radius:8px;background:transparent;border:1px solid #333;color:#888;font-size:12px;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px" onclick="doSignOut()">${ic('out')} Out</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid #222;padding-top:16px">
    <div style="text-align:center"><div style="font-size:17px;font-weight:700;color:#fff">${groups.length}</div><div style="font-size:10px;color:#555;margin-top:2px">Groups</div></div>
    <div style="text-align:center;border-left:1px solid #222;border-right:1px solid #222"><div style="font-size:17px;font-weight:700;color:#fff">${venues.length}</div><div style="font-size:10px;color:#555;margin-top:2px">Venues</div></div>
    <div style="text-align:center"><div style="font-size:17px;font-weight:700;color:#fff">New</div><div style="font-size:10px;color:#555;margin-top:2px">Member</div></div>
  </div>
</div>
<div class="pad">
  <div style="margin-bottom:18px">
    <div class="st" style="margin-bottom:10px">My roles</div>
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button class="role-btn${roles.includes('musician')?' on':''}" onclick="toggleRole('musician')">🎻 Musician</button>
      <button class="role-btn${roles.includes('manager')?' on':''}" onclick="toggleRole('manager')">🎯 Manager</button>
    </div>
    <div style="font-size:11px;color:#aaa">You can hold both roles simultaneously</div>
  </div>
  <div style="margin-bottom:18px">
    <div class="st" style="margin-bottom:10px">Video reel</div>
    <div style="background:#0d0d0d;border-radius:12px;height:120px;display:flex;align-items:center;justify-content:center;cursor:pointer;position:relative;border:1px solid #222" onclick="ts('Video upload coming soon!')">
      <div style="width:44px;height:44px;border-radius:50%;background:#1D9E75;display:flex;align-items:center;justify-content:center">${ic('play')}</div>
      <div style="position:absolute;bottom:10px;left:12px;font-size:11px;color:rgba(255,255,255,.4)">Tap to upload your reel</div>
    </div>
  </div>
  <div>
    <div class="st" style="margin-bottom:10px">Skills</div>
    ${[['Classical',80],['Chamber',70],['Sight-reading',75],['Teaching',65]].map(([s,p])=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><span style="font-size:12px;color:#111;width:84px;flex-shrink:0">${s}</span><div class="skill-track"><div class="skill-fill" style="width:${p}%"></div></div><span style="font-size:11px;color:#aaa;width:34px;text-align:right">${p}%</span></div>`).join('')}
  </div>
</div>`;}

window.toggleRole=async function(role){
  const roles=UP.roles||['musician'];
  const idx=roles.indexOf(role);
  if(idx>-1){if(roles.length===1){ts('You must keep at least one role');return;}roles.splice(idx,1);}
  else roles.push(role);
  UP.roles=[...new Set(roles)];
  await saveUP();render();ts(UP.roles.includes(role)?role.charAt(0).toUpperCase()+role.slice(1)+' role enabled!':role+' role removed');
}
window.doSignOut=async function(){await signOut(auth);CU=null;UP={roles:['musician']};groups=[];venues=[];CP=[];render();}

onAuthStateChanged(auth,async user=>{
  CU=user;
  if(user){await loadUP();await loadGroups();await loadVenues();}
  render();
});
</script>
</body>
</html>
