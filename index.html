function showGreetingPopup(type,name){
  const g=GREETINGS[type];if(!g)return;
  document.getElementById('greeting-overlay')?.remove();

  const overlay=document.createElement('div');
  overlay.id='greeting-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px';

  // Generate particles
  const particles=g.notes.map((_,i)=>{
    const note=g.notes[i%g.notes.length];
    return `<div style="position:absolute;font-size:${14+Math.random()*16}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation:greetFloat ${3+Math.random()*4}s ease-in-out ${Math.random()*3}s infinite;opacity:0">${note}</div>`;
  }).join('');

  // Confetti dots
  const colors=['#1D9E75','#C9A84C','#ffffff','rgba(255,255,255,0.3)'];
  const confetti=Array.from({length:25},(_,i)=>`
    <div style="position:absolute;width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;border-radius:2px;
    left:${Math.random()*100}%;background:${colors[i%colors.length]};
    animation:greetFall ${2+Math.random()*3}s linear ${Math.random()*3}s infinite;opacity:0"></div>
  `).join('');

  overlay.innerHTML=`
    <style>
      @keyframes greetPop{0%{transform:scale(0.3) translateY(40px);opacity:0}70%{transform:scale(1.05) translateY(-5px)}100%{transform:scale(1) translateY(0);opacity:1}}
      @keyframes greetFloat{0%{transform:translateY(0) rotate(-10deg);opacity:0}20%{opacity:0.8}80%{opacity:0.5}100%{transform:translateY(-100px) rotate(15deg);opacity:0}}
      @keyframes greetFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
      @keyframes greetBounce{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-10px) rotate(5deg)}}
      @keyframes greetPulse{0%,100%{box-shadow:0 0 0 0 ${g.glow}}50%{box-shadow:0 0 0 12px transparent}}
      @keyframes greetTwinkle{0%,100%{opacity:0;transform:scale(0.3)}50%{opacity:1;transform:scale(1)}}
      @keyframes greetShimmer{0%{opacity:0.3}50%{opacity:0.8}100%{opacity:0.3}}
    </style>

    <!-- Background particles -->
    <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none">
      ${particles}${confetti}
    </div>

    <!-- Main card -->
    <div style="background:#0d0d0d;border:1.5px solid ${g.color};border-radius:24px;padding:36px 28px;width:100%;max-width:340px;text-align:center;position:relative;animation:greetPop 0.6s cubic-bezier(0.175,0.885,0.32,1.275) forwards;overflow:hidden">

      <!-- Glow background -->
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,${g.glow},transparent 70%);pointer-events:none"></div>

      <!-- Twinkling stars inside card -->
      ${Array.from({length:10},()=>`<div style="position:absolute;color:${g.color};font-size:${8+Math.random()*8}px;left:${5+Math.random()*90}%;top:${5+Math.random()*90}%;animation:greetTwinkle ${1.5+Math.random()*2}s ease-in-out ${Math.random()*2}s infinite">✦</div>`).join('')}

      <!-- Brand -->
      <div style="font-size:9px;color:${g.color};font-weight:700;letter-spacing:0.15em;margin-bottom:16px;position:relative">VIVACE EVENTS · VIRTUAL STUDIO ORCHESTRA LLC</div>

      <!-- Emoji with glow ring -->
      <div style="width:88px;height:88px;border-radius:50%;background:${g.glow};margin:0 auto 16px;display:flex;align-items:center;justify-content:center;animation:greetPulse 2s ease-in-out infinite;position:relative">
        <div style="width:72px;height:72px;border-radius:50%;border:2px solid ${g.color};display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5)">
          <span style="font-size:36px;animation:greetBounce 1.5s ease-in-out infinite">${g.emoji}</span>
        </div>
      </div>

      <!-- Title -->
      <div style="font-size:21px;font-weight:700;color:#fff;margin-bottom:10px;position:relative;line-height:1.3">${g.title(name)}</div>

      <!-- Divider -->
      <div style="display:flex;align-items:center;gap:8px;margin:0 auto 14px;width:80%;position:relative">
        <div style="flex:1;height:1px;background:${g.color};opacity:0.3"></div>
        <span style="color:${g.color};font-size:12px;animation:greetShimmer 2s ease-in-out infinite">✦</span>
        <div style="flex:1;height:1px;background:${g.color};opacity:0.3"></div>
      </div>

      <!-- Message -->
      <div style="font-size:14px;color:rgba(255,255,255,0.7);line-height:1.8;margin-bottom:16px;font-style:italic;white-space:pre-line;position:relative">${g.message}</div>

      <!-- From -->
      <div style="font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:22px;line-height:1.6;position:relative">
        ${g.from}<br>
        <span style="color:rgba(255,255,255,0.5);font-weight:600">Your Vivace Events Family</span>
      </div>

      <!-- Button -->
      <button onclick="document.getElementById('greeting-overlay').remove()"
        style="background:${g.color};color:#fff;border:none;border-radius:50px;padding:13px 32px;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;position:relative;animation:greetPulse 2s ease-in-out infinite;letter-spacing:0.03em">
        ${g.btn}
      </button>

      <!-- Small note -->
      <div style="margin-top:12px;font-size:10px;color:rgba(255,255,255,0.2);position:relative">Tap to close and continue</div>
    </div>
  `;

  document.getElementById('app').appendChild(overlay);
}
