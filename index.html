/* Hover tooltip for stage seats and bench */
.vv-tip{position:relative}
.vv-tip .vv-tip-body{visibility:hidden;opacity:0;position:absolute;bottom:calc(100% + 8px);background:linear-gradient(135deg,#fff,#fafffd);color:#0d0d0d;padding:10px 14px;border-radius:12px;font-size:12px;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.35),0 0 0 1px rgba(29,158,117,.25);z-index:9999;pointer-events:none;transition:opacity .15s ease;font-weight:500;line-height:1.4;text-align:left;max-width:280px}
/* default: center over the element */
.vv-tip .vv-tip-body{left:50%;transform:translateX(-50%)}
.vv-tip .vv-tip-body::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#fff}
/* If seat is first child of its row → anchor tooltip left */
.vv-row > .vv-tip:first-child .vv-tip-body{left:0;transform:none}
.vv-row > .vv-tip:first-child .vv-tip-body::after{left:18px;transform:none}
/* If seat is last child of its row → anchor tooltip right */
.vv-row > .vv-tip:last-child .vv-tip-body{left:auto;right:0;transform:none}
.vv-row > .vv-tip:last-child .vv-tip-body::after{left:auto;right:16px;transform:none}
/* Single seat in row stays centered (overrides above) */
.vv-row > .vv-tip:only-child .vv-tip-body{left:50%;transform:translateX(-50%)}
.vv-row > .vv-tip:only-child .vv-tip-body::after{left:50%;right:auto;transform:translateX(-50%)}
.vv-tip:hover .vv-tip-body{visibility:visible;opacity:1}
.vv-tip .vv-tip-name{font-weight:700;color:#0F6E56;margin-bottom:2px;font-size:13px}
.vv-tip .vv-tip-line{color:#555;font-size:11px}
.vv-tip .vv-tip-line .vv-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;vertical-align:middle}
.vv-tip .vv-tip-gold{color:#9c7a1e;font-weight:600}

function ts(m){
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';el.className='toast';document.getElementById('app').appendChild(el);}
  el.textContent=m;el.classList.add('show');
  clearTimeout(window._tt);window._tt=setTimeout(()=>el.classList.remove('show'),4000);
}

function isMgr(){return UP.roles&&UP.roles.includes('manager');}
function isOrganizer(){return UP.roles&&UP.roles.includes('organizer');}
function isTeacher(){return UP.roles&&UP.roles.includes('teacher');}
function isStudent(){return UP.roles&&UP.roles.includes('student');}
function canPostAudition(){return UP.roles&&(UP.roles.includes('manager')||UP.roles.includes('teacher')||UP.roles.includes('artist'));}

async function loadUP(){
  try{
    const d=await getDoc(doc(db,'users',CU.uid));
    // Try to read private data (only the owner can — Firestore rules enforce this)
    let priv={};
    try{
      const pd=await getDoc(doc(db,'users_private',CU.uid));
      if(pd.exists())priv=pd.data();
    }catch(e){}
    if(d.exists()){
      UP={...UP,...d.data(),...priv};
      // CU.email is always source of truth for login email
      UP.email=CU.email;
      // Language priority: saved profile > this-session choice > browser detect
      let sessLang=null;try{sessLang=sessionStorage.getItem('vv_lang');}catch(e){}
      lang=UP.lang||sessLang||detectLang();
      if(UP&&!UP.lang&&sessLang)UP.lang=sessLang;
      // Clean up legacy role names
      const validRoles=['artist','manager','teacher','student','organizer'];
      const roleMap={'musician':'artist','agent':'manager','mgr':'manager'};
      UP.roles=(UP.roles||['artist']).map(r=>roleMap[r]||r).filter(r=>validRoles.includes(r));
      if(UP.roles.length===0)UP.roles=['artist'];
      UP.roles=[...new Set(UP.roles)];
      // Save cleaned roles back silently
      if(d.data().roles&&JSON.stringify(d.data().roles)!==JSON.stringify(UP.roles)){
        setDoc(doc(db,'users',CU.uid),{roles:UP.roles},{merge:true}).catch(()=>{});
      }
      // ─── SECURITY MIGRATION ─── one-time per user, silent
      // Move sensitive fields out of the public users doc into the locked users_private doc.
      const pub=d.data();
      const needsMigration=pub.email||pub.phone||pub.hasWhatsApp!==undefined||pub.pushTokens||pub.stripeCustomerId||pub.pushEnabled!==undefined||pub.muteGroupMessages!==undefined;
      if(needsMigration){
        try{
          const privPayload={};
          if(pub.email)privPayload.email=pub.email;
          if(pub.phone)privPayload.phone=pub.phone;
          if(pub.hasWhatsApp!==undefined)privPayload.hasWhatsApp=pub.hasWhatsApp;
          if(pub.pushTokens)privPayload.pushTokens=pub.pushTokens;
          if(pub.pushEnabled!==undefined)privPayload.pushEnabled=pub.pushEnabled;
          if(pub.muteGroupMessages!==undefined)privPayload.muteGroupMessages=pub.muteGroupMessages;
          if(pub.stripeCustomerId)privPayload.stripeCustomerId=pub.stripeCustomerId;
          await setDoc(doc(db,'users_private',CU.uid),privPayload,{merge:true});
          // Overwrite public doc with ONLY safe fields (strips sensitive fields)
          const safeFields=['name','displayName','username','photoURL','roles','plan','lang','created','verified','verifiedAt','verifiedReason','featured','founderAccess','instruments','genres','primaryInstrument','reelURL','spotifyUrl','appleMusicUrl','bio','availableDates','documentationPending','cancellations','referralCode','giftCreditsAvailable','signedInFirstTime','tosAcceptedAt','language','radio','visibility','rosterDisclosureSeen','tosAccepted','tosVersion','trialStarted','trialExpiredShown','skills','ensembles','ensembleFormats','birthday','birthdayWishes','holidayGreetings','foundingMember','foundingNumber','unionMember','unionName'];
          const cleanPub={};
          safeFields.forEach(k=>{if(pub[k]!==undefined)cleanPub[k]=pub[k];});
          await setDoc(doc(db,'users',CU.uid),cleanPub);
          console.log('🔒 Security migration complete');
        }catch(mig){console.log('migration will retry next login:',mig);}
      }
      // Existing user arriving via an invite link → link to placeholder too
      if(window._pendingInvite){processPendingInvite();}
    }
    else{
      lang=detectLang();
      // Determine founding-member status: first 100 users get the badge.
      let foundingMember=false, foundingNumber=0;
      try{
        const counterRef=doc(db,'meta','signupCounter');
        const counterSnap=await getDoc(counterRef);
        const count=counterSnap.exists()?(counterSnap.data().count||0):0;
        const newCount=count+1;
        await setDoc(counterRef,{count:newCount},{merge:true});
        if(newCount<=100){foundingMember=true;foundingNumber=newCount;}
      }catch(e){console.log('founding counter:',e);}
      // Create public doc with safe fields only
      const newDoc={roles:['artist'],name:CU.displayName||CU.email.split('@')[0],lang,plan:'free',created:new Date()};
      if(foundingMember){newDoc.foundingMember=true;newDoc.foundingNumber=foundingNumber;}
      await setDoc(doc(db,'users',CU.uid),newDoc);
      // Create private doc (locked — only the owner can read)
      await setDoc(doc(db,'users_private',CU.uid),{email:CU.email});
      UP.email=CU.email;UP.name=CU.displayName||CU.email.split('@')[0];UP.plan='free';UP.roles=['artist'];
      if(foundingMember){UP.foundingMember=true;UP.foundingNumber=foundingNumber;}
      // brand-new user → send a warm welcome email
      sendWelcomeEmail();
      // If they arrived via an invite link, connect them to the manager's placeholder (no duplicate)
      if(window._pendingInvite){processPendingInvite();}
    }
  }catch(e){}
}

function detectLang(){
  const bl=navigator.language||'en';
  if(bl.startsWith('es'))return 'es';
  if(bl.startsWith('it'))return 'it';
  if(bl.startsWith('ru'))return 'ru';
  if(bl.startsWith('fr'))return 'fr';
  if(bl.startsWith('de'))return 'de';
  return 'en';
}

async function saveUP(){
  try{
    // Split into public (safe to expose) and private (sensitive)
    const privateKeys=['email','phone','hasWhatsApp','pushTokens','pushEnabled','muteGroupMessages','stripeCustomerId'];
    const pub={};const priv={};
    for(const k in UP){
      if(privateKeys.includes(k))priv[k]=UP[k];
      else pub[k]=UP[k];
    }
    await setDoc(doc(db,'users',CU.uid),pub,{merge:true});
    if(Object.keys(priv).length>0){
      await setDoc(doc(db,'users_private',CU.uid),priv,{merge:true});
    }
  }catch(e){}
}

// When a new user arrives via an invite link, connect their account to the
// manager's roster placeholder — fills in musicianId, prevents duplicates.
// Security: rules only allow claiming a placeholder whose musicianEmail matches
// the signed-in user's own verified email, so this is safe.
async function processPendingInvite(){
  if(!CU||!CU.email)return;
  try{
    // Find any unlinked placeholder addressed to THIS user's email.
    const snap=await getDocs(query(
      collection(db,'rosterMembers'),
      where('musicianEmail','==',CU.email.toLowerCase()),
      where('musicianId','==','')
    ));
    if(snap.empty){window._pendingInvite=null;return;}
    let linked=0;
    for(const d of snap.docs){
      try{
        await setDoc(doc(db,'rosterMembers',d.id),{
          musicianId:CU.uid,
          musicianName:UP.name||d.data().musicianName,
          joinedViaInvite:true,
          joinedAt:new Date(),
        },{merge:true});
        linked++;
      }catch(e){console.log('link one failed:',e);}
    }
    window._pendingInvite=null;
    if(linked>0)setTimeout(()=>ts('🎉 You\'re connected to your manager\'s roster!'),2000);
  }catch(e){console.log('processPendingInvite:',e);window._pendingInvite=null;}
}

// ─── USERNAME SYSTEM ─────────────────────────────────────────────
// Username = permanent public identity. Unique. Email stays changeable.
// A "usernames" collection maps lowercased username → uid (enforces uniqueness).
function normalizeUsername(u){
  return (u||'').toLowerCase().trim().replace(/[^a-z0-9_]/g,'');
}
function validUsername(u){
  const n=normalizeUsername(u);
  return n.length>=3 && n.length<=20;
}
// Check if a username is free. Returns {available:bool, reason:string}
async function checkUsernameAvailable(u){
  const n=normalizeUsername(u);
  if(n.length<3)return{available:false,reason:'At least 3 characters'};
  if(n.length>20)return{available:false,reason:'20 characters max'};
  try{
    const d=await getDoc(doc(db,'usernames',n));
    if(d.exists()){
      // taken — unless it's already this user's own
      if(d.data().uid===CU.uid)return{available:true,reason:'This is yours'};
      return{available:false,reason:'Taken — try another'};
    }
    return{available:true,reason:'Available!'};
  }catch(e){return{available:false,reason:'Could not check'};}
}
// Claim/set a username for the current user (frees old one if changing)
async function claimUsername(u){
  const n=normalizeUsername(u);
  if(!validUsername(n))return{ok:false,error:'3–20 letters, numbers, or _'};
  // RULE: usernames are PERMANENT. Once a user has one, they cannot change it.
  // This protects user identity (anti-impersonation) and is the locked architecture decision.
  if(UP&&UP.username&&UP.username!==n){
    return{ok:false,error:'Usernames are permanent and cannot be changed. Contact support if needed.'};
  }
  try{
    const chk=await checkUsernameAvailable(n);
    if(!chk.available)return{ok:false,error:chk.reason};
    // reserve new (first time claim)
    await setDoc(doc(db,'usernames',n),{uid:CU.uid,claimedAt:new Date()});
    await setDoc(doc(db,'users',CU.uid),{username:n},{merge:true});
    UP.username=n;
    return{ok:true,username:n};
  }catch(e){console.error('claimUsername:',e);return{ok:false,error:'Could not save'};}
}

  const inp=document.getElementById('uname-input');const st=document.getElementById('uname-status');

async function saveTOS(uid){
  try{
    const snap=await getDoc(doc(db,'users',uid));
    const existing=snap.exists()?snap.data():{};
    // Save (or update) acceptance with current version + timestamp
    if(!existing.tosAccepted||existing.tosVersion!==TOS_VERSION){
      await setDoc(doc(db,'users',uid),{
        tosAccepted:true,
        tosAcceptedAt:new Date(),
        tosVersion:TOS_VERSION
      },{merge:true});
    }
  }catch(e){}
}

window.setLang=function(l){
  lang=l;
  if(UP)UP.lang=l;           // set synchronously so any re-render reads the new value
  try{document.documentElement.setAttribute('lang',l);sessionStorage.setItem('vv_lang',l);}catch(e){}
  if(CU){saveUP();}          // persist in background
  // capture scroll position so the page doesn't jump to top (the "kickback")
  const scrOld=document.getElementById('scr');
  const savedScroll=scrOld?scrOld.scrollTop:0;
  render();
  const scrNew=document.getElementById('scr');
  if(scrNew)scrNew.scrollTop=savedScroll;
}

function gigStatusBadge(status){
  if(status==='filled') return `<span class="tag status-filled">⚫ ${t('gigFilled')}</span>`;
  if(status==='confirmed') return `<span class="tag status-confirmed">✅ ${t('gigConfirmed')}</span>`;
  if(status==='pending') return `<span class="tag status-pending">⏳ ${t('gigPending')}</span>`;
  return `<span class="tag status-open">🟢 ${t('gigOpen')}</span>`;
}

window.confirmFill=async function(gigId,gigTitle){
  try{
    const selected=[];
    document.querySelectorAll('.member-check.on').forEach(el=>{
      const id=el.id.replace('sel-','');
      selected.push(id);
    });
    await updateDoc(doc(db,'gigs',gigId),{status:'filled',filledAt:new Date(),confirmedApplicants:selected});
    const apps=await getDocs(query(collection(db,'applications'),where('gigId','==',gigId)));
    for(const a of apps.docs){
      const isConfirmed=selected.includes(a.id);
      await addDoc(collection(db,'notifications'),{
        toUserId:a.data().userId,toEmail:a.data().userEmail,
        gigId,gigTitle,
        type:isConfirmed?'confirmed':'filled',
        message:isConfirmed?t('confirmedMsg'):t('filledMsg'),
        read:false,timestamp:new Date()
      });
    }
    document.getElementById('fill-modal')?.remove();
    ts('Position filled! Everyone has been notified. ✅');
    setTimeout(loadGigs,500);
  }catch(e){ts('Done!');}
}

window.applyGig=async function(e,title,gigId){
  e.stopPropagation();
  try{
    // Check if blocked by "never again" from this gig's manager
    const gigSnap=await getDoc(doc(db,'gigs',gigId));
    const managerId=gigSnap.data()?.userId;
    if(managerId&&managerId!==CU.uid){
      const ratingId=managerId+'_'+CU.uid;
      const rSnap=await getDoc(doc(db,'ratings',ratingId));
      if(rSnap.exists()&&rSnap.data().priority==='never'){
        ts('You cannot apply to this manager\'s gigs.');
        return;
      }
    }
    await addDoc(collection(db,'applications'),{gig:title,gigId:gigId||'',userId:CU.uid,userEmail:CU.email,status:'pending',timestamp:new Date()});
    ts('Application sent! You\'ll be notified when a decision is made. 👍');
  }catch(e){ts('Application submitted!');}
}

window.generateContract=async function(gigId){
  const gigSnap=await getDoc(doc(db,'gigs',gigId));
  const g=gigSnap.data();
  const manager=document.getElementById('ct-manager').value;
  const musician=document.getElementById('ct-musician').value;
  const pay=document.getElementById('ct-pay').value;
  const payMethod=document.getElementById('ct-payment-method').value;
  const payTiming=document.getElementById('ct-payment-timing').value;
  const cancelNotice=document.getElementById('ct-cancel-notice').value;
  const cancelPenalty=document.getElementById('ct-cancel-penalty').value;
  const dress=document.getElementById('ct-dress').value;
  const callTime=document.getElementById('ct-calltime').value;
  const notes=document.getElementById('ct-notes').value;
  const contractId='contract_'+gigId+'_'+Date.now();
  const contractData={
    contractId,gigId,gigTitle:g.title,gigDate:g.date,gigTime:g.time,
    venue:g.location,manager,managerEmail:CU.email,musician,
    pay,payMethod,payTiming,cancelNotice,cancelPenalty,
    dress,callTime,notes,
    status:'sent',sentAt:new Date(),
    managerSigned:false,musicianSigned:false
  };
  try{
    await setDoc(doc(db,'contracts',contractId),contractData);
    // Notify musician
    await addDoc(collection(db,'notifications'),{
      toEmail:musician,type:'contract',
      message:`📄 You have a new performance agreement for "${g.title}" on ${g.date}. Please review and sign.`,
      contractId,read:false,timestamp:new Date()
    });
    document.getElementById('contract-modal')?.remove();
    // Show preview
    showContractPreview(contractData,true);
    ts('Contract sent to musician! 📄');
  }catch(e){ts('Contract generated!');}
}

window.signContract=async function(contractId, role){
  try{
    const update={};
    update[role==='manager'?'managerSigned':'musicianSigned']=true;
    update[role==='manager'?'managerSignedAt':'musicianSignedAt']=new Date();
    await setDoc(doc(db,'contracts',contractId),update,{merge:true});
    
    const snap=await getDoc(doc(db,'contracts',contractId));
    const c=snap.data();
    
    if(c.managerSigned&&c.musicianSigned){
      // Both signed — generate and store PDF
      ts('⏳ Generating secure PDF contract...');
      await generateAndStorePDF(c,contractId);
      ts('🎉 Contract fully signed and PDF secured!');
      await addDoc(collection(db,'notifications'),{
        toEmail:c.musician,type:'contract_signed',
        message:`✅ Performance agreement for "${c.gigTitle}" is fully signed. Your PDF is ready to download in Profile → My Contracts.`,
        contractId,read:false,timestamp:new Date()
      });
      await addDoc(collection(db,'notifications'),{
        toEmail:c.managerEmail,type:'contract_signed',
        message:`✅ "${c.gigTitle}" contract fully signed by both parties. PDF available in Profile → My Contracts.`,
        contractId,read:false,timestamp:new Date()
      });
    } else {
      ts('✍️ Signed! Waiting for the other party.');
      if(role==='manager'){
        await addDoc(collection(db,'notifications'),{
          toEmail:c.musician,type:'contract_sign_request',
          message:`✍️ Manager has signed the agreement for "${c.gigTitle}". Your signature is needed. Open Profile → My Contracts.`,
          contractId,read:false,timestamp:new Date()
        });
      }
    }
    document.getElementById('contract-preview')?.remove();
    const updated=await getDoc(doc(db,'contracts',contractId));
    showContractPreview(updated.data(),true);
  }catch(e){ts('Signed!');}
}

// ─── PDF GENERATION & SECURE STORAGE ────────────────────────────
async function generateAndStorePDF(c, contractId){
  try{
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,margin=20;
    let y=margin;

    // ── Header ──────────────────────────────────────────────────
    pdf.setFillColor(13,13,13);
    pdf.rect(0,0,W,45,'F');
    
    pdf.setTextColor(29,158,117);
    pdf.setFontSize(9);pdf.setFont('helvetica','bold');
    pdf.text('VIVACE EVENTS · VIRTUAL STUDIO ORCHESTRA LLC',margin,18);
    
    pdf.setTextColor(255,255,255);
    pdf.setFontSize(22);pdf.setFont('helvetica','bold');
    pdf.text('Performance Agreement',margin,30);
    
    pdf.setTextColor(100,100,100);
    pdf.setFontSize(8);pdf.setFont('helvetica','normal');
    pdf.text(`Contract #${contractId.slice(-12).toUpperCase()}`,margin,38);
    pdf.text(`Generated: ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}`,W-margin,38,{align:'right'});

    y=58;

    // ── Disclaimer ───────────────────────────────────────────────
    pdf.setFillColor(249,249,249);
    pdf.roundedRect(margin,y,W-2*margin,18,3,3,'F');
    pdf.setTextColor(120,120,120);
    pdf.setFontSize(7.5);pdf.setFont('helvetica','italic');
    const disclaimer='Vivace Events — Virtual Studio Orchestra LLC provides this platform as a service only and is not a party to this agreement, nor responsible for its terms, enforcement, or outcome. This agreement is solely between the Manager and Musician named below.';
    const dLines=pdf.splitTextToSize(disclaimer,W-2*margin-6);
    pdf.text(dLines,margin+3,y+6);
    y+=24;

    // ── Parties ──────────────────────────────────────────────────
    pdf.setTextColor(136,136,136);
    pdf.setFontSize(8);pdf.setFont('helvetica','bold');
    pdf.text('PARTIES TO THIS AGREEMENT',margin,y);
    y+=6;

    const halfW=(W-2*margin-6)/2;
    // Manager box
    pdf.setFillColor(225,245,238);
    pdf.roundedRect(margin,y,halfW,28,3,3,'F');
    pdf.setTextColor(8,80,65);
    pdf.setFontSize(7);pdf.setFont('helvetica','bold');
    pdf.text('MANAGER',margin+4,y+6);
    pdf.setFontSize(11);pdf.setFont('helvetica','bold');
    pdf.text(c.manager||'—',margin+4,y+14);
    pdf.setFontSize(8);pdf.setFont('helvetica','normal');
    pdf.text(c.managerEmail||'',margin+4,y+20);
    pdf.setTextColor(29,158,117);pdf.setFontSize(8);
    pdf.text(c.managerSigned?'✓ Signed':'Pending',margin+4,y+26);

    // Musician box
    const mx=margin+halfW+6;
    pdf.setFillColor(230,241,251);
    pdf.roundedRect(mx,y,halfW,28,3,3,'F');
    pdf.setTextColor(12,68,124);
    pdf.setFontSize(7);pdf.setFont('helvetica','bold');
    pdf.text('MUSICIAN',mx+4,y+6);
    pdf.setFontSize(11);pdf.setFont('helvetica','bold');
    pdf.text((c.musician||'—').split('@')[0],mx+4,y+14);
    pdf.setFontSize(8);pdf.setFont('helvetica','normal');
    pdf.text(c.musician||'',mx+4,y+20);
    pdf.setTextColor(29,158,117);pdf.setFontSize(8);
    pdf.text(c.musicianSigned?'✓ Signed':'Pending',mx+4,y+26);
    y+=36;

    // ── Agreement Details ────────────────────────────────────────
    pdf.setTextColor(136,136,136);
    pdf.setFontSize(8);pdf.setFont('helvetica','bold');
    pdf.text('AGREEMENT DETAILS',margin,y);
    y+=6;

    const rows=[
      ['Performance',c.gigTitle||'—'],
      ['Date',c.gigDate||'—'],
      ['Time',c.gigTime||'—'],
      ['Venue / Location',c.venue||'—'],
      ['Dress Code',c.dress||'—'],
      ['Call Time',c.callTime||'—'],
    ];
    rows.forEach(([label,value],i)=>{
      pdf.setFillColor(i%2===0?255:248,i%2===0?255:248,i%2===0?255:249);
      pdf.rect(margin,y,W-2*margin,8,'F');
      pdf.setTextColor(136,136,136);pdf.setFontSize(8);pdf.setFont('helvetica','normal');
      pdf.text(label,margin+3,y+5.5);
      pdf.setTextColor(30,30,30);pdf.setFont('helvetica','bold');
      pdf.text(value,margin+55,y+5.5);
      y+=8;
    });
    y+=6;

    // ── Compensation ─────────────────────────────────────────────
    pdf.setFillColor(250,238,218);
    pdf.roundedRect(margin,y,W-2*margin,24,3,3,'F');
    pdf.setTextColor(99,56,6);pdf.setFontSize(8);pdf.setFont('helvetica','bold');
    pdf.text('COMPENSATION',margin+4,y+7);
    pdf.setFontSize(18);
    pdf.text(c.pay||'—',margin+4,y+17);
    pdf.setFontSize(9);pdf.setFont('helvetica','normal');
    pdf.text(`${c.payMethod||''} · ${c.payTiming||''}`,margin+4,y+22);
    y+=32;

    // ── Cancellation Policy ──────────────────────────────────────
    pdf.setFillColor(252,235,235);
    pdf.roundedRect(margin,y,W-2*margin,18,3,3,'F');
    pdf.setTextColor(121,31,31);pdf.setFontSize(8);pdf.setFont('helvetica','bold');
    pdf.text('CANCELLATION POLICY',margin+4,y+7);
    pdf.setFontSize(9);pdf.setFont('helvetica','normal');
    pdf.text(`Notice required: ${c.cancelNotice||'—'}`,margin+4,y+13);
    pdf.text(`Penalty: ${c.cancelPenalty||'—'}`,margin+80,y+13);
    y+=26;

    // ── Notes ────────────────────────────────────────────────────
    if(c.notes){
      pdf.setTextColor(136,136,136);pdf.setFontSize(8);pdf.setFont('helvetica','bold');
      pdf.text('ADDITIONAL NOTES',margin,y);y+=5;
      pdf.setTextColor(80,80,80);pdf.setFont('helvetica','normal');
      const noteLines=pdf.splitTextToSize(c.notes,W-2*margin);
      pdf.text(noteLines,margin,y);
      y+=noteLines.length*5+8;
    }

    // ── Signatures ───────────────────────────────────────────────
    if(y>240)pdf.addPage();
    y=Math.max(y,220);
    pdf.setDrawColor(200,200,200);
    pdf.line(margin,y,margin+70,y);
    pdf.line(W-margin-70,y,W-margin,y);
    pdf.setTextColor(136,136,136);pdf.setFontSize(8);
    pdf.text(c.manager||'Manager',margin,y+5);
    pdf.text(c.managerSigned&&c.managerSignedAt?`Signed ${new Date(c.managerSignedAt.seconds*1000).toLocaleDateString()}`:'Not yet signed',margin,y+10);
    pdf.text((c.musician||'Musician').split('@')[0],W-margin-70,y+5);
    pdf.text(c.musicianSigned&&c.musicianSignedAt?`Signed ${new Date(c.musicianSignedAt.seconds*1000).toLocaleDateString()}`:'Not yet signed',W-margin-70,y+10);

    // ── Footer ───────────────────────────────────────────────────
    pdf.setFillColor(13,13,13);
    pdf.rect(0,285,W,12,'F');
    pdf.setTextColor(80,80,80);pdf.setFontSize(7);
    pdf.text('Vivace Events · Virtual Studio Orchestra LLC · vivaceevents.com',W/2,291,{align:'center'});
    pdf.text(`Contract ID: ${contractId}`,W/2,295,{align:'center'});

    // ── Save to Firebase Storage (SECURE) ────────────────────────
    const pdfBytes=pdf.output('arraybuffer');
    const storageRef=ref(storage,`contracts/${contractId}/agreement_${Date.now()}.pdf`);
    
    const metadata={
      contentType:'application/pdf',
      customMetadata:{
        contractId,
        managerEmail:c.managerEmail||'',
        musicianEmail:c.musician||'',
        gigTitle:c.gigTitle||'',
        generatedAt:new Date().toISOString(),
        securityLevel:'private'
      }
    };

    const snapshot=await uploadBytes(storageRef,pdfBytes,metadata);
    const downloadURL=await getDownloadURL(snapshot.ref);

    // Store secure URL in Firestore
    await setDoc(doc(db,'contracts',contractId),{
      pdfUrl:downloadURL,
      pdfGeneratedAt:new Date(),
      fullyExecuted:true
    },{merge:true});

    // Auto-download for current user
    const link=document.createElement('a');
    link.href=URL.createObjectURL(new Blob([pdfBytes],{type:'application/pdf'}));
    link.download=`VivaceEvents_Contract_${c.gigTitle?.replace(/\s+/g,'_')||'Agreement'}_${c.gigDate||''}.pdf`;
    link.click();

    return downloadURL;
  }catch(e){
    console.error('PDF generation error:',e);
    ts('Contract saved — PDF generation requires Firebase Storage to be enabled.');
  }
}

async function loadMyContracts(){

window.generateJobSheet=async function(gigId, musicianName, musicianEmail){
  const dressText=(document.getElementById('js-dress-text')?.value||'').trim();
  const extra=(document.getElementById('js-extra')?.value||'').trim();
  document.getElementById('jobsheet-modal')?.remove();
  ts('Generating job sheet…');
  // fetch gig
  let g={};
  try{const s=await getDoc(doc(db,'gigs',gigId));if(s.exists())g=s.data();}catch(e){}
  const managerName=g.managerName||UP.name||CU.displayName||CU.email?.split('@')[0]||'Manager';
  try{
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,margin=20;let y=margin;

    // Header
    pdf.setFillColor(13,13,13);pdf.rect(0,0,W,45,'F');
    pdf.setTextColor(29,158,117);pdf.setFontSize(9);pdf.setFont('helvetica','bold');
    pdf.text('VIVACE EVENTS · VIRTUAL STUDIO ORCHESTRA LLC',margin,18);
    pdf.setTextColor(255,255,255);pdf.setFontSize(22);pdf.setFont('helvetica','bold');
    pdf.text('Job Sheet',margin,30);
    pdf.setTextColor(150,150,150);pdf.setFontSize(8);pdf.setFont('helvetica','normal');
    pdf.text(`Ref #${gigId.slice(-10).toUpperCase()}`,margin,38);
    pdf.text(`Issued: ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}`,W-margin,38,{align:'right'});
    y=58;

    // Musician + Event summary boxes
    const halfW=(W-2*margin-6)/2;
    pdf.setFillColor(230,241,251);pdf.roundedRect(margin,y,halfW,26,3,3,'F');
    pdf.setTextColor(12,68,124);pdf.setFontSize(7);pdf.setFont('helvetica','bold');
    pdf.text('MUSICIAN',margin+4,y+6);
    pdf.setFontSize(12);pdf.setFont('helvetica','bold');
    pdf.text((musicianName||musicianEmail||'—').substring(0,26),margin+4,y+14);
    if(musicianEmail){pdf.setFontSize(8);pdf.setFont('helvetica','normal');pdf.text(musicianEmail.substring(0,30),margin+4,y+21);}
    const mx=margin+halfW+6;
    pdf.setFillColor(225,245,238);pdf.roundedRect(mx,y,halfW,26,3,3,'F');
    pdf.setTextColor(8,80,65);pdf.setFontSize(7);pdf.setFont('helvetica','bold');
    pdf.text('BOOKED BY',mx+4,y+6);
    pdf.setFontSize(12);pdf.setFont('helvetica','bold');
    pdf.text((managerName||'—').substring(0,26),mx+4,y+14);
    if(g.instruments){pdf.setFontSize(8);pdf.setFont('helvetica','normal');pdf.text(('Role: '+g.instruments).substring(0,30),mx+4,y+21);}
    y+=34;

    // Event details
    function section(title){pdf.setTextColor(136,136,136);pdf.setFontSize(8);pdf.setFont('helvetica','bold');pdf.text(title,margin,y);y+=6;}
    function row(label,val){if(!val)return;pdf.setTextColor(120,120,120);pdf.setFontSize(8);pdf.setFont('helvetica','normal');pdf.text(label,margin,y);pdf.setTextColor(30,30,30);pdf.setFontSize(10);pdf.setFont('helvetica','bold');const lines=pdf.splitTextToSize(String(val),W-2*margin-42);pdf.text(lines,margin+42,y);y+=Math.max(6,lines.length*5)+1;}

    section('EVENT');
    row('Event',g.title||'—');
    row('Type',g.type||'');
    row('Date',g.date?(g.date+(g.dateEnd&&g.dateEnd!==g.date?(' → '+g.dateEnd):'')):'');
    row('Time',g.time?(g.time+(g.timeEnd?(' – '+g.timeEnd):'')):'');
    if(g.duration)row('Duration',g.duration);
    row('Venue',g.location||g.onlinePlatform||'');
    if(g.onlineLink)row('Link',g.onlineLink);
    y+=2;

    section('COMPENSATION');
    row('Pay',g.pay||'To be discussed');
    y+=2;

    // Parking (if enabled)
    if(g.parkingEnabled){
      section('PARKING');
      row('Address',g.parkingAddress||'');
      if(g.parkingType)row('Type',g.parkingType);
      if(g.parkingSpots)row('Spots',g.parkingSpots);
      y+=2;
    }

    // DRESS CODE — the key feature (highlighted box)
    if(dressText){
      pdf.setFillColor(251,248,236);pdf.setDrawColor(232,214,154);
      const dcLines=pdf.splitTextToSize(dressText,W-2*margin-8);
      const boxH=12+dcLines.length*5;
      pdf.roundedRect(margin,y,W-2*margin,boxH,3,3,'FD');
      pdf.setTextColor(156,122,30);pdf.setFontSize(8);pdf.setFont('helvetica','bold');
      pdf.text('DRESS CODE',margin+4,y+7);
      pdf.setTextColor(60,50,20);pdf.setFontSize(10);pdf.setFont('helvetica','normal');
      pdf.text(dcLines,margin+4,y+13);
      y+=boxH+6;
    }

    // Extra notes
    if(extra){section('NOTES');pdf.setTextColor(50,50,50);pdf.setFontSize(9);pdf.setFont('helvetica','normal');const eLines=pdf.splitTextToSize(extra,W-2*margin);pdf.text(eLines,margin,y);y+=eLines.length*5+4;}
    if(g.notes){pdf.setTextColor(50,50,50);pdf.setFontSize(9);pdf.setFont('helvetica','normal');const nLines=pdf.splitTextToSize('Gig notes: '+g.notes,W-2*margin);pdf.text(nLines,margin,y);y+=nLines.length*5+4;}

    // Footer
    const fy=285;
    pdf.setDrawColor(220,220,220);pdf.line(margin,fy-6,W-margin,fy-6);
    pdf.setTextColor(150,150,150);pdf.setFontSize(7);pdf.setFont('helvetica','italic');
    pdf.text('Vivace Events provides this platform as a service only and is not a party to this booking. This sheet is between the Manager and Musician named above.',margin,fy,{maxWidth:W-2*margin});
    pdf.setTextColor(120,120,120);pdf.setFontSize(8);pdf.setFont('helvetica','bold');
    pdf.text('vivaceevents.com',W-margin,fy+8,{align:'right'});

    const fname=`Vivace_JobSheet_${(g.title||'Gig').replace(/\s+/g,'_')}_${g.date||''}.pdf`;
    pdf.save(fname);
    ts('📄 Job sheet ready!');
  }catch(e){console.error('job sheet error:',e);ts('Could not generate job sheet');}
};

window.executeEmergencyCancel=async function(gigId, gigTitle){
  document.getElementById('emergency-modal')?.remove();
  try{
    // Record emergency cancellation
    const cancelRecord={
      gigId,gigTitle,userId:CU.uid,userEmail:CU.email,
      type:'emergency',hoursNotice:_cancelState.hoursLeft,
      documentationRequired:true,documentationStatus:'pending',
      cancelledAt:new Date()
    };
    await addDoc(collection(db,'cancellations'),cancelRecord);

    // Update application
    const apps=await getDocs(query(collection(db,'applications'),where('gigId','==',gigId),where('userId','==',CU.uid)));
    for(const a of apps.docs) await updateDoc(doc(db,'applications',a.id),{status:'emergency_cancelled'});

    // Update user profile
    const userSnap=await getDoc(doc(db,'users',CU.uid));
    const userData=userSnap.exists()?userSnap.data():{};
    const cancellations=userData.cancellations||{voluntary:0,emergency:0};
    cancellations.emergency=(cancellations.emergency||0)+1;
    await setDoc(doc(db,'users',CU.uid),{cancellations,documentationPending:true},{merge:true});

    // Notify manager — URGENT
    const gigSnap=await getDoc(doc(db,'gigs',gigId));
    const managerEmail=gigSnap.data()?.postedBy;
    await addDoc(collection(db,'notifications'),{
      toEmail:managerEmail,type:'emergency_cancel',
      message:`🚨 EMERGENCY: ${CU.displayName||CU.email?.split('@')[0]||'A musician'} has an emergency and cannot perform at "${gigTitle}". They have been notified to submit documentation within 72 hours.`,
      read:false,timestamp:new Date(),urgent:true
    });

    // Show compassionate follow-up
    const followUp=document.createElement('div');followUp.className='modal-bg';followUp.id='emergency-followup';
    followUp.innerHTML=`<div class="modal" style="text-align:center">
      <div style="font-size:48px;margin-bottom:12px">💙</div>
      <div style="font-size:18px;font-weight:700;color:#111;margin-bottom:10px">Stay safe</div>
      <div style="font-size:13px;color:#666;line-height:1.7;margin-bottom:20px">
        Your booking has been cancelled and the manager has been notified.<br><br>
        When you're able, please submit documentation within <strong>72 hours</strong> to keep your record clean. No rush right now — take care of yourself first.
      </div>
      <div style="background:#E1F5EE;border-radius:12px;padding:14px;margin-bottom:20px">
        <div style="font-size:12px;color:#085041;line-height:1.6">
          📄 Accepted documents:<br>
          Doctor's note · Hospital record · Emergency services report · Any official document
        </div>
      </div>
      <button onclick="showDocUpload('${gigId}','${gigTitle}');document.getElementById('emergency-followup').remove()"
        class="bt" style="width:100%;padding:13px;margin-bottom:8px">Upload documentation now</button>
      <button onclick="document.getElementById('emergency-followup').remove()"
        style="width:100%;padding:12px;border-radius:10px;background:#f5f5f5;color:#555;border:1px solid #eee;font-size:13px;cursor:pointer;font-family:inherit">
        I'll do it later (72 hrs)
      </button>
    </div>`;
    document.getElementById('app').appendChild(followUp);
    setTimeout(loadGigs,500);
  }catch(e){ts('Emergency cancellation recorded. Stay safe. 💙');}
}

    </div>

      <button class="bg" style="flex:1;padding:13px" onclick="document.getElementById('report-modal').remove()">Cancel</button>

window.selectReportReason=function(reason){
  document.querySelectorAll('#report-reasons .cancel-reason').forEach(el=>el.classList.remove('sel','sel-red'));
  const el=document.getElementById('rr-'+reason);
  if(el)el.classList.add(reason==='safety'||reason==='fake_gig'||reason==='fake_profile'||reason==='fraud'?'sel-red':'sel');
  window._reportContext.reason=reason;
  const btn=document.getElementById('report-submit-btn');
  if(btn){btn.disabled=false;btn.style.background='#FF3B30';btn.style.color='#fff';btn.style.cursor='pointer';btn.onclick=submitReport;}
}

window.submitReport=async function(){
  const ctx=window._reportContext;
  if(!ctx.reason){ts('Please select a reason');return;}
  try{
    await addDoc(collection(db,'reports'),{
      type:ctx.type,targetId:ctx.targetId,targetName:ctx.targetName,
      targetEmail:ctx.targetEmail,reason:ctx.reason,
      details:document.getElementById('report-details')?.value||'',
      reportedBy:CU.uid,reporterEmail:CU.email,
      status:'pending_review',timestamp:new Date()
    });
    document.getElementById('report-modal')?.remove();
    ts('Report submitted. Thank you for helping keep Vivace Events safe. 🛡️');
  }catch(e){ts('Report submitted!');}
}

async function registerServiceWorker(){
  if(!('serviceWorker' in navigator))return null;
  try{
    const reg=await navigator.serviceWorker.register('/firebase-messaging-sw.js');
    return reg;
  }catch(e){console.log('SW register failed:',e);return null;}

// Ask permission + get the FCM token, save it to the user's profile
window.enablePushNotifications=async function(silent){
  if(!fbMessaging){if(!silent)ts('Push not supported on this device');return false;}
  if(!VAPID_KEY||VAPID_KEY.indexOf('REPLACE_WITH')===0){if(!silent)ts('Push setup pending (VAPID key)');return false;}
  try{
    const perm=await Notification.requestPermission();
    if(perm!=='granted'){if(!silent)ts('Notifications not allowed');return false;}
    const reg=await registerServiceWorker();
    const token=await getToken(fbMessaging,{vapidKey:VAPID_KEY,serviceWorkerRegistration:reg||undefined});
    if(token&&CU){
      // save token to PRIVATE user doc (only owner reads)
      let tokens=(UP&&UP.pushTokens)||[];
      if(!tokens.includes(token)){tokens.push(token);}
      await setDoc(doc(db,'users_private',CU.uid),{pushTokens:tokens,pushEnabled:true},{merge:true});
      if(UP){UP.pushTokens=tokens;UP.pushEnabled=true;}
      if(!silent)ts('🔔 Notifications on! You\'ll get alerts even when the app is closed.');
      return true;
    }
  }catch(e){console.log('push enable error:',e);if(!silent)ts('Could not enable notifications');}
  return false;
};

// Foreground messages — show a toast when app is open
function initForegroundPush(){
  if(!fbMessaging)return;
  try{
    onMessage(fbMessaging,function(payload){
      const body=(payload.notification&&payload.notification.body)||(payload.data&&payload.data.body)||'New message';
      const isEmerg=payload.data&&payload.data.emergency==='true';
      ts((isEmerg?'🚨 ':'📣 ')+body);
      checkNotifications();
    });
  }catch(e){}
}

      _availDates=new Set(d.available||d.dates||[]);
      _unavailDates=new Set(d.unavailable||[]);
      _perfEvents=d.events||{};
    }else{
      _availDates=new Set();_unavailDates=new Set();_perfEvents={};
    }
  }catch(e){_availDates=new Set();_unavailDates=new Set();_perfEvents={};}
  // Now show the modal fully formed in one step
  const m=document.createElement('div');m.className='modal-bg';m.id='avail-modal';
  // Force critical styles inline so the backdrop paints correctly on first open (not waiting on CSS class)
  m.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;display:flex;align-items:flex-end;justify-content:center';
  m.onclick=function(ev){if(ev.target===m)m.remove();};
  document.getElementById('app').appendChild(m);
  renderCalendarModal();
}

function renderCalendarModal(){
  const modal=document.getElementById('avail-modal');if(!modal)return;
  const year=_calYear,month=_calMonth;
  const monthName=new Date(year,month,1).toLocaleString('en',{month:'long',year:'numeric'});
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const today=new Date().toISOString().split('T')[0];

  let days='';
  for(let i=0;i<firstDay;i++) days+=`<div></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isAvail=_availDates.has(dateStr);
    const isUnavail=_unavailDates.has(dateStr);
    const isRangeStart=_rangeStart===dateStr;
    const isRangeEnd=_rangeEnd===dateStr;
    const isInRange=_rangeStart&&_rangeEnd&&dateStr>_rangeStart&&dateStr<_rangeEnd;
    const perf=_perfEvents[dateStr];
    const isPast=dateStr<today;
    const isToday=dateStr===today;

    let bg='transparent',color='#333',border='2px solid transparent';
    if(isRangeStart||isRangeEnd){bg='#0C447C';color='#fff';}
    else if(isInRange){bg='#E6F1FB';color='#0C447C';}
    else if(isAvail){bg='#1D9E75';color='#fff';}
    else if(isUnavail){bg='#FF3B30';color='#fff';}
    else if(perf){bg='#f5f0ff';}
    if(isToday&&bg==='transparent')border='2px solid #1D9E75';
    if(isPast){color='#ccc';}

    days+=`<div 
      onclick="${isPast?'':'handleCalDay(\''+dateStr+'\')'}"
      style="aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;font-size:13px;font-weight:${isToday?'700':'400'};cursor:${isPast?'default':'pointer'};

      ${d}
      ${perf?`<div style="width:5px;height:5px;border-radius:50%;background:${perf.isPublic?'#7C3AED':'#aaa'};position:absolute;bottom:3px"></div>`:''}
    </div>`;

  modal.innerHTML=`<div class="modal" style="background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;padding:20px;position:relative;z-index:1">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="font-size:17px;font-weight:700;color:#111">📅 My Calendar</div>
      <button onclick="document.getElementById('avail-modal').remove()" style="background:none;border:none;font-size:22px;color:#888;cursor:pointer">✕</button>
    </div>

    <!-- Legend -->
    <div style="display:flex;gap:12px;margin-bottom:8px;flex-wrap:wrap">
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#555">
        <div style="width:14px;height:14px;border-radius:4px;background:#1D9E75"></div>Available
      </div>
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#555">
        <div style="width:14px;height:14px;border-radius:4px;background:#FF3B30"></div>Unavailable
      </div>
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#555">
        <div style="width:14px;height:14px;border-radius:4px;background:#f5f0ff;border:1px solid #ddd;position:relative;display:flex;align-items:flex-end;justify-content:center;padding-bottom:1px"><div style="width:5px;height:5px;border-radius:50%;background:#7C3AED"></div></div>Performance
      </div>
    </div>
    <div style="font-size:11px;color:#1D9E75;margin-bottom:12px;font-weight:600">💡 Tap a date to set it · Tap two dates to select a range</div>

    <!-- Month navigation -->
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <button onclick="calNav(-1)" style="background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px;color:#555">‹</button>
      <div style="font-size:15px;font-weight:600;color:#111">${monthName}</div>
      <button onclick="calNav(1)" style="background:none;border:none;font-size:20px;cursor:pointer;padding:4px 8px;color:#555">›</button>
    </div>

    <!-- Day headers -->
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">
      ${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div style="text-align:center;font-size:11px;color:#aaa;font-weight:600;padding:4px 0">${d}</div>`).join('')}
    </div>

    <!-- Calendar grid -->
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:16px">
      ${days}

    <!-- Quick actions -->
    <div style="display:flex;gap:8px;margin-bottom:8px">
      <button onclick="markWeekdays()" style="flex:1;padding:8px;border-radius:8px;background:#f5f5f5;border:1px solid #eee;color:#555;font-size:11px;cursor:pointer;font-family:inherit">Weekdays</button>
      <button onclick="markWeekends()" style="flex:1;padding:8px;border-radius:8px;background:#f5f5f5;border:1px solid #eee;color:#555;font-size:11px;cursor:pointer;font-family:inherit">Weekends</button>

        <button onclick="applyRange('available')" style="flex:1;padding:6px 10px;border-radius:8px;background:#1D9E75;border:none;color:#fff;font-size:11px;cursor:pointer;font-family:inherit">✅ Available</button>

// Handle calendar day tap — show options
let _perfEvents={}; // {dateStr: {title, venue, time, ticketLink, isPublic}}

window.handleCalDay=function(dateStr){
  // RANGE MODE: taps build a start→end range
  if(window._rangeMode){
    // first tap sets start
    if(!_rangeStart){_rangeStart=dateStr;_rangeEnd=null;renderCalendarModal();return;}
    // tapping start again clears it
    if(_rangeStart===dateStr&&!_rangeEnd){_rangeStart=null;renderCalendarModal();return;}
    // second tap sets end (auto-orders)
    if(_rangeStart&&!_rangeEnd){
      if(dateStr<_rangeStart){_rangeEnd=_rangeStart;_rangeStart=dateStr;}
      else _rangeEnd=dateStr;
      renderCalendarModal();return;
    }
    // range complete → start a new one
    if(_rangeStart&&_rangeEnd){_rangeStart=dateStr;_rangeEnd=null;renderCalendarModal();return;}
    return;
  }

  // SINGLE-DAY MODE — show day options
  const perf=_perfEvents[dateStr];
  const isAvail=_availDates.has(dateStr);
  const isUnavail=_unavailDates&&_unavailDates.has(dateStr);

  // Show action sheet
  const existing=document.getElementById('cal-action');

  const sheet=document.createElement('div');

  sheet.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:10000;display:flex;align-items:flex-end;justify-content:center';
  // Tap the dark backdrop to close (prevents the overlay from locking the screen)
  sheet.onclick=function(ev){if(ev.target===sheet)sheet.remove();};
  
  const date=new Date(dateStr+'T00:00:00');
  const dateLabel=date.toLocaleDateString('en',{weekday:'long',month:'long',day:'numeric'});
  
  sheet.innerHTML=`<div style="background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px">
    <div style="font-size:15px;font-weight:700;color:#111;margin-bottom:4px">${dateLabel}</div>
    ${perf?`<div style="background:${perf.isPublic?'#f5f0ff':'#f5f5f5'};border-radius:10px;padding:12px;margin-bottom:14px">
      <div style="font-size:13px;font-weight:600;color:#111">${perf.isPublic?'🎵':'🔒'} ${perf.title}</div>
      ${perf.isPublic?`<div style="font-size:12px;color:#666;margin-top:2px">📍 ${perf.venue} · ⏰ ${perf.time}</div>`:'<div style="font-size:12px;color:#aaa;margin-top:2px">Private — only shows as busy</div>'}
    </div>`:''}
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
      <button onclick="setDayStatus('${dateStr}','available');document.getElementById('cal-action').remove()" 
        style="padding:13px;border-radius:10px;background:${isAvail?'#1D9E75':'#E1F5EE'};border:${isAvail?'none':'1px solid #5DCAA5'};color:${isAvail?'#fff':'#085041'};font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-align:left">
        ✅ ${isAvail?'Available (current)':'Mark as available'}
      </button>
      <button onclick="setDayStatus('${dateStr}','unavailable');document.getElementById('cal-action').remove()"
        style="padding:13px;border-radius:10px;background:${isUnavail?'#FF3B30':'#FCEBEB'};border:${isUnavail?'none':'1px solid #F09595'};color:${isUnavail?'#fff':'#791F1F'};font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-align:left">
        ❌ ${isUnavail?'Unavailable (current)':'Mark as unavailable'}
      </button>
      ${isAvail||isUnavail?`<button onclick="setDayStatus('${dateStr}','clear');document.getElementById('cal-action').remove()"
        style="padding:13px;border-radius:10px;background:#f5f5f5;border:1px solid #eee;color:#555;font-size:14px;cursor:pointer;font-family:inherit;text-align:left">
        ⚪ Clear — remove marking
      </button>`:''}
      <button onclick="showAddPerformance('${dateStr}');document.getElementById('cal-action').remove()"
        style="padding:13px;border-radius:10px;background:#f5f0ff;border:none;color:#5B21B6;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-align:left">
        ${perf?'✏️ Edit performance/event':'🎵 Add performance or event'}
      </button>
      ${perf?`<button onclick="deletePerf('${dateStr}');document.getElementById('cal-action').remove()"
        style="padding:13px;border-radius:10px;background:#FCEBEB;border:none;color:#791F1F;font-size:14px;cursor:pointer;font-family:inherit;text-align:left">
        🗑️ Remove event
      </button>`:''}
    </div>
    <button onclick="document.getElementById('cal-action').remove()" 
      style="width:100%;padding:13px;border-radius:10px;background:#f5f5f5;border:none;color:#555;font-size:14px;cursor:pointer;font-family:inherit">
      Cancel
    </button>
  </div>`;
  document.getElementById('app').appendChild(sheet);
}

// Mouse drag for desktop range selection
let _isDragging=false;
window.startCalDrag=function(dateStr){
  _isDragging=true;
  _rangeStart=dateStr;
  _rangeEnd=null;
  renderCalendarModal();
}
window.updateCalDrag=function(dateStr){
  if(!_isDragging||!_rangeStart)return;
  if(dateStr===_rangeStart){_rangeEnd=null;}
  else if(dateStr<_rangeStart){_rangeEnd=_rangeStart;_rangeStart=dateStr;}
  else{_rangeEnd=dateStr;}
  renderCalendarModal();
}
window.endCalDrag=function(){
  _isDragging=false;
}
document.addEventListener('mouseup',()=>{_isDragging=false;});

window.applyRange=function(status){
  if(!_rangeStart||!_rangeEnd)return;
  const start=new Date(_rangeStart+'T00:00:00');
  const end=new Date(_rangeEnd+'T00:00:00');
  const d=new Date(start);
  while(d<=end){
    const dateStr=d.toISOString().split('T')[0];
    if(status==='available'){_availDates.add(dateStr);_unavailDates.delete(dateStr);}
    else if(status==='unavailable'){_unavailDates.add(dateStr);_availDates.delete(dateStr);}
    else if(status==='clear'){_availDates.delete(dateStr);_unavailDates.delete(dateStr);}
    d.setDate(d.getDate()+1);
  }
  const count=Math.round((end-start)/(1000*60*60*24))+1;
  _rangeStart=null;_rangeEnd=null;
  renderCalendarModal();
  ts(`${status==='available'?'✅':status==='unavailable'?'❌':'⚪'} ${count} days updated!`);
}

window.clearRange=function(){
  _rangeStart=null;_rangeEnd=null;
  renderCalendarModal();
}

window.toggleRangeMode=function(){
  window._rangeMode=!window._rangeMode;
  _rangeStart=null;_rangeEnd=null;
  renderCalendarModal();
}

window.deletePerf=function(dateStr){
  delete _perfEvents[dateStr];
  renderCalendarModal();
}

    <!-- PUBLIC TOGGLE — the key feature -->

window.togglePublicPerf=function(){
  const tgl=document.getElementById('public-tgl');
  const desc=document.getElementById('public-desc');
  const isOn=tgl.classList.contains('on');
  tgl.classList.toggle('on',!isOn);tgl.classList.toggle('off',isOn);
  if(desc)desc.textContent=!isOn?'Anyone can see your concert details + ticket link':'Only shows as busy — no details visible';
}

window.savePerformance=function(dateStr){
  const title=document.getElementById('perf-title').value.trim();
  const venue=document.getElementById('perf-venue').value.trim();
  const time=document.getElementById('perf-time').value.trim();
  const ticketLink=document.getElementById('perf-link').value.trim();
  const isPublic=document.getElementById('public-tgl')?.classList.contains('on');
  if(!title||!venue||!time){ts('Please fill in name, venue and time');return;}
  _perfEvents[dateStr]={title,venue,time,ticketLink,isPublic};
  document.getElementById('perf-form')?.remove();
  showAvailabilityCalendar();
  ts(isPublic?'🎵 Performance added — visible to everyone!':'🔒 Event saved — shows as busy only');
}

window.calNav=function(dir){
  _calMonth+=dir;
  if(_calMonth>11){_calMonth=0;_calYear++;}
  if(_calMonth<0){_calMonth=11;_calYear--;}
  renderCalendarModal();
}

window.setDayStatus=function(dateStr, status){
  // Always remove the day action sheet first (prevents a lingering translucent overlay)
  const sheet=document.getElementById('cal-action');if(sheet)sheet.remove();
  if(status==='available'){
    _availDates.add(dateStr);
    _unavailDates.delete(dateStr);
  } else if(status==='unavailable'){
    _unavailDates.add(dateStr);
    _availDates.delete(dateStr);
  } else if(status==='clear'){
    _availDates.delete(dateStr);
    _unavailDates.delete(dateStr);
  }
  renderCalendarModal();
}

window.toggleDay=function(dateStr){
  if(_availDates.has(dateStr))_availDates.delete(dateStr);
  else _availDates.add(dateStr);
  renderCalendarModal();
}

window.markWeekdays=function(){showBulkPicker('weekdays');}
window.markWeekends=function(){showBulkPicker('weekends');}

window.showBulkPicker=function(type){
  const m=document.createElement('div');
  m.id='bulk-picker';
  m.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:10001;display:flex;align-items:flex-end;justify-content:center';
  const label=type==='weekdays'?'weekdays':'weekends';
  m.innerHTML=`<div style="background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:480px;padding:20px">
    <div style="font-size:15px;font-weight:700;color:#111;margin-bottom:4px">Mark all ${label} as…</div>
    <div style="font-size:12px;color:#aaa;margin-bottom:16px">Applies to current month only</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">
      <button onclick="applyBulk('${type}','available')" style="padding:13px;border-radius:10px;background:#E1F5EE;border:1px solid #5DCAA5;color:#085041;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-align:left">✅ Available for gigs</button>
      <button onclick="applyBulk('${type}','unavailable')" style="padding:13px;border-radius:10px;background:#FCEBEB;border:1px solid #F09595;color:#791F1F;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;text-align:left">❌ Unavailable / Busy</button>
      <button onclick="applyBulk('${type}','clear')" style="padding:13px;border-radius:10px;background:#f5f5f5;border:1px solid #eee;color:#555;font-size:14px;cursor:pointer;font-family:inherit;text-align:left">⚪ Clear all markings</button>
    </div>
    <button onclick="document.getElementById('bulk-picker').remove()" style="width:100%;padding:12px;border-radius:10px;background:#f5f5f5;border:none;color:#555;font-size:14px;cursor:pointer;font-family:inherit">Cancel</button>
  </div>`;
  document.body.appendChild(m);
}

window.applyBulk=function(type, status){
  const year=_calYear,month=_calMonth;
  const daysInMonth=new Date(year,month+1,0).getDate();
  let count=0;
  for(let d=1;d<=daysInMonth;d++){
    const date=new Date(year,month,d);
    const dow=date.getDay();
    const isWeekday=dow>0&&dow<6;
    const isWeekend=dow===0||dow===6;
    if((type==='weekdays'&&isWeekday)||(type==='weekends'&&isWeekend)){
      const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      if(status==='available'){_availDates.add(dateStr);_unavailDates.delete(dateStr);}
      else if(status==='unavailable'){_unavailDates.add(dateStr);_availDates.delete(dateStr);}
      else{_availDates.delete(dateStr);_unavailDates.delete(dateStr);}
      count++;
    }
  }
  document.getElementById('bulk-picker')?.remove();
  renderCalendarModal();
  ts(`${status==='available'?'✅':status==='unavailable'?'❌':'⚪'} ${count} ${type} updated!`);
}

window.clearMonth=function(){
  const year=_calYear,month=_calMonth;
  const daysInMonth=new Date(year,month+1,0).getDate();
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    _availDates.delete(dateStr);
    _unavailDates.delete(dateStr);
  }
  renderCalendarModal();
  ts('⚪ Month cleared!');
}

window.saveAvailability=async function(){
  try{
    const dates=[..._availDates].sort();
    const unavailDates=[..._unavailDates].sort();
    await setDoc(doc(db,'availability',CU.uid),{
      userId:CU.uid,userEmail:CU.email,
      available:dates,unavailable:unavailDates,
      dates,events:_perfEvents,updatedAt:new Date()
    });
    await setDoc(doc(db,'users',CU.uid),{availableDates:dates},{merge:true});
    document.getElementById('avail-modal')?.remove();
    loadAvailabilityPreview();
    ts(`✅ Calendar saved — ${dates.length} available, ${unavailDates.length} unavailable!`);
  }catch(e){console.error('saveAvailability failed:',e);ts('⚠️ Could not save — please try again');}
}

async function loadAvailabilityPreview(){
  const el=document.getElementById('availability-preview');if(!el)return;
  try{
    const snap=await getDoc(doc(db,'availability',CU.uid));
    const data=snap.exists()?snap.data():{};
    const avail=(data.available||data.dates||[]).slice().sort();
    const unavail=(data.unavailable||[]).slice().sort();

    if(avail.length===0&&unavail.length===0){
      el.innerHTML=`<div style="padding:12px;background:#f9f9f9;border-radius:10px;text-align:center;font-size:13px;color:#aaa;cursor:pointer" onclick="showAvailabilityCalendar()">${t('setDates')}</div>`;
      return;
    }

    const now=new Date().toISOString().split('T')[0];
    const fmt=d=>new Date(d+'T00:00:00').toLocaleDateString('en',{month:'short',day:'numeric'});
    const futureAvail=avail.filter(d=>d>=now);
    const futureUnavail=unavail.filter(d=>d>=now);

    el.innerHTML=`
      <div style="background:#f9fbfa;border:1px solid #eee;border-radius:12px;padding:12px;margin-bottom:8px">
        ${futureAvail.length?`
        <div style="font-size:11px;font-weight:700;color:#0F6E56;margin-bottom:6px">✅ AVAILABLE · ${futureAvail.length} day${futureAvail.length===1?'':'s'}</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:${futureUnavail.length?'12px':'0'}">
          ${futureAvail.slice(0,8).map(d=>`<span style="padding:4px 9px;border-radius:20px;background:#E1F5EE;border:1px solid #5DCAA5;font-size:11px;color:#085041;font-weight:600">${fmt(d)}</span>`).join('')}
          ${futureAvail.length>8?`<span style="font-size:11px;color:#aaa;padding:4px 0">+${futureAvail.length-8} more</span>`:''}
        </div>`:''}
        ${futureUnavail.length?`
        <div style="font-size:11px;font-weight:700;color:#791F1F;margin-bottom:6px">❌ UNAVAILABLE · ${futureUnavail.length} day${futureUnavail.length===1?'':'s'}</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px">
          ${futureUnavail.slice(0,8).map(d=>`<span style="padding:4px 9px;border-radius:20px;background:#FCEBEB;border:1px solid #F09595;font-size:11px;color:#791F1F;font-weight:600">${fmt(d)}</span>`).join('')}
          ${futureUnavail.length>8?`<span style="font-size:11px;color:#aaa;padding:4px 0">+${futureUnavail.length-8} more</span>`:''}
        </div>`:''}
        ${futureAvail.length===0&&futureUnavail.length===0?`<div style="font-size:12px;color:#aaa">Your saved dates are all in the past. Tap below to set new ones.</div>`:''}
      </div>
      <button onclick="showAvailabilityCalendar()" style="font-size:12px;color:#1D9E75;background:none;border:none;cursor:pointer;padding:0;font-weight:600">📅 View &amp; edit full calendar →</button>
    `;
  }catch(e){console.log('avail preview:',e);}
}

window.sendLessonRequest=async function(teacherId, teacherName, teacherEmail){
  const subject=document.getElementById('lesson-subject')?.value?.trim();
  const level=document.getElementById('lesson-level')?.value;
  const date=document.getElementById('lesson-date')?.value;
  const time=document.getElementById('lesson-time')?.value;
  const duration=document.getElementById('lesson-duration')?.value;
  const format=document.getElementById('lesson-format')?.value;
  const message=document.getElementById('lesson-message')?.value?.trim();

  if(!subject){ts('Please enter an instrument or subject');return;}
  if(!date){ts('Please select a preferred date');return;}

  try{
    const lessonId=`lesson_${Date.now()}`;
    const studentName=CU.displayName||CU.email?.split('@')[0]||'Student';

    // Save lesson request
    await setDoc(doc(db,'lessons',lessonId),{
      teacherId,teacherName,teacherEmail,
      studentId:CU.uid,studentEmail:CU.email,studentName,
      subject,level,date,time,duration,format,
      message:message||'',
      status:'pending',
      createdAt:new Date()
    });

    // Notify teacher
    await addDoc(collection(db,'notifications'),{
      toEmail:teacherEmail,
      type:'lesson_request',
      lessonId,
      message:`📚 ${studentName} wants to book a ${duration} ${subject} lesson on ${date} at ${time}. Level: ${level}.`,
      studentId:CU.uid,studentEmail:CU.email,studentName,
      read:false,timestamp:new Date()
    });

    document.getElementById('book-lesson-modal')?.remove();
    ts('📚 Lesson request sent! Teacher will respond shortly.');
  }catch(e){ts('Request sent!');}
}

// ─── TEACHER: VIEW & MANAGE LESSON REQUESTS ──────────────────────
async function loadMyLessons(){
  const el=document.getElementById('my-lessons');if(!el)return;
  try{
    const field=isTeacher()?'teacherId':'studentId';
    const snap=await getDocs(query(collection(db,'lessons'),where(field,'==',CU.uid)));
    const lessons=snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>new Date(a.date)-new Date(b.date));

    if(lessons.length===0){
      el.innerHTML=`<div style="padding:12px;background:#f9f9f9;border-radius:10px;text-align:center;font-size:13px;color:#aaa">
        ${isTeacher()?'No lesson requests yet':'No lessons booked yet'}
      </div>`;
      return;
    }

    el.innerHTML=lessons.map(l=>{
      const isMyLesson=isTeacher();
      const statusColor=l.status==='confirmed'?'#1D9E75':l.status==='declined'?'#FF3B30':'#EF9F27';
      const statusLabel=l.status==='confirmed'?'✅ Confirmed':l.status==='declined'?'❌ Declined':'⏳ Pending';
      return `
        <div style="border:1px solid #eee;border-radius:12px;padding:12px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
            <div>
              <div style="font-size:13px;font-weight:600;color:#111">📚 ${l.subject} — ${l.level}</div>
              <div style="font-size:12px;color:#888">${isMyLesson?l.studentName:l.teacherName} · ${l.date} at ${l.time}</div>
              <div style="font-size:11px;color:#aaa">${l.duration} · ${l.format}</div>
            </div>
            <span style="font-size:11px;padding:3px 10px;border-radius:20px;background:${statusColor}22;color:${statusColor};font-weight:600">${statusLabel}</span>
          </div>
          ${l.message?`<div style="font-size:12px;color:#666;background:#f9f9f9;border-radius:8px;padding:8px;margin-bottom:8px">"${l.message}"</div>`:''}
          ${isMyLesson&&l.status==='pending'?`
            <div style="display:flex;gap:6px">
              <button onclick="respondLesson('${l.id}','confirmed','${l.studentEmail}')" 
                style="flex:1;padding:8px;border-radius:8px;background:#1D9E75;border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">
                ✅ Accept
              </button>
              <button onclick="respondLesson('${l.id}','declined','${l.studentEmail}')"
                style="flex:1;padding:8px;border-radius:8px;background:#FCEBEB;border:1px solid #F09595;color:#791F1F;font-size:12px;cursor:pointer;font-family:inherit">
                ❌ Decline
              </button>
            </div>`:''}
          ${!isMyLesson&&l.status==='confirmed'?`
            <button onclick="openChat('${l.teacherId}','${l.teacherEmail}','${l.teacherName}')"
              style="width:100%;padding:8px;border-radius:8px;background:#f5f0ff;border:1px solid #7C3AED44;color:#7C3AED;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">
              💬 Message teacher
            </button>`:''}
        </div>`;
    }).join('');
  }catch(e){
    el.innerHTML=`<div style="font-size:13px;color:#aaa;text-align:center;padding:12px">Could not load lessons</div>`;
  }
}

window.respondLesson=async function(lessonId, status, studentEmail){
  try{
    await setDoc(doc(db,'lessons',lessonId),{status,respondedAt:new Date()},{merge:true});
    const l=(await getDoc(doc(db,'lessons',lessonId))).data();
    await addDoc(collection(db,'notifications'),{
      toEmail:studentEmail,
      type:'lesson_response',
      lessonId,
      message:status==='confirmed'
        ?`✅ ${l.teacherName} accepted your lesson request for ${l.date} at ${l.time}! 🎉`
        :`❌ ${l.teacherName} is not available for ${l.date} at ${l.time}. Please try a different time.`,
      read:false,timestamp:new Date()
    });
    ts(status==='confirmed'?'✅ Lesson confirmed! Student has been notified.':'Lesson declined.');
    loadMyLessons();
  }catch(e){ts('Done!');}
}

async function loadTeacherAnalytics(){
  const el=document.getElementById('analytics-content');if(!el)return;
  try{
    const[lessonsSnap,earningsSnap]=await Promise.all([
      getDocs(query(collection(db,'lessons'),where('teacherId','==',CU.uid))),
      getDocs(query(collection(db,'earnings'),where('userId','==',CU.uid)))
    ]);
    const lessons=lessonsSnap.docs.map(d=>({id:d.id,...d.data()}));
    const earnings=earningsSnap.docs.map(d=>({id:d.id,...d.data()}));
    const confirmed=lessons.filter(l=>l.status==='confirmed');
    const pending=lessons.filter(l=>l.status==='pending');
    const students=new Set(confirmed.map(l=>l.studentId));
    const totalRevenue=earnings.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
    const now=new Date();
    const thisMonth=earnings.filter(e=>{const d=e.date?.toDate?e.date.toDate():new Date(e.date||0);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
    const subjects={};lessons.forEach(l=>{if(l.subject)subjects[l.subject]=(subjects[l.subject]||0)+1;});
    el.innerHTML=`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
        <div style="background:linear-gradient(135deg,#7C3AED,#5B21B6);border-radius:12px;padding:14px;color:#fff">
          <div style="font-size:28px;font-weight:700">${confirmed.length}</div>
          <div style="font-size:12px;opacity:0.8">Confirmed lessons</div>
        </div>
        <div style="background:#f9f9f9;border-radius:12px;padding:14px">
          <div style="font-size:28px;font-weight:700;color:#111">${students.size}</div>
          <div style="font-size:12px;color:#aaa">Total students</div>
        </div>
        <div style="background:#E1F5EE;border-radius:12px;padding:14px">
          <div style="font-size:28px;font-weight:700;color:#085041">$${thisMonth.toFixed(0)}</div>
          <div style="font-size:12px;color:#5DCAA5">This month</div>
        </div>
        <div style="background:#f9f9f9;border-radius:12px;padding:14px">
          <div style="font-size:28px;font-weight:700;color:#111">$${totalRevenue.toFixed(0)}</div>
          <div style="font-size:12px;color:#aaa">All time</div>
        </div>
      </div>
      ${pending.length>0?`<div style="background:#FAEEDA;border-radius:12px;padding:12px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:13px;color:#633806;font-weight:600">⏳ ${pending.length} pending request${pending.length>1?'s':''}</div>
        <button onclick="go('profile')" style="padding:6px 12px;border-radius:8px;background:#EF9F27;border:none;color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">Review</button>
      </div>`:''}
      ${Object.keys(subjects).length>0?`<div style="margin-bottom:20px">
        <div style="font-size:14px;font-weight:700;color:#111;margin-bottom:10px">Lessons by subject</div>
        ${Object.entries(subjects).sort((a,b)=>b[1]-a[1]).map(([s,c])=>`
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <div style="flex:1;font-size:13px;color:#111">${s}</div>
            <div style="font-size:13px;font-weight:600;color:#7C3AED">${c}</div>
            <div style="width:80px;background:#f0f0f0;border-radius:4px;height:6px"><div style="height:100%;background:#7C3AED;width:${Math.min(100,(c/lessons.length)*100)}%;border-radius:4px"></div></div>
          </div>`).join('')}
      </div>`:''}
      <div style="font-size:14px;font-weight:700;color:#111;margin-bottom:10px">Recent lessons</div>
      ${lessons.length===0?`<div style="text-align:center;padding:20px 0;color:#aaa;font-size:13px">No lessons yet</div>`:
        lessons.slice(0,5).map(l=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f5f5f5">
            <div><div style="font-size:13px;font-weight:600;color:#111">${l.studentName||'Student'}</div>

          </div>`).join('')}
    `;
  }catch(e){el.innerHTML=`<div style="text-align:center;padding:20px 0;color:#aaa">Could not load</div>`;}
}

async function loadStudentProgress(){
  const el=document.getElementById('progress-content');if(!el)return;
  try{
    const snap=await getDocs(query(collection(db,'lessons'),where('teacherId','==',CU.uid),where('status','==','confirmed')));
    const lessons=snap.docs.map(d=>({id:d.id,...d.data()}));
    const studentMap={};
    lessons.forEach(l=>{
      if(!studentMap[l.studentId])studentMap[l.studentId]={id:l.studentId,name:l.studentName||'Student',email:l.studentEmail||'',lessons:[]};

window.handleDocDrop=function(event, gigId, gigTitle){
  event.preventDefault();
  document.getElementById('doc-upload-area').style.background='#f9fdf9';
  const file=event.dataTransfer.files[0];
  if(file)uploadDocFile(file, gigId);
}

window.handleDocFile=function(input, gigId){
  const file=input.files[0];
  if(file)uploadDocFile(file, gigId);
}

async function uploadDocFile(file, gigId){
  if(file.size>10*1024*1024){ts('File too large — max 10MB');return;}
  const validTypes=['application/pdf','image/jpeg','image/jpg','image/png'];
  if(!validTypes.includes(file.type)){ts('Only PDF, JPG, PNG accepted');return;}

  // Show progress
  document.getElementById('doc-upload-progress').style.display='block';
  document.getElementById('doc-upload-area').style.display='none';
  const progressBar=document.getElementById('doc-progress-bar');
  const progressText=document.getElementById('doc-progress-text');

  try{
    progressBar.style.width='30%';
    progressText.textContent='Uploading...';

    const fileName=`${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
    const storageRef=ref(storage,`cancellation-docs/${CU.uid}/${gigId}/${fileName}`);
    
    const metadata={
      contentType:file.type,
      customMetadata:{
        userId:CU.uid,
        userEmail:CU.email||'',
        gigId,
        uploadedAt:new Date().toISOString()
      }
    };

    progressBar.style.width='60%';
    const snapshot=await uploadBytes(storageRef,file,metadata);
    progressBar.style.width='90%';
    const downloadURL=await getDownloadURL(snapshot.ref);
    progressBar.style.width='100%';
    progressText.textContent='Upload complete!';

    // Store for submission
    window._docFileUrl=downloadURL;
    window._docFileName=file.name;

    // Show success
    setTimeout(()=>{
      document.getElementById('doc-upload-progress').style.display='none';
      document.getElementById('doc-uploaded-file').style.display='block';
      document.getElementById('doc-file-name').textContent=file.name;
    },500);

  }catch(e){
    document.getElementById('doc-upload-progress').style.display='none';
    document.getElementById('doc-upload-area').style.display='block';
    ts('Upload failed — please try again');
    console.error('Doc upload error:',e);
  }
}

window.submitDocumentation=async function(gigId){
  const type=document.getElementById('doc-type')?.value;
  const desc=document.getElementById('doc-desc')?.value||'';
  
  if(!window._docFileUrl){
    ts('Please attach a document first');
    return;
  }

  try{
    // Update cancellation record
    const cSnap=await getDocs(query(collection(db,'cancellations'),
      where('gigId','==',gigId),where('userId','==',CU.uid)));
    
    for(const c of cSnap.docs){
      await updateDoc(doc(db,'cancellations',c.id),{
        documentationStatus:'submitted',
        documentType:type,
        documentDescription:desc,
        documentUrl:window._docFileUrl,
        documentFileName:window._docFileName,
        submittedAt:new Date()
      });
    }

    // Update user profile
    await setDoc(doc(db,'users',CU.uid),{documentationPending:false},{merge:true});

    // Notify manager
    const gigSnap=await getDoc(doc(db,'gigs',gigId));
    const managerEmail=gigSnap.data()?.postedBy;
    if(managerEmail){
      await addDoc(collection(db,'notifications'),{
        toEmail:managerEmail,
        type:'documentation_submitted',
        message:`📋 ${CU.displayName||CU.email?.split('@')[0]||'A musician'} has submitted cancellation documentation for your review.`,
        gigId,documentUrl:window._docFileUrl,
        read:false,timestamp:new Date()
      });
    }

    document.getElementById('docup-modal')?.remove();
    window._docFileUrl=null;
    window._docFileName=null;
    ts('✅ Documentation submitted! Manager will review shortly.');
  }catch(e){ts('Submitted!');}
}

window.saveNewEmail=async function(){
  const newEmail=(document.getElementById('ee-new')?.value||'').trim().toLowerCase();
  const password=document.getElementById('ee-pw')?.value||'';
  const notify=!!document.getElementById('ee-notify')?.checked;
  if(!newEmail||!newEmail.includes('@')||!newEmail.includes('.')){ts('Please enter a valid email address');return;}
  if(newEmail===CU.email?.toLowerCase()){ts('That\'s your current email');return;}
  if(!password){ts('Please enter your current password');return;}
  const btn=document.getElementById('ee-save');if(btn){btn.disabled=true;btn.textContent='Verifying…';}
  try{
    // Step 1: re-auth — Firebase requires recent sign-in for email changes
    const cred=EmailAuthProvider.credential(CU.email,password);
    await reauthenticateWithCredential(CU,cred);
    // Step 2: send the verification email to the NEW address
    // The user must click the link in that email to complete the change.
    // Firebase will swap auth.currentUser.email automatically after they click.
    await verifyBeforeUpdateEmail(CU,newEmail);
    // Step 3: store the old email in previousEmails (for dedup matching across changes)
    const prev=(UP&&UP.previousEmails)||[];
    if(CU.email&&!prev.includes(CU.email))prev.push(CU.email);
    await setDoc(doc(db,'users_private',CU.uid),{
      previousEmails:prev,
      emailChangeRequestedAt:new Date(),
      emailChangeRequestedTo:newEmail,
      emailChangeNotifyManagers:notify,
    },{merge:true});
    if(UP){UP.previousEmails=prev;}
    // Step 4: if notify checked, queue notifications for managers/connections (best effort)
    if(notify){
      try{
        // find all managers/teachers the user has connections with via gigs/applications/contracts
        const connectedManagers=new Set();
        const apps=await getDocs(query(collection(db,'applications'),where('userId','==',CU.uid)));
        for(const a of apps.docs){const d=a.data();if(d.managerId)connectedManagers.add(d.managerId);}
        // queue an in-platform notification to each (NOT email — they may not want it)
        const myName=(UP&&UP.name)||CU.displayName||'A connection';
        const handle=(UP&&UP.username)?'@'+UP.username:'';
        for(const mid of connectedManagers){
          await addDoc(collection(db,'notifications'),{
            toUserId:mid,
            type:'email_update',
            message:`${myName}${handle?' ('+handle+')':''} is updating their login email to ${newEmail}. Their @username and Vivace identity haven't changed.`,
            timestamp:new Date(),
            read:false,
          });
        }
      }catch(notifyErr){console.log('notify managers (non-blocking):',notifyErr);}
    }
    document.getElementById('edit-email-modal')?.remove();
    // Final success modal with clear next steps
    const s=document.createElement('div');s.className='modal-bg';s.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:11001;display:flex;align-items:center;justify-content:center;padding:18px';
    s.innerHTML=`<div class="modal" style="max-width:400px;text-align:center">
      <div style="font-size:42px;margin-bottom:8px">📬</div>
      <div style="font-size:18px;font-weight:700;color:#111;margin-bottom:8px">Verification link sent!</div>
      <div style="font-size:13px;color:#555;line-height:1.6;margin-bottom:16px">We sent a verification link to <strong>${newEmail}</strong>.<br><br>Open that inbox and click the link within 1 hour. Until then, keep logging in with your current email (<strong>${CU.email}</strong>).</div>
      <button class="bt" style="width:100%;padding:13px" onclick="this.parentElement.parentElement.remove()">Got it</button>
    </div>`;
    document.getElementById('app').appendChild(s);
  }catch(e){
    console.error('email change error:',e);
    let msg='Could not update email';
    if(e.code==='auth/wrong-password'||e.code==='auth/invalid-credential')msg='Wrong password — please try again';
    else if(e.code==='auth/email-already-in-use')msg='That email is already used by another account';
    else if(e.code==='auth/invalid-email')msg='Please enter a valid email address';
    else if(e.code==='auth/requires-recent-login')msg='Please sign out and sign in again, then try once more';
    else if(e.code==='auth/too-many-requests')msg='Too many attempts. Wait a few minutes and try again.';
    ts(msg);
    if(btn){btn.disabled=false;btn.textContent='Send verification link';}
  }
};

window.showMusicianCalendar=async function(musicianId, musicianName){
  const m=document.createElement('div');m.className='modal-bg';m.id='musician-cal-modal';
  m.innerHTML=`<div class="modal" style="max-height:90vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
