window.processGigPayment=async function(gigId, gigTitle, musicianId, musicianName){
  const amount=parseFloat(document.getElementById('pay-amount')?.value);
  if(!amount||amount<=0){ts('Please enter an amount');return;}

  const btn=document.getElementById('pay-btn');
  if(btn){btn.textContent='Processing...';btn.disabled=true;}

  try{
    const snap=await getDoc(doc(db,'users',musicianId));
    const musician=snap.data();
    if(!musician?.stripeAccountId){ts('Musician has not connected bank account');return;}

    const resp=await fetch(`${CF_BASE}/createGigPayment`,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        amount,currency:'usd',
        musicianAccountId:musician.stripeAccountId,
        gigId,gigTitle,
        managerId:CU.uid,musicianId
      })
    });
    const data=await resp.json();
    if(data.clientSecret){
      // For now show success — full card UI needs Stripe.js
      document.getElementById('pay-modal')?.remove();
      // Save payment record
      await addDoc(collection(db,'payments'),{
        gigId,gigTitle,managerId:CU.uid,musicianId,
        amount,platformFee:data.platformFee/100,
        musicianReceives:data.musicianReceives/100,
        paymentIntentId:data.paymentIntentId,
        status:'pending',timestamp:new Date()
      });
      ts(`💰 Payment of $${amount} initiated to ${musicianName}!`);
    } else {
      ts('Payment failed: '+data.error);
      if(btn){btn.textContent='Send Payment';btn.disabled=false;}
    }
  }catch(e){
    ts('Payment failed — try again');
    if(btn){btn.textContent='Send Payment';btn.disabled=false;}
  }
}

let _radioTracks=[];         // All loaded tracks
let _radioQueue=[];          // Smart rotation queue
let _radioIndex=0;           // Current queue position
let _radioPlaying=false;
let _radioGenreFilter='all'; // Current genre channel
let _radioPlayHistory=[];    // Track IDs played recently (no-repeat window)
let _radioSkipStart=null;    // Time play started (for skip tracking)
let _radioSessionPlays=0;    // Plays this session

// Radio plans
const RADIO_PLANS={

  pro:{name:'Radio Pro',playsPerDay:5,price:19,priority:2},
  featured:{name:'Radio Featured',playsPerDay:10,price:39,priority:3}

// Genre bridge map — which genres can follow each other smoothly
const GENRE_BRIDGES={
  'Classical':['Jazz','Opera','Musical Theatre','Film / TV / Soundtrack','Folk / Celtic'],
  'Jazz':['Classical','Blues','R&B / Soul','Latin / Flamenco','Musical Theatre'],
  'Blues':['Jazz','R&B / Soul','Rock / Pop','Folk / Celtic'],
  'R&B / Soul':['Blues','Jazz','Hip-Hop / Rap','Gospel'],
  'Hip-Hop / Rap':['R&B / Soul','Electronic / EDM','Rock / Pop'],
  'Electronic / EDM':['Hip-Hop / Rap','Rock / Pop','Latin / Flamenco'],
  'Rock / Pop':['Electronic / EDM','Blues','Folk / Celtic','Country / Bluegrass'],
  'Folk / Celtic':['Classical','Rock / Pop','Country / Bluegrass','World / Ethnic'],
  'Country / Bluegrass':['Folk / Celtic','Blues','Rock / Pop'],
  'Latin / Flamenco':['Jazz','World / Ethnic','Electronic / EDM','R&B / Soul'],
  'World / Ethnic':['Classical','Latin / Flamenco','Folk / Celtic','Jazz'],
  'Opera':['Classical','Musical Theatre'],
  'Musical Theatre':['Opera','Classical','Jazz'],
  'Film / TV / Soundtrack':['Classical','Jazz','Electronic / EDM'],
  'Contemporary / Indie':['Rock / Pop','Folk / Celtic','Electronic / EDM'],
  'Educational / Academic':['Classical','Jazz']
};

// Time-of-day programming
function getTimeSlot(){
  const h=new Date().getHours();
  if(h>=6&&h<9)return 'morning';   // Energizing
  if(h>=9&&h<12)return 'focused';  // Work hours
  if(h>=12&&h<14)return 'lunch';   // Upbeat
  if(h>=14&&h<17)return 'afternoon';
  if(h>=17&&h<21)return 'primetime'; // Featured slot
  if(h>=21&&h<24)return 'evening';
  return 'latenight';
}

// Genre preferences by time slot
const TIME_GENRES={
  morning:['Classical','Jazz','World / Ethnic','Folk / Celtic'],
  focused:['Classical','Jazz','Film / TV / Soundtrack','Contemporary / Indie'],
  lunch:['Jazz','Latin / Flamenco','R&B / Soul','Rock / Pop'],
  afternoon:['Folk / Celtic','World / Ethnic','Rock / Pop','Blues'],
  primetime:null, // All genres — best tracks
  evening:['Jazz','Classical','Blues','R&B / Soul'],
  latenight:['Classical','Jazz','World / Ethnic','Electronic / EDM']
};

// Build intelligent rotation queue
function buildRadioQueue(tracks, genreFilter){
  if(!tracks||tracks.length===0)return[];
  let pool=genreFilter==='all'?[...tracks]:tracks.filter(t=>t.genre===genreFilter);
  if(pool.length===0)pool=[...tracks]; // Fallback to all if no matches

  const slot=getTimeSlot();
  const preferredGenres=TIME_GENRES[slot];

  // Score each track
  pool=pool.map(t=>{
    let score=0;
    // Plan priority (featured > pro > basic)
    score+=(RADIO_PLANS[t.radioPlan]?.priority||1)*10;
    // Time-of-day bonus
    if(preferredGenres&&preferredGenres.includes(t.genre))score+=15;
    // Prime time — featured gets extra boost
    if(slot==='primetime'&&t.radioPlan==='featured')score+=20;
    // Engagement score — tracks with high profile taps rank higher
    score+=(t.profileTaps||0)*3;
    // Penalize high skip rate
    const skipRate=t.skips&&t.plays?(t.skips/t.plays):0;
    score-=skipRate*20;
    // Add slight randomness so it doesn't feel robotic
    score+=Math.random()*5;
    return {...t,_score:score};
  });

  // Sort by score
  pool.sort((a,b)=>b._score-a._score);

  // Now build queue with genre bridge logic (no jarring transitions)
  const queue=[];
  const used=new Set();
  let lastGenre=null;

  // First pass — respect genre bridges
  while(used.size<pool.length){
    const remaining=pool.filter(t=>!used.has(t.id));
    if(remaining.length===0)break;

    let next=null;
    if(lastGenre){
      // Try to find a bridging genre
      const bridges=GENRE_BRIDGES[lastGenre]||[];
      next=remaining.find(t=>bridges.includes(t.genre));
      // If no bridge, try same genre
      if(!next)next=remaining.find(t=>t.genre===lastGenre);
    }
    // If still nothing, take highest scored remaining
    if(!next)next=remaining[0];

    queue.push(next);
    used.add(next.id);
    lastGenre=next.genre;
  }

  return queue;
}

// Get next track respecting no-repeat window (2 hours = ~12 tracks)
function getNextTrack(){
  const NO_REPEAT_WINDOW=Math.min(12,Math.floor(_radioQueue.length*0.7));
  if(_radioQueue.length===0)return null;

  // Find next track not in recent history
  for(let i=0;i<_radioQueue.length;i++){
    const idx=(_radioIndex+i)%_radioQueue.length;
    const track=_radioQueue[idx];
    if(!_radioPlayHistory.slice(-NO_REPEAT_WINDOW).includes(track.id)){
      _radioIndex=idx;
      return track;
    }
  }
  // All tracks played recently — just go to next
  _radioIndex=(_radioIndex+1)%_radioQueue.length;
  return _radioQueue[_radioIndex];
}

window.uploadRadioTrack=async function(){
  const legalCheck=document.getElementById('radio-legal-check')?.checked;
  if(!legalCheck){ts('⚖️ Please confirm the legal declaration first');return;}

  const title=document.getElementById('radio-title')?.value?.trim();
  const genre=document.getElementById('radio-genre')?.value;
  const description=document.getElementById('radio-description')?.value?.trim();
  const fileInput=document.getElementById('radio-file-input');
  const file=fileInput?.files?.[0];

  if(!title){ts('Please enter a track title');return;}
  if(!genre){ts('Please select a genre');return;}
  if(!file){ts('Please select an audio file');return;}
  if(file.size>50*1024*1024){ts('File must be under 50MB');return;}
  if(!file.type.startsWith('audio/')){ts('Please select an audio file');return;}

  const btn=document.getElementById('radio-upload-btn');
  if(btn){btn.textContent='Uploading...';btn.disabled=true;}

  const progress=document.getElementById('radio-upload-progress');
  const bar=document.getElementById('radio-upload-bar');
  const text=document.getElementById('radio-upload-text');
  const copyCheck=document.getElementById('radio-copyright-check');
  if(progress)progress.style.display='block';

  try{
    // Show copyright check
    if(copyCheck)copyCheck.style.display='block';
    if(bar)bar.style.width='30%';
    if(text)text.textContent='Checking copyright...';

    // Simulate ACRCloud check (in production, call ACRCloud API here)
    await new Promise(r=>setTimeout(r,1500));
    if(copyCheck)copyCheck.innerHTML='✅ No copyright issues detected — uploading...';
    if(bar)bar.style.width='60%';
    if(text)text.textContent='Uploading audio...';

    // Upload to Firebase Storage
    const storageRef=ref(storage,`radio/${CU.uid}/${Date.now()}_${file.name}`);
    const snapshot=await uploadBytes(storageRef,file);
    const url=await getDownloadURL(snapshot.ref);

    if(bar)bar.style.width='90%';
    if(text)text.textContent='Saving track info...';

    // Save track metadata to Firestore
    const trackData={
      userId:CU.uid,
      userName:UP.name||CU.email?.split('@')[0]||'Musician',
      userEmail:CU.email,
      title,genre,description,
      url,
      radioPlan:UP.radioPlan||'basic',
      playsPerDay:RADIO_PLANS[UP.radioPlan||'basic']?.playsPerDay||2,
      plays:0,profileTaps:0,skips:0,
      uploadedAt:new Date(),
      status:'active',
      legalConfirmed:true,
      instruments:(UP.instruments||[]).slice(0,2).map(i=>i.name).join(', '),
      rating:UP.publicRating?.average||0
    };
    const docRef=await addDoc(collection(db,'radioTracks'),trackData);

    // Save track reference to user profile
    if(!UP.radioTracks)UP.radioTracks=[];
    UP.radioTracks.push({id:docRef.id,title,genre,plays:0,profileTaps:0,duration:'—'});
    await saveUP();

    if(bar)bar.style.width='100%';
    document.getElementById('radio-upload-modal')?.remove();
    ts('🎙️ Track uploaded to Vivace Radio!');
    render();
  }catch(e){
    console.error('Radio upload error:',e.message);
    if(progress)progress.style.display='none';
    if(btn){btn.textContent='Upload track';btn.disabled=false;}
    ts('Upload failed: '+e.message);
  }
}

window.deleteRadioTrack=async function(index){
  if(!confirm('Remove this track from Vivace Radio?'))return;
  const tracks=UP.radioTracks||[];
  const track=tracks[index];
  if(track?.id){
    try{await deleteDoc(doc(db,'radioTracks',track.id));}catch(e){}
  }
  tracks.splice(index,1);
  UP.radioTracks=tracks;
  await saveUP();
  ts('Track removed from radio');
  render();
}

function makeDraggable(el){
  let startX,startY,startRight,startBottom,dragging=false,holdTimer=null;
  function dragStart(e){
    if(e.target.tagName==='BUTTON'||e.target.tagName==='INPUT')return;
    const touch=e.touches?e.touches[0]:e;
    startX=touch.clientX;startY=touch.clientY;
    const rect=el.getBoundingClientRect();
    startRight=window.innerWidth-rect.right;
    startBottom=window.innerHeight-rect.bottom;
    // Only start drag after 200ms hold
    holdTimer=setTimeout(()=>{dragging=true;el.style.cursor='grabbing';},200);
  }
  function dragMove(e){
    if(!dragging)return;
    const touch=e.touches?e.touches[0]:e;
    const dx=touch.clientX-startX;
    const dy=touch.clientY-startY;
    const newRight=Math.max(0,Math.min(window.innerWidth-el.offsetWidth,startRight-dx));
    const newBottom=Math.max(0,Math.min(window.innerHeight-el.offsetHeight,startBottom-dy));
    el.style.right=newRight+'px';
    el.style.bottom=newBottom+'px';
    el.style.left='auto';
    el.style.transform='none';
    e.preventDefault&&e.preventDefault();
  }
  function dragEnd(){
    clearTimeout(holdTimer);
    dragging=false;
    el.style.cursor='grab';
  }
  el.addEventListener('mousedown',dragStart);
  document.addEventListener('mousemove',dragMove);
  document.addEventListener('mouseup',dragEnd);
}

let _progressTimer=null;
function startProgressBar(){
  if(_progressTimer)clearInterval(_progressTimer);
  _progressTimer=setInterval(()=>{
    if(!_radioAudio||!_radioPlaying)return;
    const pct=_radioAudio.duration?(_radioAudio.currentTime/_radioAudio.duration)*100:0;
    const fill=document.getElementById('radio-progress-fill');
    if(fill)fill.style.width=pct+'%';
  },500);
}

window.radioSeek=function(e){
  if(!_radioAudio||!_radioAudio.duration)return;
  const bg=document.getElementById('radio-progress-bg');
  if(!bg)return;
  const pct=e.offsetX/bg.offsetWidth;
  _radioAudio.currentTime=pct*_radioAudio.duration;
}

window.radioPlayPause=async function(){
  const track=_radioQueue[_radioIndex];
  if(!track){ts('No tracks available');return;}
  if(!track.url){ts('Track URL missing — try refreshing');console.log('Track missing URL:',track);return;}
  if(!_radioAudio){
    _radioAudio=new Audio(track.url);
    _radioAudio.onended=()=>{trackRadioEnd();radioNext();};
    _radioAudio.ontimeupdate=()=>{
      const fill=document.getElementById('radio-progress-fill');
      if(fill&&_radioAudio.duration){
        fill.style.width=(_radioAudio.currentTime/_radioAudio.duration*100)+'%';
      }
    };
  }
  if(_radioPlaying){
    _radioAudio.pause();
    _radioPlaying=false;
    if(_radioSkipStart&&(Date.now()-_radioSkipStart)<30000)trackRadioSkip();
  } else {
    try{
      await _radioAudio.play();
      _radioPlaying=true;
      _radioSkipStart=Date.now();
      trackRadioPlay();
    }catch(e){
      console.log('Play error:',e.message);
      ts('Tap play again to start radio 🎙️');
      _radioAudio=null;
    }
  }
  renderRadioPlayer();
}

window.radioNext=function(){
  if(_radioAudio){_radioAudio.pause();_radioAudio=null;}
  // Track skip
  if(_radioSkipStart&&(Date.now()-_radioSkipStart)<30000)trackRadioSkip();
  _radioSkipStart=null;
  _radioPlaying=false;
  // Add current to history
  const current=_radioQueue[_radioIndex];
  if(current){_radioPlayHistory.push(current.id);if(_radioPlayHistory.length>20)_radioPlayHistory.shift();}
  // Get next smart track
  const next=getNextTrack();
  renderRadioPlayer();
  // Auto-play next
  if(next){
    _radioAudio=new Audio(next.url);
    _radioAudio.onended=()=>{trackRadioEnd();radioNext();};
    _radioAudio.play().then(()=>{
      _radioPlaying=true;
      _radioSkipStart=Date.now();
      trackRadioPlay();
      renderRadioPlayer();
    }).catch(()=>{});
  }
}

  try{

      trackId,reportedBy:CU?.uid||'anonymous',
      reportedAt:new Date(),reason:'copyright'
    });
    await updateDoc(doc(db,'radioTracks',trackId),{status:'under_review'});
    ts('🚩 Reported — track paused for review. Thank you!');
    radioNext();
  }catch(e){ts('Report submitted');}
}

async function trackRadioPlay(){
  const track=_radioQueue[_radioIndex];
  if(!track?.id)return;
  _radioSessionPlays++;
  try{
    // Update track stats
    await updateDoc(doc(db,'radioTracks',track.id),{plays:(track.plays||0)+1,lastPlayedAt:new Date()});
    // Log play event for analytics
    await addDoc(collection(db,'radioPlays'),{
      trackId:track.id,userId:track.userId,
      listenerId:CU?.uid||'anonymous',
      genre:track.genre,plan:track.radioPlan,
      timeSlot:getTimeSlot(),playedAt:new Date()
    });
  }catch(e){}
}

onAuthStateChanged(auth,async user=>{
  CU=user;
  if(user){
    // Restore the last page they were on (instead of always jumping to feed)
    let lastScreen='feed';
    try{const s=sessionStorage.getItem('vv_lastScreen');if(s)lastScreen=s;}catch(e){}
    CS=lastScreen;
    await loadUP();await loadGroups();await loadVenues();
    render();
    // Prompt to claim a username if they don't have one yet
    setTimeout(()=>{if(CU&&(!UP||!UP.username)){showUsernamePrompt(true);}},1800);
    // Check birthday and holidays after render
    setTimeout(()=>{checkGreetings();checkAutoVerification();checkFounderAccess();checkTrialStatus();},1500);
    // Check $1 verification
    setTimeout(()=>{checkVerification();},1500);
  } else {
    render();
  }
});

// ─── WORLD-CLASS GREETING SYSTEM ─────────────────────────────────
function checkGreetings(){
  if(!CU||!UP)return;
  const today=new Date();
  const todayKey=`${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;
  if(window._greetingShown===todayKey)return; // Already shown today

  const name=UP.name||CU.displayName||CU.email?.split('@')[0]||'Friend';
  const month=today.getMonth()+1;
  const day=today.getDate();

  if(UP.birthdayMonth&&UP.birthdayDay&&
     parseInt(UP.birthdayMonth)===month&&
     parseInt(UP.birthdayDay)===day&&
     UP.birthdayWishes!==false){
    window._greetingShown=todayKey;
    showGreetingPopup('birthday',name);
    return;
  }

  if(UP.holidayWishes===false)return;
  const lang=UP.lang||'en';
  const holiday=getHoliday(month,day,lang);
  if(holiday){
    window._greetingShown=todayKey;
    showGreetingPopup(holiday,name);
  }
}

function getHoliday(month,day,lang){
  // Universal holidays
  if(month===1&&day===1)return 'newyear';
  if(month===2&&day===14)return 'valentines';
  if(month===10&&day===31)return 'halloween';
  if(month===12&&day===25)return 'christmas';
  if(month===12&&day===31)return 'newyearseve';

  // Language-specific
  if(lang==='en'&&month===7&&day===4)return 'july4';
  if(lang==='en'&&month===11&&day>=22&&day<=28)return 'thanksgiving';
  if(lang==='ru'&&month===1&&day===7)return 'orthodox_christmas';
  if(lang==='ru'&&month===2&&day===23)return 'defender';
  if(lang==='ru'&&month===3&&day===8)return 'womensday';
  if(lang==='ru'&&month===5&&day===9)return 'victory';
  if(lang==='it'&&month===4&&day===25)return 'liberation';
  if(lang==='it'&&month===8&&day===15)return 'ferragosto';
  if(lang==='es'&&month===1&&day===6)return 'threekings';
  if(lang==='fr'&&month===7&&day===14)return 'bastille';
  if(lang==='de'&&month===10&&day===3)return 'germanunity';

  // Music world holidays
  if(month===11&&day===22)return 'musicday'; // St. Cecilia — Patron Saint of Music
  if(month===6&&day===21)return 'worldmusicday'; // Fête de la Musique

  return null;
}

function showGreetingPopup(type,name){
  const g=GREETINGS[type];if(!g)return;
  document.getElementById('greeting-overlay')?.remove();

  const overlay=document.createElement('div');
  overlay.id='greeting-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:99999;display:flex;align-items:center;justify-content:center;padding:20px';

  // Generate particles
  const particles=g.notes.map((_,i)=>{
    const note=g.notes[i%g.notes.length];
    return `<div style="position:absolute;font-size:${14+Math.random()*16}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation:greetFloat ${3+Math.random()*4}s ease-in-out ${Math.random()*3}s infinite;opacity:0">${note}</div>`;
  }).join('');

  // Confetti dots
  const colors=['#1D9E75','#C9A84C','#ffffff','rgba(255,255,255,0.3)'];
  const confetti=Array.from({length:25},(_,i)=>`
    <div style="position:absolute;width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;border-radius:2px;
    left:${Math.random()*100}%;background:${colors[i%colors.length]};
    animation:greetFall ${2+Math.random()*3}s linear ${Math.random()*3}s infinite;opacity:0"></div>
  `).join('');

  overlay.innerHTML=`
    <style>
      @keyframes greetPop{0%{transform:scale(0.3) translateY(40px);opacity:0}70%{transform:scale(1.05) translateY(-5px)}100%{transform:scale(1) translateY(0);opacity:1}}
      @keyframes greetFloat{0%{transform:translateY(0) rotate(-10deg);opacity:0}20%{opacity:0.8}80%{opacity:0.5}100%{transform:translateY(-100px) rotate(15deg);opacity:0}}
      @keyframes greetFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
      @keyframes greetBounce{0%,100%{transform:translateY(0) rotate(-5deg)}50%{transform:translateY(-10px) rotate(5deg)}}
      @keyframes greetPulse{0%,100%{box-shadow:0 0 0 0 ${g.glow}}50%{box-shadow:0 0 0 12px transparent}}
      @keyframes greetTwinkle{0%,100%{opacity:0;transform:scale(0.3)}50%{opacity:1;transform:scale(1)}}
      @keyframes greetShimmer{0%{opacity:0.3}50%{opacity:0.8}100%{opacity:0.3}}
    </style>

    <!-- Background particles -->
    <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none">
      ${particles}${confetti}
    </div>

    <!-- Main card -->
    <div style="background:#0d0d0d;border:1.5px solid ${g.color};border-radius:24px;padding:36px 28px;width:100%;max-width:340px;text-align:center;position:relative;animation:greetPop 0.6s cubic-bezier(0.175,0.885,0.32,1.275) forwards;overflow:hidden">

      <!-- Glow background -->
      <div style="position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,${g.glow},transparent 70%);pointer-events:none"></div>

      <!-- Twinkling stars inside card -->
      ${Array.from({length:10},()=>`<div style="position:absolute;color:${g.color};font-size:${8+Math.random()*8}px;left:${5+Math.random()*90}%;top:${5+Math.random()*90}%;animation:greetTwinkle ${1.5+Math.random()*2}s ease-in-out ${Math.random()*2}s infinite">✦</div>`).join('')}

      <!-- Brand -->
      <div style="font-size:9px;color:${g.color};font-weight:700;letter-spacing:0.15em;margin-bottom:16px;position:relative">VIVACE EVENTS · VIRTUAL STUDIO ORCHESTRA LLC</div>

      <!-- Emoji with glow ring -->
      <div style="width:88px;height:88px;border-radius:50%;background:${g.glow};margin:0 auto 16px;display:flex;align-items:center;justify-content:center;animation:greetPulse 2s ease-in-out infinite;position:relative">
        <div style="width:72px;height:72px;border-radius:50%;border:2px solid ${g.color};display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.5)">
          <span style="font-size:36px;animation:greetBounce 1.5s ease-in-out infinite">${g.emoji}</span>
        </div>
      </div>

      <!-- Title -->
      <div style="font-size:21px;font-weight:700;color:#fff;margin-bottom:10px;position:relative;line-height:1.3">${g.title(name)}</div>

      <!-- Divider -->
      <div style="display:flex;align-items:center;gap:8px;margin:0 auto 14px;width:80%;position:relative">
        <div style="flex:1;height:1px;background:${g.color};opacity:0.3"></div>
        <span style="color:${g.color};font-size:12px;animation:greetShimmer 2s ease-in-out infinite">✦</span>
        <div style="flex:1;height:1px;background:${g.color};opacity:0.3"></div>
      </div>

      <!-- Message -->
      <div style="font-size:14px;color:rgba(255,255,255,0.7);line-height:1.8;margin-bottom:16px;font-style:italic;white-space:pre-line;position:relative">${g.message}</div>

      <!-- From -->
      <div style="font-size:11px;color:rgba(255,255,255,0.35);margin-bottom:22px;line-height:1.6;position:relative">
        ${g.from}<br>
        <span style="color:rgba(255,255,255,0.5);font-weight:600">Your Vivace Events Family</span>
      </div>

      <!-- Button -->
      <button onclick="document.getElementById('greeting-overlay').remove()"
        style="background:${g.color};color:#fff;border:none;border-radius:50px;padding:13px 32px;font-size:14px;font-weight:700;cursor:pointer;width:100%;font-family:inherit;position:relative;animation:greetPulse 2s ease-in-out infinite;letter-spacing:0.03em">
        ${g.btn}
      </button>

      <!-- Small note -->
      <div style="margin-top:12px;font-size:10px;color:rgba(255,255,255,0.2);position:relative">Tap to close and continue</div>
    </div>
  `;

  document.getElementById('app').appendChild(overlay);
}
