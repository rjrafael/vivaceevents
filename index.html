function ts(m){
  let el=document.getElementById('toast');
  if(!el){el=document.createElement('div');el.id='toast';el.className='toast';document.getElementById('app').appendChild(el);}
  el.textContent=m;el.classList.add('show');
  clearTimeout(window._tt);window._tt=setTimeout(()=>el.classList.remove('show'),4000);
}

function isMgr(){return UP.roles&&UP.roles.includes('manager');}
function isTeacher(){return UP.roles&&UP.roles.includes('teacher');}
function isStudent(){return UP.roles&&UP.roles.includes('student');}
function canPostAudition(){return UP.roles&&(UP.roles.includes('manager')||UP.roles.includes('teacher')||UP.roles.includes('artist'));}

async function loadUP(){
  try{
    const d=await getDoc(doc(db,'users',CU.uid));
    if(d.exists()){UP={...UP,...d.data()};lang=UP.lang||detectLang();}
    else{lang=detectLang();await setDoc(doc(db,'users',CU.uid),{roles:['artist'],email:CU.email,name:CU.displayName||CU.email.split('@')[0],lang,plan:'free',created:new Date()});}
  }catch(e){}
}

function detectLang(){
  const bl=navigator.language||'en';
  if(bl.startsWith('es'))return 'es';
  if(bl.startsWith('it'))return 'it';
  if(bl.startsWith('ru'))return 'ru';
  if(bl.startsWith('fr'))return 'fr';
  if(bl.startsWith('de'))return 'de';
  return 'en';
}

async function saveUP(){try{await setDoc(doc(db,'users',CU.uid),{...UP,email:CU.email},{merge:true});}catch(e){}}
async function loadGroups(){try{const s=await getDocs(query(collection(db,'groups'),where('managerId','==',CU.uid)));groups=s.docs.map(d=>({id:d.id,...d.data()}));}catch(e){}}
async function loadVenues(){try{const s=await getDocs(query(collection(db,'venues'),where('managerId','==',CU.uid)));venues=s.docs.map(d=>({id:d.id,...d.data()}));}catch(e){}}

function render(){
  const el=document.getElementById('app');
  if(!CU){el.innerHTML=authHTML();bindAuth();setTimeout(checkTOS,50);return;}
  el.innerHTML=`
    <div class="scr" id="scr">${getScr()}</div>
    <div id="toast" class="toast"></div>
    <nav class="bnav">
      <button class="ni${CS==='feed'?' on':''}" onclick="go('feed')">${ic('home')}${t('feed')}</button>
      <button class="ni${CS==='discover'?' on':''}" onclick="go('discover')">${ic('search')}${t('find')}</button>
      <button class="ni" onclick="go('post')" style="flex:1;display:flex;flex-direction:column;align-items:center;padding:4px 0;border:none;background:none;cursor:pointer"><div class="pc">${ic('plus')}</div></button>
      <button class="ni${CS==='manager'?' on':''}" onclick="go('manager')">${ic('mgr')}${t('manager')}</button>
      <button class="ni${CS==='profile'?' on':''}" onclick="go('profile')">${ic('user')}${t('profile')}</button>
    </nav>`;
}

function go(s){CS=s;document.getElementById('scr').innerHTML=getScr();}
window.go=go;window.ts=ts;

function getScr(){
  if(CS==='feed')return feedHTML();
  if(CS==='discover')return discoverHTML();
  if(CS==='post')return postHTML();
  if(CS==='manager')return mgrHTML();
  if(CS==='profile'){setTimeout(()=>{loadMyContracts();loadMyConnections();loadEarningsSummary();loadMyMessages();loadAvailabilityPreview();if(isTeacher()||isStudent())loadMyLessons();},200);return profileHTML();}
  if(CS==='billing')return billingHTML();
  if(CS==='booking-page')return bookingPageHTML();
  if(CS==='teacher-analytics')return teacherAnalyticsHTML();
  if(CS==='student-progress')return studentProgressHTML();
  if(CS==='course-builder'){setTimeout(()=>loadCourses(),100);return courseBuilderHTML();}
  if(CS==='public-profile')return publicProfileHTML();
  if(CS==='recurring-gigs'){setTimeout(()=>loadRecurringGigs(),100);return recurringGigsHTML();}
  return feedHTML();
}

let confirmResult=null;

function initRC(){
  try{
    if(window.recaptchaVerifier){
      try{window.recaptchaVerifier.clear();}catch(e){}
      window.recaptchaVerifier=null;
    }
    const container=document.getElementById('rc-wrap');
    if(!container)return;
    window.recaptchaVerifier=new RecaptchaVerifier(auth,container,{
      size:'normal',
      callback:()=>{console.log('reCAPTCHA ok');},
      'error-callback':()=>{ts('reCAPTCHA error - try refreshing');},
      'expired-callback':()=>{initRC();}
    });
    window.recaptchaVerifier.render();
  }catch(e){
    console.log('RC init error:',e);
    const w=document.getElementById('rc-wrap');
    if(w)w.innerHTML='<div style="font-size:11px;color:#1D9E75;padding:8px;background:#E1F5EE;border-radius:8px">✅ Verification ready — tap Send code</div>';
  }
}

window.sendSMS=async function(){
  const phone=document.getElementById('phone-input').value.trim().replace(/\s/g,'');
  if(!phone){ts('Please enter your phone number');return;}
  try{
    confirmResult=await signInWithPhoneNumber(auth,phone,window.recaptchaVerifier);
    document.getElementById('phone-step-1').style.display='none';
    document.getElementById('phone-step-2').style.display='block';
    ts('Code sent! Check your SMS 📱');
  }catch(e){ts('Error: '+e.message);}
}

window.verifySMS=async function(){
  const code=document.getElementById('sms-code').value.trim();
  if(!code){ts('Please enter the code');return;}
  try{
    const r=await confirmResult.confirm(code);
    CU=r.user;
    document.getElementById('phone-modal')?.remove();
    await saveTOS(CU.uid);
    await loadUP();await loadGroups();await loadVenues();render();
    ts('Phone verified! Welcome to Vivace Events 🎉');
  }catch(e){ts('Invalid code. Please try again.');}
}

function gigStatusBadge(status){
  if(status==='filled') return `<span class="tag status-filled">⚫ ${t('gigFilled')}</span>`;
  if(status==='confirmed') return `<span class="tag status-confirmed">✅ ${t('gigConfirmed')}</span>`;
  if(status==='pending') return `<span class="tag status-pending">⏳ ${t('gigPending')}</span>`;
  return `<span class="tag status-open">🟢 ${t('gigOpen')}</span>`;
}

window.confirmFill=async function(gigId,gigTitle){
  try{
    const selected=[];
    document.querySelectorAll('.member-check.on').forEach(el=>{
      const id=el.id.replace('sel-','');
      selected.push(id);
    });
    await updateDoc(doc(db,'gigs',gigId),{status:'filled',filledAt:new Date(),confirmedApplicants:selected});
    const apps=await getDocs(query(collection(db,'applications'),where('gigId','==',gigId)));
    for(const a of apps.docs){
      const isConfirmed=selected.includes(a.id);
      await addDoc(collection(db,'notifications'),{
        toUserId:a.data().userId,toEmail:a.data().userEmail,
        gigId,gigTitle,
        type:isConfirmed?'confirmed':'filled',
        message:isConfirmed?t('confirmedMsg'):t('filledMsg'),
        read:false,timestamp:new Date()
      });
    }
    document.getElementById('fill-modal')?.remove();
    ts('Position filled! Everyone has been notified. ✅');
    setTimeout(loadGigs,500);
  }catch(e){ts('Done!');}
}

  e.stopPropagation();
  try{
    // Check if blocked by "never again" from this gig's manager
    const gigSnap=await getDoc(doc(db,'gigs',gigId));
    const managerId=gigSnap.data()?.userId;
    if(managerId&&managerId!==CU.uid){
      const ratingId=managerId+'_'+CU.uid;
      const rSnap=await getDoc(doc(db,'ratings',ratingId));
      if(rSnap.exists()&&rSnap.data().priority==='never'){
        ts('You cannot apply to this manager\'s gigs.');
        return;
      }
    }
    await addDoc(collection(db,'applications'),{gig:title,gigId:gigId||'',userId:CU.uid,userEmail:CU.email,status:'pending',timestamp:new Date()});
    ts('Application sent! You\'ll be notified when a decision is made. 👍');
  }catch(e){ts('Application submitted!');}
}

window.generateContract=async function(gigId){
  const gigSnap=await getDoc(doc(db,'gigs',gigId));
  const g=gigSnap.data();
  const manager=document.getElementById('ct-manager').value;
  const musician=document.getElementById('ct-musician').value;
  const pay=document.getElementById('ct-pay').value;
  const payMethod=document.getElementById('ct-payment-method').value;
  const payTiming=document.getElementById('ct-payment-timing').value;
  const cancelNotice=document.getElementById('ct-cancel-notice').value;
  const cancelPenalty=document.getElementById('ct-cancel-penalty').value;
  const dress=document.getElementById('ct-dress').value;
  const callTime=document.getElementById('ct-calltime').value;
  const notes=document.getElementById('ct-notes').value;
  const contractId='contract_'+gigId+'_'+Date.now();
  const contractData={
    contractId,gigId,gigTitle:g.title,gigDate:g.date,gigTime:g.time,
    venue:g.location,manager,managerEmail:CU.email,musician,
    pay,payMethod,payTiming,cancelNotice,cancelPenalty,
    dress,callTime,notes,
    status:'sent',sentAt:new Date(),
    managerSigned:false,musicianSigned:false
  };
  try{
    await setDoc(doc(db,'contracts',contractId),contractData);
    // Notify musician
    await addDoc(collection(db,'notifications'),{
      toEmail:musician,type:'contract',
      message:`📄 You have a new performance agreement for "${g.title}" on ${g.date}. Please review and sign.`,
      contractId,read:false,timestamp:new Date()
    });
    document.getElementById('contract-modal')?.remove();
    // Show preview
    showContractPreview(contractData,true);
    ts('Contract sent to musician! 📄');
  }catch(e){ts('Contract generated!');}
}

window.signContract=async function(contractId, role){
  try{
    const update={};
    update[role==='manager'?'managerSigned':'musicianSigned']=true;
    update[role==='manager'?'managerSignedAt':'musicianSignedAt']=new Date();
    await setDoc(doc(db,'contracts',contractId),update,{merge:true});
    
    const snap=await getDoc(doc(db,'contracts',contractId));
    const c=snap.data();
    
    if(c.managerSigned&&c.musicianSigned){
      // Both signed — generate and store PDF
      ts('⏳ Generating secure PDF contract...');
      await generateAndStorePDF(c,contractId);
      ts('🎉 Contract fully signed and PDF secured!');
      await addDoc(collection(db,'notifications'),{
        toEmail:c.musician,type:'contract_signed',
        message:`✅ Performance agreement for "${c.gigTitle}" is fully signed. Your PDF is ready to download in Profile → My Contracts.`,
        contractId,read:false,timestamp:new Date()
      });
      await addDoc(collection(db,'notifications'),{
        toEmail:c.managerEmail,type:'contract_signed',
        message:`✅ "${c.gigTitle}" contract fully signed by both parties. PDF available in Profile → My Contracts.`,
        contractId,read:false,timestamp:new Date()
      });
    } else {
      ts('✍️ Signed! Waiting for the other party.');
      if(role==='manager'){
        await addDoc(collection(db,'notifications'),{
          toEmail:c.musician,type:'contract_sign_request',
          message:`✍️ Manager has signed the agreement for "${c.gigTitle}". Your signature is needed. Open Profile → My Contracts.`,
          contractId,read:false,timestamp:new Date()
        });
      }
    }
    document.getElementById('contract-preview')?.remove();
    const updated=await getDoc(doc(db,'contracts',contractId));
    showContractPreview(updated.data(),true);
  }catch(e){ts('Signed!');}
}

// ─── PDF GENERATION & SECURE STORAGE ────────────────────────────
async function generateAndStorePDF(c, contractId){
  try{
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210,margin=20;
    let y=margin;

    // ── Header ──────────────────────────────────────────────────
    pdf.setFillColor(13,13,13);
    pdf.rect(0,0,W,45,'F');
    
    pdf.setTextColor(29,158,117);
    pdf.setFontSize(9);pdf.setFont('helvetica','bold');
    pdf.text('VIVACE EVENTS · VIRTUAL STUDIO ORCHESTRA LLC',margin,18);
    
    pdf.setTextColor(255,255,255);
    pdf.setFontSize(22);pdf.setFont('helvetica','bold');
    pdf.text('Performance Agreement',margin,30);
    
    pdf.setTextColor(100,100,100);
    pdf.setFontSize(8);pdf.setFont('helvetica','normal');
    pdf.text(`Contract #${contractId.slice(-12).toUpperCase()}`,margin,38);
    pdf.text(`Generated: ${new Date().toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'})}`,W-margin,38,{align:'right'});

    y=58;

    // ── Disclaimer ───────────────────────────────────────────────
    pdf.setFillColor(249,249,249);
    pdf.roundedRect(margin,y,W-2*margin,18,3,3,'F');
    pdf.setTextColor(120,120,120);
    pdf.setFontSize(7.5);pdf.setFont('helvetica','italic');
    const disclaimer='Vivace Events — Virtual Studio Orchestra LLC provides this platform as a service only and is not a party to this agreement, nor responsible for its terms, enforcement, or outcome. This agreement is solely between the Manager and Musician named below.';
    const dLines=pdf.splitTextToSize(disclaimer,W-2*margin-6);
    pdf.text(dLines,margin+3,y+6);
    y+=24;

    // ── Parties ──────────────────────────────────────────────────
    pdf.setTextColor(136,136,136);
    pdf.setFontSize(8);pdf.setFont('helvetica','bold');
    pdf.text('PARTIES TO THIS AGREEMENT',margin,y);
    y+=6;

    const halfW=(W-2*margin-6)/2;
    // Manager box
    pdf.setFillColor(225,245,238);
    pdf.roundedRect(margin,y,halfW,28,3,3,'F');
    pdf.setTextColor(8,80,65);
    pdf.setFontSize(7);pdf.setFont('helvetica','bold');
    pdf.text('MANAGER',margin+4,y+6);
    pdf.setFontSize(11);pdf.setFont('helvetica','bold');
    pdf.text(c.manager||'—',margin+4,y+14);
    pdf.setFontSize(8);pdf.setFont('helvetica','normal');
    pdf.text(c.managerEmail||'',margin+4,y+20);
    pdf.setTextColor(29,158,117);pdf.setFontSize(8);
    pdf.text(c.managerSigned?'✓ Signed':'Pending',margin+4,y+26);

    // Musician box
    const mx=margin+halfW+6;
    pdf.setFillColor(230,241,251);
    pdf.roundedRect(mx,y,halfW,28,3,3,'F');
    pdf.setTextColor(12,68,124);
    pdf.setFontSize(7);pdf.setFont('helvetica','bold');
    pdf.text('MUSICIAN',mx+4,y+6);
    pdf.setFontSize(11);pdf.setFont('helvetica','bold');
    pdf.text((c.musician||'—').split('@')[0],mx+4,y+14);
    pdf.setFontSize(8);pdf.setFont('helvetica','normal');
    pdf.text(c.musician||'',mx+4,y+20);
    pdf.setTextColor(29,158,117);pdf.setFontSize(8);
    pdf.text(c.musicianSigned?'✓ Signed':'Pending',mx+4,y+26);
    y+=36;

    // ── Agreement Details ────────────────────────────────────────
    pdf.setTextColor(136,136,136);
    pdf.setFontSize(8);pdf.setFont('helvetica','bold');
    pdf.text('AGREEMENT DETAILS',margin,y);
    y+=6;

    const rows=[
      ['Performance',c.gigTitle||'—'],
      ['Date',c.gigDate||'—'],
      ['Time',c.gigTime||'—'],
      ['Venue / Location',c.venue||'—'],
      ['Dress Code',c.dress||'—'],
      ['Call Time',c.callTime||'—'],
    ];
    rows.forEach(([label,value],i)=>{
      pdf.setFillColor(i%2===0?255:248,i%2===0?255:248,i%2===0?255:249);
      pdf.rect(margin,y,W-2*margin,8,'F');
      pdf.setTextColor(136,136,136);pdf.setFontSize(8);pdf.setFont('helvetica','normal');
      pdf.text(label,margin+3,y+5.5);
      pdf.setTextColor(30,30,30);pdf.setFont('helvetica','bold');
      pdf.text(value,margin+55,y+5.5);
      y+=8;

    y+=6;

    // ── Compensation ─────────────────────────────────────────────

    pdf.text(`Penalty: ${c.cancelPenalty||'—'}`,margin+80,y+13);

    // ── Notes ────────────────────────────────────────────────────
    if(c.notes){
      pdf.setTextColor(136,136,136);pdf.setFontSize(8);pdf.setFont('helvetica','bold');
      pdf.text('ADDITIONAL NOTES',margin,y);y+=5;
      pdf.setTextColor(80,80,80);pdf.setFont('helvetica','normal');

    // ── Signatures ───────────────────────────────────────────────
    if(y>240)pdf.addPage();
    y=Math.max(y,220);
    pdf.setDrawColor(200,200,200);
    pdf.line(margin,y,margin+70,y);
    pdf.line(W-margin-70,y,W-margin,y);
    pdf.setTextColor(136,136,136);pdf.setFontSize(8);
    pdf.text(c.manager||'Manager',margin,y+5);
    pdf.text(c.managerSigned&&c.managerSignedAt?`Signed ${new Date(c.managerSignedAt.seconds*1000).toLocaleDateString()}`:'Not yet signed',margin,y+10);
    pdf.text((c.musician||'Musician').split('@')[0],W-margin-70,y+5);
    pdf.text(c.musicianSigned&&c.musicianSignedAt?`Signed ${new Date(c.musicianSignedAt.seconds*1000).toLocaleDateString()}`:'Not yet signed',W-margin-70,y+10);

    // ── Footer ───────────────────────────────────────────────────
    pdf.setFillColor(13,13,13);
    pdf.rect(0,285,W,12,'F');
    pdf.setTextColor(80,80,80);pdf.setFontSize(7);
    pdf.text('Vivace Events · Virtual Studio Orchestra LLC · vivaceevents.com',W/2,291,{align:'center'});
    pdf.text(`Contract ID: ${contractId}`,W/2,295,{align:'center'});

    // ── Save to Firebase Storage (SECURE) ────────────────────────
    const pdfBytes=pdf.output('arraybuffer');
    const storageRef=ref(storage,`contracts/${contractId}/agreement_${Date.now()}.pdf`);
    
    const metadata={
      contentType:'application/pdf',
      customMetadata:{
        contractId,
        managerEmail:c.managerEmail||'',
        musicianEmail:c.musician||'',
        gigTitle:c.gigTitle||'',
        generatedAt:new Date().toISOString(),
        securityLevel:'private'
      }
    };

    const snapshot=await uploadBytes(storageRef,pdfBytes,metadata);
    const downloadURL=await getDownloadURL(snapshot.ref);

    // Store secure URL in Firestore
    await setDoc(doc(db,'contracts',contractId),{
      pdfUrl:downloadURL,
      pdfGeneratedAt:new Date(),
      fullyExecuted:true
    },{merge:true});

    // Auto-download for current user
    const link=document.createElement('a');
    link.href=URL.createObjectURL(new Blob([pdfBytes],{type:'application/pdf'}));
    link.download=`VivaceEvents_Contract_${c.gigTitle?.replace(/\s+/g,'_')||'Agreement'}_${c.gigDate||''}.pdf`;
    link.click();

    return downloadURL;
  }catch(e){
    console.error('PDF generation error:',e);
    ts('Contract saved — PDF generation requires Firebase Storage to be enabled.');
  }
}

window.executeEmergencyCancel=async function(gigId, gigTitle){
  document.getElementById('emergency-modal')?.remove();
  try{
    // Record emergency cancellation
    const cancelRecord={
      gigId,gigTitle,userId:CU.uid,userEmail:CU.email,
      type:'emergency',hoursNotice:_cancelState.hoursLeft,
      documentationRequired:true,documentationStatus:'pending',
      cancelledAt:new Date()

    await addDoc(collection(db,'cancellations'),cancelRecord);

    // Update application
    const apps=await getDocs(query(collection(db,'applications'),where('gigId','==',gigId),where('userId','==',CU.uid)));

    // Update user profile
    const userSnap=await getDoc(doc(db,'users',CU.uid));
    const userData=userSnap.exists()?userSnap.data():{};

    // Notify manager — URGENT
    const gigSnap=await getDoc(doc(db,'gigs',gigId));
    const managerEmail=gigSnap.data()?.postedBy;
    await addDoc(collection(db,'notifications'),{

    followUp.innerHTML=`<div class="modal" style="text-align:center">
      <div style="font-size:48px;margin-bottom:12px">💙</div>

window.selectReportReason=function(reason){

  if(el)el.classList.add(reason==='safety'||reason==='fake_gig'||reason==='fake_profile'||reason==='fraud'?'sel-red':'sel');
  window._reportContext.reason=reason;
  const btn=document.getElementById('report-submit-btn');
  if(btn){btn.disabled=false;btn.style.background='#FF3B30';btn.style.color='#fff';btn.style.cursor='pointer';btn.onclick=submitReport;}
}

window.submitReport=async function(){
  const ctx=window._reportContext;
  if(!ctx.reason){ts('Please select a reason');return;}
  try{
    await addDoc(collection(db,'reports'),{
      type:ctx.type,targetId:ctx.targetId,targetName:ctx.targetName,
      targetEmail:ctx.targetEmail,reason:ctx.reason,
      details:document.getElementById('report-details')?.value||'',
      reportedBy:CU.uid,reporterEmail:CU.email,
      status:'pending_review',timestamp:new Date()
    });
    document.getElementById('report-modal')?.remove();
    ts('Report submitted. Thank you for helping keep Vivace Events safe. 🛡️');
  }catch(e){ts('Report submitted!');}
}

      </div>
      <div style="display:flex;align-items:center;gap:5px;font-size:11px;color:#555">

      </div>
    </div>
    <div style="font-size:11px;color:#1D9E75;margin-bottom:12px;font-weight:600">💡 Tap a date to set it · Tap two dates to select a range</div>

// Handle calendar day tap — show options
let _perfEvents={}; // {dateStr: {title, venue, time, ticketLink, isPublic}}

window.handleCalDay=function(dateStr){
  // If range start is set and we tap a different date — set end of range
  if(_rangeStart&&!_rangeEnd&&dateStr!==_rangeStart){
    if(dateStr<_rangeStart){_rangeEnd=_rangeStart;_rangeStart=dateStr;}
    else _rangeEnd=dateStr;
    renderCalendarModal();
    return;
  }
  // If same date tapped twice while range start — clear range start
  if(_rangeStart===dateStr&&!_rangeEnd){
    _rangeStart=null;
    renderCalendarModal();
    return;
  }
  // If range is complete, reset and start new
  if(_rangeStart&&_rangeEnd){
    _rangeStart=dateStr;_rangeEnd=null;
    renderCalendarModal();
    return;
  }

  // No range started — show single day options
  const perf=_perfEvents[dateStr];
  const isAvail=_availDates.has(dateStr);
  const isUnavail=_unavailDates&&_unavailDates.has(dateStr);

// Mouse drag for desktop range selection
let _isDragging=false;
window.startCalDrag=function(dateStr){
  _isDragging=true;
  _rangeStart=dateStr;
  _rangeEnd=null;
  renderCalendarModal();
}
window.updateCalDrag=function(dateStr){
  if(!_isDragging||!_rangeStart)return;
  if(dateStr===_rangeStart){_rangeEnd=null;}
  else if(dateStr<_rangeStart){_rangeEnd=_rangeStart;_rangeStart=dateStr;}
  else{_rangeEnd=dateStr;}
  renderCalendarModal();
}
window.endCalDrag=function(){
  _isDragging=false;
}
document.addEventListener('mouseup',()=>{_isDragging=false;});

window.applyRange=function(status){
  if(!_rangeStart||!_rangeEnd)return;
  const start=new Date(_rangeStart+'T00:00:00');
  const end=new Date(_rangeEnd+'T00:00:00');
  const d=new Date(start);
  while(d<=end){
    const dateStr=d.toISOString().split('T')[0];
    if(status==='available'){_availDates.add(dateStr);_unavailDates.delete(dateStr);}
    else if(status==='unavailable'){_unavailDates.add(dateStr);_availDates.delete(dateStr);}
    else if(status==='clear'){_availDates.delete(dateStr);_unavailDates.delete(dateStr);}
    d.setDate(d.getDate()+1);
  }
  const count=Math.round((end-start)/(1000*60*60*24))+1;
  _rangeStart=null;_rangeEnd=null;
  renderCalendarModal();
  ts(`${status==='available'?'✅':status==='unavailable'?'❌':'⚪'} ${count} days updated!`);
}

  _rangeStart=null;_rangeEnd=null;

window.applyBulk=function(type, status){
  const year=_calYear,month=_calMonth;
  const daysInMonth=new Date(year,month+1,0).getDate();
  let count=0;
  for(let d=1;d<=daysInMonth;d++){
    const date=new Date(year,month,d);
    const dow=date.getDay();
    const isWeekday=dow>0&&dow<6;
    const isWeekend=dow===0||dow===6;
    if((type==='weekdays'&&isWeekday)||(type==='weekends'&&isWeekend)){
      const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      if(status==='available'){_availDates.add(dateStr);_unavailDates.delete(dateStr);}
      else if(status==='unavailable'){_unavailDates.add(dateStr);_availDates.delete(dateStr);}
      else{_availDates.delete(dateStr);_unavailDates.delete(dateStr);}
      count++;
    }
  }
  document.getElementById('bulk-picker')?.remove();
  renderCalendarModal();
  ts(`${status==='available'?'✅':status==='unavailable'?'❌':'⚪'} ${count} ${type} updated!`);
}

window.clearMonth=function(){
  const year=_calYear,month=_calMonth;
  const daysInMonth=new Date(year,month+1,0).getDate();
  for(let d=1;d<=daysInMonth;d++){
    const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    _availDates.delete(dateStr);
    _unavailDates.delete(dateStr);
  }
  renderCalendarModal();
  ts('⚪ Month cleared!');
}

window.sendLessonRequest=async function(teacherId, teacherName, teacherEmail){
  const subject=document.getElementById('lesson-subject')?.value?.trim();
  const level=document.getElementById('lesson-level')?.value;
  const date=document.getElementById('lesson-date')?.value;
  const time=document.getElementById('lesson-time')?.value;
  const duration=document.getElementById('lesson-duration')?.value;
  const format=document.getElementById('lesson-format')?.value;
  const message=document.getElementById('lesson-message')?.value?.trim();

  if(!subject){ts('Please enter an instrument or subject');return;}
  if(!date){ts('Please select a preferred date');return;}

  try{
    const lessonId=`lesson_${Date.now()}`;
    const studentName=CU.displayName||CU.email?.split('@')[0]||'Student';

    // Save lesson request
    await setDoc(doc(db,'lessons',lessonId),{
      teacherId,teacherName,teacherEmail,
      studentId:CU.uid,studentEmail:CU.email,studentName,
      subject,level,date,time,duration,format,
      message:message||'',
      status:'pending',
      createdAt:new Date()
    });

    // Notify teacher
    await addDoc(collection(db,'notifications'),{
      toEmail:teacherEmail,
      type:'lesson_request',
      lessonId,
      message:`📚 ${studentName} wants to book a ${duration} ${subject} lesson on ${date} at ${time}. Level: ${level}.`,
      studentId:CU.uid,studentEmail:CU.email,studentName,
      read:false,timestamp:new Date()
    });

    document.getElementById('book-lesson-modal')?.remove();
    ts('📚 Lesson request sent! Teacher will respond shortly.');
  }catch(e){ts('Request sent!');}
}

// ─── TEACHER: VIEW & MANAGE LESSON REQUESTS ──────────────────────
async function loadMyLessons(){
  const el=document.getElementById('my-lessons');if(!el)return;
  try{
    const field=isTeacher()?'teacherId':'studentId';
    const snap=await getDocs(query(collection(db,'lessons'),where(field,'==',CU.uid)));
    const lessons=snap.docs.map(d=>({id:d.id,...d.data()}))
      .sort((a,b)=>new Date(a.date)-new Date(b.date));

    if(lessons.length===0){
      el.innerHTML=`<div style="padding:12px;background:#f9f9f9;border-radius:10px;text-align:center;font-size:13px;color:#aaa">
        ${isTeacher()?'No lesson requests yet':'No lessons booked yet'}
      </div>`;
      return;
    }

    el.innerHTML=lessons.map(l=>{
      const isMyLesson=isTeacher();
      const statusColor=l.status==='confirmed'?'#1D9E75':l.status==='declined'?'#FF3B30':'#EF9F27';
      const statusLabel=l.status==='confirmed'?'✅ Confirmed':l.status==='declined'?'❌ Declined':'⏳ Pending';
      return `
        <div style="border:1px solid #eee;border-radius:12px;padding:12px;margin-bottom:8px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
            <div>
              <div style="font-size:13px;font-weight:600;color:#111">📚 ${l.subject} — ${l.level}</div>
              <div style="font-size:12px;color:#888">${isMyLesson?l.studentName:l.teacherName} · ${l.date} at ${l.time}</div>
              <div style="font-size:11px;color:#aaa">${l.duration} · ${l.format}</div>
            </div>
            <span style="font-size:11px;padding:3px 10px;border-radius:20px;background:${statusColor}22;color:${statusColor};font-weight:600">${statusLabel}</span>
          </div>
          ${l.message?`<div style="font-size:12px;color:#666;background:#f9f9f9;border-radius:8px;padding:8px;margin-bottom:8px">"${l.message}"</div>`:''}
          ${isMyLesson&&l.status==='pending'?`
            <div style="display:flex;gap:6px">
              <button onclick="respondLesson('${l.id}','confirmed','${l.studentEmail}')" 
                style="flex:1;padding:8px;border-radius:8px;background:#1D9E75;border:none;color:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">
                ✅ Accept
              </button>
              <button onclick="respondLesson('${l.id}','declined','${l.studentEmail}')"
                style="flex:1;padding:8px;border-radius:8px;background:#FCEBEB;border:1px solid #F09595;color:#791F1F;font-size:12px;cursor:pointer;font-family:inherit">
                ❌ Decline
              </button>
            </div>`:''}
          ${!isMyLesson&&l.status==='confirmed'?`
            <button onclick="openChat('${l.teacherId}','${l.teacherEmail}','${l.teacherName}')"
              style="width:100%;padding:8px;border-radius:8px;background:#f5f0ff;border:1px solid #7C3AED44;color:#7C3AED;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit">
              💬 Message teacher
            </button>`:''}
        </div>`;
    }).join('');
  }catch(e){
    el.innerHTML=`<div style="font-size:13px;color:#aaa;text-align:center;padding:12px">Could not load lessons</div>`;
  }
}

window.respondLesson=async function(lessonId, status, studentEmail){
  try{
    await setDoc(doc(db,'lessons',lessonId),{status,respondedAt:new Date()},{merge:true});
    const l=(await getDoc(doc(db,'lessons',lessonId))).data();
    await addDoc(collection(db,'notifications'),{
      toEmail:studentEmail,
      type:'lesson_response',
      lessonId,
      message:status==='confirmed'
        ?`✅ ${l.teacherName} accepted your lesson request for ${l.date} at ${l.time}! 🎉`
        :`❌ ${l.teacherName} is not available for ${l.date} at ${l.time}. Please try a different time.`,
      read:false,timestamp:new Date()
    });
    ts(status==='confirmed'?'✅ Lesson confirmed! Student has been notified.':'Lesson declined.');
    loadMyLessons();
  }catch(e){ts('Done!');}
}

// ─── TEACHER ANALYTICS ───────────────────────────────────────────
function teacherAnalyticsHTML(){
  setTimeout(()=>loadTeacherAnalytics(),100);
  return `
<div class="hdr"><div class="logo" style="font-size:15px">📊 Analytics</div><div class="hdr-r" onclick="go('profile')">${ic('out')}</div></div>
<div class="pad" id="analytics-content"><div style="text-align:center;padding:30px 0;color:#aaa">Loading...</div></div>`;}

async function loadTeacherAnalytics(){
  const el=document.getElementById('analytics-content');if(!el)return;
  try{
    const[lessonsSnap,earningsSnap]=await Promise.all([
      getDocs(query(collection(db,'lessons'),where('teacherId','==',CU.uid))),
      getDocs(query(collection(db,'earnings'),where('userId','==',CU.uid)))
    ]);
    const lessons=lessonsSnap.docs.map(d=>({id:d.id,...d.data()}));
    const earnings=earningsSnap.docs.map(d=>({id:d.id,...d.data()}));
    const confirmed=lessons.filter(l=>l.status==='confirmed');
    const pending=lessons.filter(l=>l.status==='pending');
    const students=new Set(confirmed.map(l=>l.studentId));
    const totalRevenue=earnings.reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
    const now=new Date();
    const thisMonth=earnings.filter(e=>{const d=e.date?.toDate?e.date.toDate():new Date(e.date||0);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).reduce((s,e)=>s+(parseFloat(e.amount)||0),0);
    const subjects={};lessons.forEach(l=>{if(l.subject)subjects[l.subject]=(subjects[l.subject]||0)+1;});
    el.innerHTML=`
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px">
        <div style="background:linear-gradient(135deg,#7C3AED,#5B21B6);border-radius:12px;padding:14px;color:#fff">
          <div style="font-size:28px;font-weight:700">${confirmed.length}</div>
          <div style="font-size:12px;opacity:0.8">Confirmed lessons</div>
        </div>
        <div style="background:#f9f9f9;border-radius:12px;padding:14px">
          <div style="font-size:28px;font-weight:700;color:#111">${students.size}</div>
          <div style="font-size:12px;color:#aaa">Total students</div>
        </div>
        <div style="background:#E1F5EE;border-radius:12px;padding:14px">
          <div style="font-size:28px;font-weight:700;color:#085041">$${thisMonth.toFixed(0)}</div>
          <div style="font-size:12px;color:#5DCAA5">This month</div>
        </div>
        <div style="background:#f9f9f9;border-radius:12px;padding:14px">
          <div style="font-size:28px;font-weight:700;color:#111">$${totalRevenue.toFixed(0)}</div>
          <div style="font-size:12px;color:#aaa">All time</div>
        </div>
      </div>
      ${pending.length>0?`<div style="background:#FAEEDA;border-radius:12px;padding:12px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between">
        <div style="font-size:13px;color:#633806;font-weight:600">⏳ ${pending.length} pending request${pending.length>1?'s':''}</div>
        <button onclick="go('profile')" style="padding:6px 12px;border-radius:8px;background:#EF9F27;border:none;color:#fff;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit">Review</button>
      </div>`:''}
      ${Object.keys(subjects).length>0?`<div style="margin-bottom:20px">
        <div style="font-size:14px;font-weight:700;color:#111;margin-bottom:10px">Lessons by subject</div>
        ${Object.entries(subjects).sort((a,b)=>b[1]-a[1]).map(([s,c])=>`
          <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
            <div style="flex:1;font-size:13px;color:#111">${s}</div>
            <div style="font-size:13px;font-weight:600;color:#7C3AED">${c}</div>
            <div style="width:80px;background:#f0f0f0;border-radius:4px;height:6px"><div style="height:100%;background:#7C3AED;width:${Math.min(100,(c/lessons.length)*100)}%;border-radius:4px"></div></div>
          </div>`).join('')}
      </div>`:''}
      <div style="font-size:14px;font-weight:700;color:#111;margin-bottom:10px">Recent lessons</div>
      ${lessons.length===0?`<div style="text-align:center;padding:20px 0;color:#aaa;font-size:13px">No lessons yet</div>`:
        lessons.slice(0,5).map(l=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f5f5f5">
            <div><div style="font-size:13px;font-weight:600;color:#111">${l.studentName||'Student'}</div>
            <div style="font-size:11px;color:#aaa">${l.subject||'—'} · ${l.date||'—'}</div></div>
            <span style="font-size:11px;padding:3px 8px;border-radius:20px;background:${l.status==='confirmed'?'#E1F5EE':l.status==='declined'?'#FCEBEB':'#FAEEDA'};color:${l.status==='confirmed'?'#085041':l.status==='declined'?'#791F1F':'#633806'}">${l.status}</span>
          </div>`).join('')}
    `;
  }catch(e){el.innerHTML=`<div style="text-align:center;padding:20px 0;color:#aaa">Could not load</div>`;}
}

async function loadStudentProgress(){
  const el=document.getElementById('progress-content');if(!el)return;
  try{
    const snap=await getDocs(query(collection(db,'lessons'),where('teacherId','==',CU.uid),where('status','==','confirmed')));
    const lessons=snap.docs.map(d=>({id:d.id,...d.data()}));
    const studentMap={};
    lessons.forEach(l=>{
      if(!studentMap[l.studentId])studentMap[l.studentId]={id:l.studentId,name:l.studentName||'Student',email:l.studentEmail||'',lessons:[]};
      studentMap[l.studentId].lessons.push(l);

    const students=Object.values(studentMap);

    // Load existing notes
    const notesSnaps=await Promise.all(students.map(s=>getDoc(doc(db,'studentProgress',CU.uid+'_'+s.id)).catch(()=>null)));

    el.innerHTML=`<div style="font-size:13px;color:#888;margin-bottom:16px">${students.length} student${students.length>1?'s':''}</div>

            <div class="av" style="width:40px;height:40px;font-size:14px;background:#7C3AED;color:#fff">${(s.name||'S').substring(0,2).toUpperCase()}</div>
            <div style="flex:1">
              <div style="font-size:14px;font-weight:600;color:#111">${s.name}</div>
              <div style="font-size:12px;color:#aaa">${s.lessons.length} lesson${s.lessons.length>1?'s':''} · ${s.lessons[0]?.subject||'—'}</div>
            </div>
            <button onclick="openChat('${s.id}','${s.email}','${s.name}')" style="padding:6px 10px;border-radius:8px;background:#f5f0ff;border:1px solid #7C3AED44;color:#7C3AED;font-size:11px;cursor:pointer;font-family:inherit">💬</button>
          </div>

          <textarea id="notes-${s.id}" style="width:100%;padding:8px;border-radius:8px;border:1px solid #eee;font-size:12px;font-family:inherit;resize:none;margin:4px 0 8px;box-sizing:border-box" rows="2" placeholder="Add notes about progress…">${notesMap[s.id]||''}</textarea>
          <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">

        </div>`).join('')}`;
  }catch(e){el.innerHTML=`<div style="text-align:center;padding:20px 0;color:#aaa">Could not load</div>`;}
}

window.showEditCourse=async function(courseId){const snap=await getDoc(doc(db,'courses',courseId));showCreateCourse(courseId,snap.data());}

window.saveCourse=async function(courseId){
  const title=document.getElementById('c-title')?.value?.trim();
  if(!title){ts('Please enter a course title');return;}
  const topics=(document.getElementById('c-topics')?.value||'').split('\n').filter(t=>t.trim()).map((t,i)=>({title:t.trim(),order:i+1}));
  const data={teacherId:CU.uid,teacherEmail:CU.email,teacherName:UP.name||CU.email?.split('@')[0]||'',
    title,subject:document.getElementById('c-subject')?.value||'',level:document.getElementById('c-level')?.value||'All levels',
    description:document.getElementById('c-desc')?.value||'',lessons:topics,price:document.getElementById('c-price')?.value||'',
    enrolled:0,createdAt:new Date()};
  try{
    if(courseId)await setDoc(doc(db,'courses',courseId),data,{merge:true});
    else await addDoc(collection(db,'courses'),data);
    document.getElementById('course-modal')?.remove();
    ts('📚 Course saved!');loadCourses();
  }catch(e){ts('Saved!');}
}

window.deleteCourse=async function(courseId){
  if(!confirm('Delete this course?'))return;
  await deleteDoc(doc(db,'courses',courseId));
  ts('Course deleted');loadCourses();
}

window.shareCourse=function(courseId){
  const url=`vivaceevents.com/course/${courseId}`;
  navigator.clipboard?.writeText('https://'+url).then(()=>ts('🔗 Course link copied!')).catch(()=>ts('Link: vivaceevents.com/course/'+courseId));
}

  const file=event.dataTransfer.files[0];
  if(file)uploadDocFile(file, gigId);
}

window.handleDocFile=function(input, gigId){
  const file=input.files[0];
  if(file)uploadDocFile(file, gigId);
}

async function uploadDocFile(file, gigId){
  if(file.size>10*1024*1024){ts('File too large — max 10MB');return;}
  const validTypes=['application/pdf','image/jpeg','image/jpg','image/png'];
  if(!validTypes.includes(file.type)){ts('Only PDF, JPG, PNG accepted');return;}

  // Show progress
  document.getElementById('doc-upload-progress').style.display='block';
  document.getElementById('doc-upload-area').style.display='none';
  const progressBar=document.getElementById('doc-progress-bar');
  const progressText=document.getElementById('doc-progress-text');

  try{
    progressBar.style.width='30%';
    progressText.textContent='Uploading...';

    const fileName=`${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
    const storageRef=ref(storage,`cancellation-docs/${CU.uid}/${gigId}/${fileName}`);
    
    const metadata={
      contentType:file.type,
      customMetadata:{
        userId:CU.uid,
        userEmail:CU.email||'',
        gigId,
        uploadedAt:new Date().toISOString()
      }
    };

    progressBar.style.width='60%';
    const snapshot=await uploadBytes(storageRef,file,metadata);
    progressBar.style.width='90%';
    const downloadURL=await getDownloadURL(snapshot.ref);
    progressBar.style.width='100%';
    progressText.textContent='Upload complete!';

    // Store for submission
    window._docFileUrl=downloadURL;
    window._docFileName=file.name;

    // Show success
    setTimeout(()=>{
      document.getElementById('doc-upload-progress').style.display='none';
      document.getElementById('doc-uploaded-file').style.display='block';
      document.getElementById('doc-file-name').textContent=file.name;
    },500);

  }catch(e){
    document.getElementById('doc-upload-progress').style.display='none';
    document.getElementById('doc-upload-area').style.display='block';
    ts('Upload failed — please try again');
    console.error('Doc upload error:',e);
  }
}

window.submitDocumentation=async function(gigId){
  const type=document.getElementById('doc-type')?.value;
  const desc=document.getElementById('doc-desc')?.value||'';
  
  if(!window._docFileUrl){
    ts('Please attach a document first');
    return;
  }

  try{
    // Update cancellation record
    const cSnap=await getDocs(query(collection(db,'cancellations'),
      where('gigId','==',gigId),where('userId','==',CU.uid)));
    
    for(const c of cSnap.docs){
      await updateDoc(doc(db,'cancellations',c.id),{
        documentationStatus:'submitted',
        documentType:type,
        documentDescription:desc,
        documentUrl:window._docFileUrl,
        documentFileName:window._docFileName,
        submittedAt:new Date()
      });
    }

    // Update user profile
    await setDoc(doc(db,'users',CU.uid),{documentationPending:false},{merge:true});

    // Notify manager
    const gigSnap=await getDoc(doc(db,'gigs',gigId));
    const managerEmail=gigSnap.data()?.postedBy;
    if(managerEmail){
      await addDoc(collection(db,'notifications'),{
        toEmail:managerEmail,
        type:'documentation_submitted',
        message:`📋 ${CU.displayName||CU.email?.split('@')[0]||'A musician'} has submitted cancellation documentation for your review.`,
        gigId,documentUrl:window._docFileUrl,
        read:false,timestamp:new Date()
      });
    }

    document.getElementById('docup-modal')?.remove();
    window._docFileUrl=null;
    window._docFileName=null;
    ts('✅ Documentation submitted! Manager will review shortly.');
  }catch(e){ts('Submitted!');}
}

window.showMusicianCalendar=async function(musicianId, musicianName){
  const m=document.createElement('div');m.className='modal-bg';m.id='musician-cal-modal';
  m.innerHTML=`<div class="modal" style="max-height:90vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div>
        <div style="font-size:17px;font-weight:700;color:#111">📅 ${musicianName}</div>
        <div style="font-size:12px;color:#888;margin-top:2px">Availability & performances</div>
      </div>
      <button onclick="document.getElementById('musician-cal-modal').remove()" style="background:none;border:none;font-size:22px;color:#888;cursor:pointer">✕</button>
    </div>
    <div id="musician-cal-content"><div style="text-align:center;padding:20px 0;color:#aaa">Loading...</div></div>
  </div>`;
  document.getElementById('app').appendChild(m);
  try{
    const snap=await getDoc(doc(db,'availability',musicianId));
    const data=snap.exists()?snap.data():{};
    const available=data.available||[];
    const unavailable=data.unavailable||[];
    const performances=data.performances||[];
    const el=document.getElementById('musician-cal-content');if(!el)return;
    const now=new Date();
    const months=[];
    for(let i=0;i<2;i++){const d=new Date(now.getFullYear(),now.getMonth()+i,1);months.push(d);}
    let html='';
    const upcomingPerf=performances.filter(p=>new Date(p.date)>=now).sort((a,b)=>new Date(a.date)-new Date(b.date));
    if(upcomingPerf.length>0){
      html+=`<div style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:600;color:#111;margin-bottom:8px">🎵 Upcoming performances</div>
        ${upcomingPerf.slice(0,3).map(p=>`
          <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5">
            <div><div style="font-size:13px;font-weight:600;color:#111">${p.title||'Performance'}</div>
            <div style="font-size:11px;color:#aaa">${p.venue||'—'}</div></div>
            <div style="font-size:12px;color:#888">${p.date||'—'}</div>
          </div>`).join('')}
      </div>`;
    }
    months.forEach(monthDate=>{
      const year=monthDate.getFullYear();const month=monthDate.getMonth();
      const monthName=monthDate.toLocaleString('default',{month:'long',year:'numeric'});
      const daysInMonth=new Date(year,month+1,0).getDate();
      const firstDay=new Date(year,month,1).getDay();
      html+=`<div style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:600;color:#111;margin-bottom:8px">${monthName}</div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;text-align:center">
          ${['S','M','T','W','T','F','S'].map(d=>`<div style="font-size:10px;color:#aaa;padding:4px 0">${d}</div>`).join('')}
          ${Array(firstDay).fill('<div></div>').join('')}
          ${Array.from({length:daysInMonth},(_,i)=>{
            const day=i+1;
            const dateStr=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
            const isAvail=available.includes(dateStr);
            const isUnavail=unavailable.includes(dateStr);
            const isPerf=performances.some(p=>p.date===dateStr);
            const isToday=dateStr===new Date().toISOString().split('T')[0];
            let bg='transparent',color='#111',border='none';
            if(isPerf){bg='#1D9E75';color='#fff';}
            else if(isAvail){bg='#E1F5EE';color='#085041';}
            else if(isUnavail){bg='#FCEBEB';color='#791F1F';}
            if(isToday)border='2px solid #1D9E75';
            return `<div style="padding:4px 2px;border-radius:6px;background:${bg};color:${color};font-size:11px;border:${border}">${day}</div>`;
          }).join('')}
        </div>
      </div>`;
    });
    html+=`<div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px">
      <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;border-radius:3px;background:#E1F5EE"></div><span style="font-size:11px;color:#888">Available</span></div>
      <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;border-radius:3px;background:#FCEBEB"></div><span style="font-size:11px;color:#888">Unavailable</span></div>
      <div style="display:flex;align-items:center;gap:4px"><div style="width:12px;height:12px;border-radius:3px;background:#1D9E75"></div><span style="font-size:11px;color:#888">Performance</span></div>
    </div>`;
    el.innerHTML=html;
  }catch(e){
    document.getElementById('musician-cal-content').innerHTML=`<div style="text-align:center;padding:20px 0;color:#aaa">No availability data</div>`;
  }
}

}

// Add My Connections section to profile
async function loadMyConnections(){
  const el=document.getElementById('my-connections');if(!el)return;
  try{
    let connections=[];
    if(isMgr()){
      const s=await getDocs(query(collection(db,'connections'),where('managerId','==',CU.uid),where('status','==','accepted')));
      connections=s.docs.map(d=>({id:d.id,...d.data(),role:'manager'}));
    } else {
      const s=await getDocs(query(collection(db,'connections'),where('musicianEmail','==',CU.email),where('status','==','accepted')));
      connections=s.docs.map(d=>({id:d.id,...d.data(),role:'musician'}));
    }

    // Also show pending
    const pending=isMgr()?
      await getDocs(query(collection(db,'connections'),where('managerId','==',CU.uid),where('status','==','pending'))):
      await getDocs(query(collection(db,'connections'),where('musicianEmail','==',CU.email),where('status','==','pending')));
    const pendingList=pending.docs.map(d=>({id:d.id,...d.data(),isPending:true}));

    if(connections.length===0&&pendingList.length===0){
      el.innerHTML=`<div style="padding:12px;background:#f9f9f9;border-radius:10px;text-align:center;font-size:13px;color:#aaa">No connections yet</div>`;
      return;
    }

    el.innerHTML=[...connections,...pendingList].map(c=>`
      <div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f5f5f5">
        <div class="av" style="width:36px;height:36px;font-size:12px;background:#E1F5EE;color:#085041">
          ${(c.role==='manager'?(c.musicianName||c.musicianEmail||'?'):(c.managerName||c.managerEmail||'?')).substring(0,2).toUpperCase()}
        </div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:#111">

          </div>
          <div style="font-size:11px;color:#aaa">${c.isPending?'⏳ Pending':'🔗 Connected'}</div>

        `:''}

  }catch(e){}
}

window.submitRating=async function(ratingId,musicianId,musicianEmail){
  try{
    const avg=(((_ratingState.perf||0)+(_ratingState.appear||0)+(_ratingState.comm||0))/3).toFixed(1);
    const existing=await getDoc(doc(db,'ratings',ratingId));
    const history=existing.exists()?(existing.data().history||[]):[];
    history.push({
      performance:_ratingState.perf,appearance:_ratingState.appear,
      communication:_ratingState.comm,priority:_ratingState.priority,
      ratedAt:new Date(),managerId:CU.uid,managerEmail:CU.email
    });
    await setDoc(doc(db,'ratings',ratingId),{
      managerId:CU.uid,managerEmail:CU.email,
      musicianId,musicianEmail,
      performance:_ratingState.perf,appearance:_ratingState.appear,
      communication:_ratingState.comm,
      average:parseFloat(avg),
      priority:_ratingState.priority,
      history,updatedAt:new Date()
    });

    // Update musician's public average (across all managers, stars only — no priority)
    const allRatings=await getDocs(query(collection(db,'ratings'),where('musicianId','==',musicianId)));
    let totalAvg=0,count=0;
    allRatings.docs.forEach(d=>{if(d.data().average){totalAvg+=d.data().average;count++;}});
    const publicAvg=count>0?(totalAvg/count).toFixed(1):avg;
    await setDoc(doc(db,'users',musicianId),{publicRating:parseFloat(publicAvg),ratingCount:count},{merge:true});

    document.getElementById('rating-modal')?.remove();
    const priorityLabels={top:'🟢 Top priority',medium:'🟡 Medium',low:'🔵 Low',unknown:'⚪ Unknown',never:'🔴 Never again'};
    ts('Rating saved! '+priorityLabels[_ratingState.priority||'unknown']);
  }catch(e){ts('Rating saved!');}
}

    if(needs.length>0){
      html+=`<div><div style="font-size:11px;font-weight:600;color:#633806;margin-bottom:6px">✋ Need rides (${needs.length})</div>
        ${needs.map(e=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;background:#FAEEDA;border-radius:8px;margin-bottom:4px">

        </div>`).join('')}</div>`;

const DEMO_GIG_DATE=new Date();
DEMO_GIG_DATE.setDate(DEMO_GIG_DATE.getDate()+(5-DEMO_GIG_DATE.getDay()+7)%7||7);

let _currentDemoResponse=null; // tracks current response

function _applyBtnStyles(selected){
  const map={available:'demo-avail',maybe:'demo-maybe',no:'demo-no'};
  Object.entries(map).forEach(([type,id])=>{
    const btn=document.getElementById(id);if(!btn)return;
    if(!selected){
      // No response yet — all full color, equal opacity
      btn.style.opacity='1';
      btn.style.transform='scale(1)';
      btn.style.boxShadow='none';
    } else if(type===selected){
      // Selected — pop forward
      btn.style.opacity='1';
      btn.style.transform='scale(1.05)';
      btn.style.boxShadow='0 0 0 3px rgba(255,255,255,0.35)';
    } else {
      // Others — fade slightly
      btn.style.opacity='0.45';
      btn.style.transform='scale(1)';
      btn.style.boxShadow='none';
    }
  });
}

async function _saveResponse(type){
  _currentDemoResponse=type;
  _applyBtnStyles(type);
  try{
    await addDoc(collection(db,'responses'),{
      type,userId:CU.uid,userEmail:CU.email,
      broadcastId:'demo',timestamp:new Date()
    });
  }catch(e){}

function _hoursUntilGig(){
  return Math.round((DEMO_GIG_DATE-new Date())/3600000);
}

function _responseLabel(type){
  return type==='available'?'I am available':type==='maybe'?'Maybe':'Can\'t make it';
}

window.demoRespond=async function(type){
  const hours=_hoursUntilGig();

  // CASE 1: No previous response — first time
  if(!_currentDemoResponse){
    // Show friendly first-time confirmation
    showResponseConfirm({
      emoji: type==='available'?'✅':type==='maybe'?'⚡':'❌',
      title: type==='available'?'Mark yourself as available?':type==='maybe'?'Mark as maybe?':'Mark as can\'t make it?',
      body: type==='available'?'The manager will see you\'re available and may reach out to confirm your spot.':
            type==='maybe'?'You\'ll appear as "maybe" — you can update this anytime before the gig.':
            'You\'ll be marked as unavailable. You can still change this later if plans change.',
      confirmLabel: type==='available'?'✅ Yes, I\'m available':type==='maybe'?'⚡ Mark as maybe':'❌ Can\'t make it',
      confirmColor: type==='available'?'#1D9E75':type==='maybe'?'#FFD700':'#FF3B30',
      confirmTextColor: type==='maybe'?'#7A5800':'#fff',
      onConfirm: async()=>{ await _saveResponse(type); ts(type==='available'?'✅ You\'re marked as available! Manager will be in touch.':type==='maybe'?'⚡ Marked as maybe — you can update anytime.':'❌ Got it — marked as can\'t make it.'); }
    });
    return;
  }

  // CASE 2: Same response — no action needed
  if(_currentDemoResponse===type){
    ts('You already selected this response.');
    return;
  }

  // CASE 3: Changing response — check timing
  if(hours<=24){
    // HARD BLOCK — must use cancellation protocol
    showResponseConfirm({
      emoji:'🚨',
      title:'Less than 24 hours to go!',
      body:`It's too late to simply change your response. To cancel or change your availability this close to the gig, you need to go through the cancellation process so the manager is properly notified.`,
      confirmLabel:'Go to cancellation',
      confirmColor:'#FF3B30',
      confirmTextColor:'#fff',
      cancelLabel:'Keep my response',
      onConfirm:()=>{ ts('Please use the Cancel booking button on the gig card.'); }
    });
    return;
  }

  if(hours<=72){
    // WARNING — manager will be notified
    showResponseConfirm({
      emoji:'⚠️',
      title:'Heads up — late change',
      body:`You're changing from "${_responseLabel(_currentDemoResponse)}" to "${_responseLabel(type)}" less than 72 hours before the gig.\n\nThe manager will be notified immediately of this change.`,
      confirmLabel:`Change to ${_responseLabel(type)}`,
      confirmColor: type==='available'?'#1D9E75':type==='maybe'?'#FFD700':'#FF3B30',
      confirmTextColor: type==='maybe'?'#7A5800':'#fff',
      cancelLabel:'Keep my response',
      onConfirm: async()=>{
        await _saveResponse(type);
        // Notify manager
        try{
          await addDoc(collection(db,'notifications'),{
            toEmail:'manager@vivaceevents.com',
            type:'response_changed',
            message:`⚠️ ${CU.email?.split('@')[0]||'A musician'} changed their response from "${_responseLabel(_currentDemoResponse)}" to "${_responseLabel(type)}" — less than 72 hours before the gig.`,
            read:false,timestamp:new Date()
          });
        }catch(e){}
        ts(`Response updated. Manager has been notified. ${type==='available'?'✅':type==='maybe'?'⚡':'❌'}`);
      }
    });
    return;
  }

  // CASE 4: More than 72 hours — change freely with simple confirmation
  showResponseConfirm({
    emoji: type==='available'?'✅':type==='maybe'?'⚡':'❌',
    title:`Change to "${_responseLabel(type)}"?`,
    body:`You previously responded "${_responseLabel(_currentDemoResponse)}". You can change this freely since the gig is more than 72 hours away.`,
    confirmLabel:`Change to ${_responseLabel(type)}`,
    confirmColor: type==='available'?'#1D9E75':type==='maybe'?'#FFD700':'#FF3B30',
    confirmTextColor: type==='maybe'?'#7A5800':'#fff',
    cancelLabel:'Keep my response',
    onConfirm: async()=>{
      await _saveResponse(type);
      ts(`Response updated to "${_responseLabel(type)}" ${type==='available'?'✅':type==='maybe'?'⚡':'❌'}`);
    }
  });
}

let _skillFilter='';
let _roleFilter='';
let _genreFilter='';

window.selectPill=function(el, type){
  const container=document.getElementById(type==='inst'?'inst-pills':type==='skill'?'skill-pills':type==='genre'?'genre-pills':'role-pills');
  const color=type==='inst'?'#1D9E75':type==='skill'?'#0C447C':type==='genre'?'#7C3AED':'#555';
  container.querySelectorAll('button').forEach(btn=>{
    const gd=GENRE_LIST.find(g=>g.name===btn.textContent.trim());
    if(type==='genre'&&gd){btn.style.background=gd.color;btn.style.borderColor=gd.text+'44';btn.style.color=gd.text;}
    else{btn.style.background='#fff';btn.style.borderColor='#e0e0e0';btn.style.color='#555';}
  });
  el.style.background=type==='genre'&&el.dataset.filter?GENRE_LIST.find(g=>g.name.toLowerCase()===el.dataset.filter)?.color||color:color;
  el.style.borderColor=color;el.style.color='#fff';
  if(type==='inst')_instFilter=el.dataset.filter||'';
  else if(type==='skill')_skillFilter=el.dataset.filter||'';
  else if(type==='genre')_genreFilter=el.dataset.filter||'';
  else _roleFilter=el.dataset.filter||'';

}

window.clearSearch=function(){
  const inp=document.getElementById('search-input');
  if(inp)inp.value='';
  document.getElementById('search-clear').style.display='none';

}

window.filterArtists=function(){
  const query=(document.getElementById('search-input')?.value||'').toLowerCase().trim();
  const clear=document.getElementById('search-clear');
  if(clear)clear.style.display=query?'block':'none';

  // If no artists loaded yet, wait
  if(_allArtists.length===0){loadArtistCards();return;}

  const filtered=_allArtists.filter(a=>{
    const name=(a.name||'').toLowerCase();
    const role=(a.role||'').toLowerCase();
    const tags=(a.tags||'').toLowerCase();
    const instruments=(a.instruments||[]).map(i=>i.name?.toLowerCase()||'').join(' ');
    const skills=(a.skills||[]).join(' ').toLowerCase();
    const roles=(a.roles||[]).join(' ').toLowerCase();
    const genres=(a.genres||[]).join(' ').toLowerCase();

    if(query){
      const matches=name.includes(query)||role.includes(query)||tags.includes(query)||
        instruments.includes(query)||skills.includes(query)||genres.includes(query);
      if(!matches)return false;
    }
    if(_instFilter){
      const hasInst=instruments.includes(_instFilter)||tags.includes(_instFilter)||role.includes(_instFilter);
      if(!hasInst)return false;
    }
    if(_skillFilter){
      if(!skills.includes(_skillFilter))return false;
    }
    if(_genreFilter){
      const genreArr=(a.genres||[]).map(g=>g.toLowerCase());
      if(genreArr.length===0)return false;
      if(!genreArr.some(g=>g.includes(_genreFilter)||_genreFilter.includes(g)))return false;
    }
    if(_ensembleFilter){
      const ensembles=(a.ensembles||[]).join(' ').toLowerCase();
      if(!ensembles.includes(_ensembleFilter))return false;
    }
    if(_roleFilter==='available'){
      if(!a.avail)return false;
    } else if(_roleFilter){
      if(!roles.includes(_roleFilter))return false;
    }
    return true;
  });

  // If filtering by teacher and no real teachers found — show demo teachers
  const demoTeachers=[

window.toggleCP=function(n){
  const i=CP.indexOf(n);
  if(i>-1)CP.splice(i,1);else CP.push(n);
  // Just update the visual without re-rendering
  const circles=document.querySelectorAll('.member-check');
  circles.forEach(el=>{
    const onclick=el.getAttribute('onclick')||'';
    const name=onclick.match(/toggleCP\('([^']+)'\)/)?.[1];
    if(name){
      if(CP.includes(name))el.classList.add('on');
      else el.classList.remove('on');
    }
  });
  // Update or show the floating selection bar
  let bar=document.getElementById('cp-bar');
  if(CP.length>0){
    if(!bar){
      bar=document.createElement('div');bar.id='cp-bar';
      bar.style.cssText='position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#0d0d0d;color:#fff;font-size:13px;padding:12px 20px;border-radius:20px;z-index:100;display:flex;align-items:center;gap:12px;max-width:380px;width:calc(100% - 32px)';

  } else {

}

function showGPicker(names){
  document.getElementById('gpick')?.remove();
  const m=document.createElement('div');m.className='modal-bg';m.id='gpick';
  m.innerHTML=`<div class="modal">
    <div style="font-size:16px;font-weight:700;color:#111;margin-bottom:4px">Invite to which group?</div>
    <div style="font-size:13px;color:#888;margin-bottom:16px">Inviting: ${names.join(', ')}</div>
    ${groups.map((g,i)=>`
      <div class="card" style="cursor:pointer;margin-bottom:8px;border:2px solid transparent" 
        id="gpick-${i}"
        onmouseover="this.style.borderColor='#1D9E75'"
        onmouseout="this.style.borderColor='transparent'"
        onclick="window._gpickInvite(${i})">
        <div style="font-size:14px;font-weight:700;color:#111">${g.name}</div>
        <div style="font-size:12px;color:#888">${g.type||'Group'} · ${g.memberCount||0} members</div>
      </div>`).join('')}
    <button class="bg" style="width:100%;margin-top:8px;padding:13px" onclick="document.getElementById('gpick').remove()">Cancel</button>
  </div>`;
  // Store names in window to avoid JSON escaping issues
  window._gpickNames=names;
  window._gpickInvite=function(idx){
    const g=groups[idx];
    if(!g)return;
    doInvite(g.id,g.name,window._gpickNames);
  };
  document.getElementById('app').appendChild(m);
}

window.doInvite=async function(gid,gname,names){
  try{
    for(const n of names){
      await addDoc(collection(db,'invites'),{groupId:gid,groupName:gname,toName:n,fromId:CU.uid,fromEmail:CU.email,status:'pending',timestamp:new Date()});
      // Send notification to invited artist
      await addDoc(collection(db,'notifications'),{
        toEmail:n.includes('@')?n:n+'@vivaceevents.com',
        type:'group_invite',
        message:`🎵 You've been invited to join the group "${gname}" on Vivace Events!`,
        groupId:gid,groupName:gname,
        fromEmail:CU.email,
        read:false,timestamp:new Date()
      });
    }
    ts('Invites sent to '+names.length+' artist'+(names.length>1?'s':'')+' for '+gname+'! 🎉');
    document.getElementById('gpick')?.remove();
    document.getElementById('cp-bar')?.remove();
    CP=[];
    document.querySelectorAll('.member-check').forEach(el=>el.classList.remove('on'));
  }catch(e){ts('Invites sent!');}
}

  const ed=document.getElementById('g-date-end')?.value;
  const et=document.getElementById('g-time-end')?.value;
  const disp=document.getElementById('g-dur');
  if(!disp||!sd){if(disp)disp.style.display='none';return;}
  const s=new Date(sd+'T'+(st||'00:00'));
  const e=new Date((ed||sd)+'T'+(et||st||'23:59'));
  if(isNaN(s)||isNaN(e)||e<=s){disp.style.display='none';return;}
  const mins=Math.round((e-s)/60000);
  const days=Math.floor(mins/1440);
  const hrs=Math.floor((mins%1440)/60);
  const m=mins%60;
  let label='';
  if(days>0)label+=days+' day'+(days>1?'s':'');
  if(hrs>0)label+=(label?' ':'')+hrs+' hr'+(hrs>1?'s':'');
  if(m>0&&days===0)label+=(label?' ':'')+m+' min';
  if(label){disp.style.display='block';disp.textContent='⏱ '+t('duration')+': '+label;}
  else disp.style.display='none';
}

      </div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="bg" style="flex:1;padding:13px" onclick="document.getElementById('stripe-modal').remove()">Cancel</button>
      <button class="bt" id="checkout-btn" style="flex:2;padding:13px;font-size:14px;font-weight:600" onclick="processPlan('${planId}','${priceId||PRICE_IDS[planId]}',${isTrial||false})">
        ${isTrial?'Start for $1/month →':'Continue to checkout →'}
      </button>
    </div>
  </div>`;
  document.getElementById('app').appendChild(m);
}

window.processPlan=async function(planId, priceId, isTrial){
  const btn=document.getElementById('checkout-btn');
  if(btn){btn.textContent='Loading...';btn.disabled=true;}
  try{
    const res=await fetch(CF_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({priceId:priceId||PRICE_IDS[planId],userId:CU.uid,email:CU.email,plan:planId,isTrial:isTrial||false})
    });
    if(!res.ok)throw new Error('Server error');
    const {url}=await res.json();
    if(isTrial){
      await setDoc(doc(db,'users',CU.uid),{trialUsed:true},{merge:true});
    }
    window.location.href=url;
  }catch(e){
    document.getElementById('stripe-modal')?.remove();
    ts('Could not start checkout. Please try again.');
  }
}

window.triggerReelUpload=function(){
  document.getElementById('reel-file-input')?.click();
}

window.uploadReel=async function(input){
  const file=input.files[0];
  if(!file)return;
  if(file.size>100*1024*1024){ts('Video must be under 100MB');return;}
  if(!file.type.startsWith('video/')){ts('Please select a video file');return;}

  const progress=document.getElementById('reel-progress');
  const bar=document.getElementById('reel-progress-bar');
  const text=document.getElementById('reel-progress-text');
  if(progress)progress.style.display='block';

  try{
    const storageRef=ref(storage,`reels/${CU.uid}/${Date.now()}_${file.name}`);
    // Use uploadBytes for simplicity
    if(text)text.textContent='Uploading...';
    if(bar)bar.style.width='50%';
    const snapshot=await uploadBytes(storageRef,file);
    const url=await getDownloadURL(snapshot.ref);
    UP.reelURL=url;
    await saveUP();
    if(progress)progress.style.display='none';
    ts('🎥 Video reel uploaded!');
    render();
  }catch(e){
    console.error('Reel upload error:',e);
    if(progress)progress.style.display='none';
    ts('Upload failed — '+e.message);
  }
}

window.deleteReel=async function(){
  if(!confirm('Delete your video reel?'))return;
  UP.reelURL='';
  await saveUP();
  ts('Reel deleted');
  render();
}

window.loadSmartSuggestions=async function(date, neededInstruments, neededSkills){
  const el=document.getElementById('smart-suggestions');if(!el)return;
  if(!date){el.innerHTML='';return;}
  
  el.innerHTML=`<div style="padding:12px;text-align:center;font-size:13px;color:#aaa">Finding available artists...</div>`;
  
  try{
    // Get all users with instruments/skills
    const usersSnap=await getDocs(collection(db,'users'));
    const allUsers=usersSnap.docs.map(d=>({id:d.id,...d.data()}));
    
    // Get confirmed gigs on this date
    const gigsSnap=await getDocs(query(collection(db,'gigs'),where('date','==',date),where('status','==','filled')));
    const confirmedOnDate=new Set();
    gigsSnap.docs.forEach(g=>{
      (g.data().confirmedApplicants||[]).forEach(uid=>confirmedOnDate.add(uid));
    });

    // Get this manager's ratings
    const ratingsSnap=await getDocs(query(collection(db,'ratings'),where('managerId','==',CU.uid)));
    const ratings={};
    ratingsSnap.docs.forEach(d=>{
      ratings[d.data().musicianId]={priority:d.data().priority,average:d.data().average};
    });

    // Filter and score users
    const needed=(neededInstruments||'').toLowerCase().split(',').map(x=>x.trim()).filter(Boolean);
    const neededSkillsList=(neededSkills||'').toLowerCase().split(',').map(x=>x.trim()).filter(Boolean);

    const suggestions=allUsers.filter(u=>{
      if(u.id===CU.uid)return false; // not yourself
      if(confirmedOnDate.has(u.id))return false; // already booked
      if(ratings[u.id]?.priority==='never')return false; // never again
      
      // Match instruments or skills
      const userInst=(u.instruments||[]).map(i=>i.name.toLowerCase());
      const userSkills=(u.skills||[]).map(s=>s.toLowerCase());
      
      if(needed.length===0&&neededSkillsList.length===0)return true;
      
      const instMatch=needed.some(n=>userInst.some(i=>i.includes(n)||n.includes(i)));
      const skillMatch=neededSkillsList.some(n=>userSkills.some(s=>s.includes(n)||n.includes(s)));
      
      return instMatch||skillMatch;
    }).map(u=>{
      const r=ratings[u.id];
      const priority=r?.priority||'unknown';
      const avg=r?.average||0;
      const userInst=(u.instruments||[]);
      const primaryInst=userInst.find(i=>i.primary)?.name||userInst[0]?.name||'';
      const priorityOrder={top:0,medium:1,low:2,unknown:3};
      return {...u,priority,avg,primaryInst,score:priorityOrder[priority]||3};
    }).sort((a,b)=>a.score-b.score||(b.avg-a.avg));

    if(suggestions.length===0){
      el.innerHTML=`<div style="padding:12px;background:#f9f9f9;border-radius:10px;text-align:center;font-size:13px;color:#aaa">No matches from your roster for this date</div>`;
      return;
    }

    const priorityColors={top:'#E1F5EE',medium:'#FAEEDA',low:'#E6F1FB',unknown:'#f5f5f5'};
    const priorityLabels={top:'🟢 Top',medium:'🟡 Medium',low:'🔵 Low',unknown:'⚪ New'};

    el.innerHTML=`
      <div style="font-size:12px;font-weight:600;color:#1D9E75;margin-bottom:8px;letter-spacing:.05em">✨ SMART SUGGESTIONS — ${suggestions.length} available</div>
      ${suggestions.slice(0,5).map(u=>`
        <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:${priorityColors[u.priority]||'#f5f5f5'};margin-bottom:6px">
          <div class="av" style="width:38px;height:38px;font-size:13px;background:#B5D4F4;color:#0C447C;flex-shrink:0">${(u.name||u.email||'?').substring(0,2).toUpperCase()}</div>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:600;color:#111">${u.name||u.email?.split('@')[0]||'Artist'}</div>
            <div style="font-size:11px;color:#666">${u.primaryInst}${u.avg>0?' · ⭐ '+u.avg:''}</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
            <span style="font-size:10px;font-weight:600;color:#555">${priorityLabels[u.priority]||'⚪'}</span>
            <button onclick="inviteToGig('${u.id}','${(u.name||u.email||'').replace(/'/g,"\\'")}','${u.email||''}')" 
              style="font-size:11px;padding:4px 10px;border-radius:8px;background:#1D9E75;color:#fff;border:none;cursor:pointer;font-family:inherit;font-weight:600">
              Invite
            </button>
          </div>
        </div>`).join('')}
      ${suggestions.length>5?`<div style="font-size:12px;color:#aaa;text-align:center;padding:6px">+${suggestions.length-5} more available</div>`:''}
    `;
  }catch(e){el.innerHTML='';}
}

window.uploadProfilePhoto=async function(input){
  const file=input.files[0];if(!file)return;
  if(file.size>5*1024*1024){ts('Image too large — max 5MB');return;}
  ts('Uploading photo...');
  try{
    // Resize image before upload
    const canvas=document.createElement('canvas');
    const img=new Image();
    const url=URL.createObjectURL(file);
    img.onload=async function(){
      const size=200;
      canvas.width=size;canvas.height=size;
      const ctx=canvas.getContext('2d');
      // Crop to square
      const min=Math.min(img.width,img.height);
      const sx=(img.width-min)/2;const sy=(img.height-min)/2;
      ctx.drawImage(img,sx,sy,min,min,0,0,size,size);
      URL.revokeObjectURL(url);
      canvas.toBlob(async(blob)=>{
        try{
          const storageRef=ref(storage,`profiles/${CU.uid}/avatar.jpg`);
          const snapshot=await uploadBytes(storageRef,blob,{contentType:'image/jpeg'});
          const photoURL=await getDownloadURL(snapshot.ref);
          UP.photoURL=photoURL;
          await saveUP();
          render();
          ts('Profile photo updated! 📷✅');
        }catch(e){ts('Upload failed — check storage rules');}
      },'image/jpeg',0.85);
    };
    img.src=url;
  }catch(e){ts('Upload failed');}
}

window.saveRecurringGig=async function(){
  const title=document.getElementById('rec-title')?.value;
  if(!title){ts('Please enter a title');return;}
  const freq=document.getElementById('rec-freq')?.value||'weekly';
  const dow=document.getElementById('rec-dow')?.value||'Monday';
  const dom=document.getElementById('rec-dom')?.value||'1';
  const time=document.getElementById('rec-time')?.value||'';
  const location=document.getElementById('rec-location')?.value||'';
  const pay=document.getElementById('rec-pay')?.value||'';
  const inst=document.getElementById('rec-inst')?.value||'';
  // Close modal AFTER reading values
  document.getElementById('recurring-modal')?.remove();
  try{
    await addDoc(collection(db,'recurringGigs'),{
      managerId:CU.uid,managerEmail:CU.email,title,frequency:freq,
      dayOfWeek:freq==='weekly'?dow:'',
      dayOfMonth:freq==='monthly'?dom:'',
      time,location,pay,instruments:inst,
      createdAt:new Date()
    });
    ts('🔄 Recurring gig saved!');
    setTimeout(()=>loadRecurringGigs(),500);
  }catch(e){console.error('Recurring save error:',e.message);ts('Error: '+e.message);}
}

window.generateRecurringGigs=async function(recurringId){
  try{
    const snap=await getDoc(doc(db,'recurringGigs',recurringId));
    if(!snap.exists())return;
    const g=snap.data();
    const dates=[];const now=new Date();let d=new Date(now);let count=0;
    while(count<4&&count<60){
      d.setDate(d.getDate()+1);
      if(g.frequency==='weekly'){
        const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
        if(days[d.getDay()]===g.dayOfWeek){dates.push(new Date(d));count++;}
      } else {
        if(d.getDate()===parseInt(g.dayOfMonth)){dates.push(new Date(d));count++;}
      }
    }
    for(const date of dates){
      await addDoc(collection(db,'gigs'),{
        title:g.title,type:'Concert/Performance',
        date:date.toISOString().split('T')[0],
        time:g.time,location:g.location,pay:g.pay,
        instruments:g.instruments,
        userId:CU.uid,userEmail:CU.email,
        recurringId,status:'open',timestamp:new Date()
      });
    }
    ts(`📅 Generated ${dates.length} upcoming gigs!`);
  }catch(e){ts('Error generating gigs');}
}

// ─── WORLD-CLASS GREETING SYSTEM ─────────────────────────────────
function checkGreetings(){
  if(!CU||!UP)return;
  const today=new Date();
  const todayKey=`${today.getFullYear()}-${today.getMonth()}-${today.getDate()}`;
  if(window._greetingShown===todayKey)return; // Already shown today

  const name=UP.name||CU.displayName||CU.email?.split('@')[0]||'Friend';
  const month=today.getMonth()+1;
  const day=today.getDate();

  if(UP.birthdayMonth&&UP.birthdayDay&&
     parseInt(UP.birthdayMonth)===month&&
     parseInt(UP.birthdayDay)===day&&
     UP.birthdayWishes!==false){
    window._greetingShown=todayKey;
    showGreetingPopup('birthday',name);
    return;
  }

  if(UP.holidayWishes===false)return;
  const lang=UP.lang||'en';
  const holiday=getHoliday(month,day,lang);
  if(holiday){
    window._greetingShown=todayKey;
    showGreetingPopup(holiday,name);
  }
}

function getHoliday(month,day,lang){
  // Universal holidays
  if(month===1&&day===1)return 'newyear';
  if(month===2&&day===14)return 'valentines';
  if(month===10&&day===31)return 'halloween';
  if(month===12&&day===25)return 'christmas';
  if(month===12&&day===31)return 'newyearseve';

  // Language-specific
  if(lang==='en'&&month===7&&day===4)return 'july4';
  if(lang==='en'&&month===11&&day>=22&&day<=28)return 'thanksgiving';
  if(lang==='ru'&&month===1&&day===7)return 'orthodox_christmas';
  if(lang==='ru'&&month===2&&day===23)return 'defender';
  if(lang==='ru'&&month===3&&day===8)return 'womensday';
  if(lang==='ru'&&month===5&&day===9)return 'victory';
  if(lang==='it'&&month===4&&day===25)return 'liberation';
  if(lang==='it'&&month===8&&day===15)return 'ferragosto';
  if(lang==='es'&&month===1&&day===6)return 'threekings';
  if(lang==='fr'&&month===7&&day===14)return 'bastille';
  if(lang==='de'&&month===10&&day===3)return 'germanunity';

  // Music world holidays
  if(month===11&&day===22)return 'musicday'; // St. Cecilia — Patron Saint of Music
  if(month===6&&day===21)return 'worldmusicday'; // Fête de la Musique

  return null;
}
